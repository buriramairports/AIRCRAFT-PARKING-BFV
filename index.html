<!DOCTYPE html>
<html lang="th">

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=Sarabun:wght@400;700&display=swap" rel="stylesheet">
  <style>
    body { height: 100vh; display: flex; flex-direction: column; overflow: hidden; font-family: 'Inter', 'Sarabun', sans-serif; }
    #canvasContainer { flex: 1; overflow: auto; background-color: #cbd5e1; position: relative; scroll-behavior: smooth; }
    canvas { background-color: #f1f5f9; cursor: crosshair; touch-action: none; display: block; margin: auto; }
    .tab-btn { border-bottom: 3px solid transparent; transition: all 0.3s; }
    .tab-btn.active { border-bottom: 3px solid #0ea5e9; color: #0ea5e9; background-color: #f8fafc; }
    label { font-size: 10px; font-weight: 800; color: #64748b; text-transform: uppercase; letter-spacing: 0.05em; display: block; margin-bottom: 2px; }
    #mathPanel { position: fixed; top: 160px; right: 20px; width: 300px; background: rgba(15, 23, 42, 0.95); color: #22d3ee; padding: 18px; border-radius: 24px; font-family: monospace; font-size: 10px; z-index: 50; border: 1px solid #0ea5e9; backdrop-filter: blur(8px); }
    #mathPanel h4 { color: #fff; font-weight: 900; margin-bottom: 10px; border-bottom: 1px solid #334155; padding-bottom: 5px; text-transform: uppercase; }
    .modal { display: none; position: fixed; inset: 0; background: rgba(15, 23, 42, 0.6); z-index: 100; backdrop-filter: blur(4px); align-items: center; justify-content: center; }
    .modal.active { display: flex; }
    #loader { display: none; position: fixed; inset: 0; background: rgba(15, 23, 42, 0.8); z-index: 999; flex-direction: column; align-items: center; justify-content: center; color: white; }
    .spinner { width: 40px; height: 40px; border: 4px solid rgba(255,255,255,0.1); border-top-color: #0ea5e9; border-radius: 50%; animation: spin 1s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    #canvasContainer::-webkit-scrollbar { width: 12px; height: 12px; }
    #canvasContainer::-webkit-scrollbar-thumb { background: #94a3b8; border-radius: 10px; border: 3px solid #e2e8f0; }
  </style>
</head>
<body class="bg-slate-100">

<script>
  const WEB_APP_URL = 'https://script.google.com/macros/s/AKfycbxqCIfejWJerGZfjRfZs-Bn0Bq37jIxzAUdX_-fpK5i3hDiEK-6rBNNSE4KFDuITRT7/exec'; 

  let aircraftTypes = [], stands = [], safetySettings = {};
  let placedAircraft = [], selectedIdx = -1, ghostAircraft = null;
  let baseScale = 4, zoomPercent = 100, scale = 4, originX = 0, originY = 0;
  let isDraggingAC = false;

  const canvas = document.getElementById('mainCanvas');
  const ctx = canvas.getContext('2d');
  
  async function apiCall(action, data = {}) {
    showLoader(true);
    try {
        const response = await fetch(WEB_APP_URL, { method: 'POST', body: JSON.stringify({ action, data }) });
        const res = await response.json();
        showLoader(false);
        if(res.success) showToast("ดำเนินการสำเร็จ");
        return res.data;
    } catch(e) { showLoader(false); return null; }
  }

  function openStandModal() {
    const inputs = ['st-id','st-w','st-l','st-t1','st-t1l','st-t2','st-t2l','st-tail','st-heading','st-offset','st-lb','st-rb'];
    inputs.forEach(id => document.getElementById(id).value = (id.includes('st-t1l') || id.includes('st-t2l')) ? '' : 0);
    document.getElementById('st-id').readOnly = false;
    document.getElementById('modalStand').classList.add('active');
}
  function openAircraftModal() {
    const inputs = ['ac-m','ac-s','ac-l','ac-wb','ac-nmg','ac-sa','ac-jb'];
    inputs.forEach(id => document.getElementById(id).value = '');
    document.getElementById('ac-m').readOnly = false;
    document.getElementById('modalAircraft').classList.add('active');
}
  function showLoader(show) { document.getElementById('loader').style.display = show ? 'flex' : 'none'; }
  function showToast(msg) { const t = document.getElementById('toast'); t.innerText = msg; t.classList.remove('hidden'); setTimeout(() => t.classList.add('hidden'), 3000); }
  function closeModal(id) { document.getElementById(id).classList.remove('active'); }
  function switchTab(t) { ['inspector','data'].forEach(v => { document.getElementById('tab-'+v).className = `flex-1 p-4 border-b-2 text-[10px] font-black uppercase ${v===t ? 'border-sky-500 text-sky-600 bg-sky-50/50' : 'border-transparent text-slate-400'}`; document.getElementById('view-'+v).classList.toggle('hidden', v!==t); }); }

  window.onload = async () => { lucide.createIcons(); document.getElementById('datePicker').valueAsDate = new Date(); await loadData(); animate(); };

  async function loadData() {
    const data = await apiCall('getInitialData');
    if(!data) return;
    aircraftTypes = data.aircraftTypes || [];
    stands = data.stands || [];
    safetySettings = {};
    (data.safetySettings || []).forEach(s => safetySettings[s.Code] = s.MinClearance);
    renderAircraftToolbar(); renderStandsTable(); renderAircraftTypeTable(); renderSafetyConfig(); updateParentDropdown();
    calculateApronLayout();
  }

  function calculateApronLayout() {
    const container = document.getElementById('canvasContainer');
    const parents = stands.filter(s => !s.ParentID).sort((a,b) => String(a.StandID).localeCompare(String(b.StandID), undefined, {numeric: true}));
    
    // บังคับบวกความกว้างทั้งหมดของหลุมหลัก
    let totalMeters = parents.reduce((sum, s) => sum + Number(s.Width), 0);
    canvas.width = (totalMeters + 300) * scale;
    canvas.height = 800 * (zoomPercent/100);

    originX = canvas.width - (100 * scale); originY = canvas.height / 2;

    let currentMX = 0;
    parents.forEach(s => {
      s.mX = currentMX - (Number(s.Width) / 2); s.mY = 0;
      currentMX -= Number(s.Width); 
      stands.filter(child => String(child.ParentID) === String(s.StandID)).forEach(child => {
          child.mX = s.mX + (Number(child.OffsetX) || 0); child.mY = 0;
      });
    });
    if(selectedIdx === -1) setTimeout(() => { container.scrollLeft = container.scrollWidth; }, 100);
  }

  function findBestStand(ac) {
    let potStands = stands.filter(s => ac.mX >= (s.mX - s.Width/2) && ac.mX <= (s.mX + s.Width/2) && ac.mY >= (s.mY - s.Length/2) && ac.mY <= (s.mY + s.Length/2));
    if (potStands.length === 0) return null;
    potStands.sort((a, b) => Math.abs(ac.mX - a.mX) - Math.abs(ac.mX - b.mX));
    return potStands[0];
  }

  function findBestSnap(ac, world) {
    let bx = world.mx, by = world.my, bh = ac.heading;
    stands.forEach(s => {
      if (Math.abs(world.mx - s.mX) < 10) {
        bx = s.mX; bh = 180;
        const noseOffset = ac.Length / 2;
        const targetY1 = (s.mY + s.Length/2) - s.TMark1 - noseOffset;
        const targetY2 = (s.mY + s.Length/2) - s.TMark2 - noseOffset;
        if (Math.abs(world.my - targetY1) < 10) by = targetY1;
        else if (Math.abs(world.my - targetY2) < 10) by = targetY2;
      }
    });
    return { x: bx, y: by, h: bh };
  }

// ฟังก์ชันช่วยหาพิกัด 4 มุมของเครื่องบินตามองศาการหมุน
function getACBox(ac) {
    const rad = ac.heading * Math.PI / 180;
    const w2 = ac.WingSpan / 2;
    const l2 = ac.Length / 2;
    // พิกัดสัมพัทธ์ 4 มุม (Nose-Left, Nose-Right, Tail-Left, Tail-Right)
    const corners = [
        { x: -w2, y: l2 }, { x: w2, y: l2 },
        { x: -w2, y: -l2 }, { x: w2, y: -l2 }
    ];
    // หมุนพิกัดตาม Heading และบวกตำแหน่ง mX, mY
    return corners.map(p => ({
        x: ac.mX + (p.x * Math.cos(rad) - p.y * Math.sin(rad)),
        y: ac.mY + (p.x * Math.sin(rad) + p.y * Math.cos(rad))
    }));
}

// ฟังก์ชันหา distance ที่สั้นที่สุดระหว่างจุดหนึ่งไปยังเส้นตรง (Segment)
function distToSegment(p, v, w) {
    const l2 = Math.pow(v.x - w.x, 2) + Math.pow(v.y - w.y, 2);
    if (l2 === 0) return Math.hypot(p.x - v.x, p.y - v.y);
    let t = ((p.x - v.x) * (w.x - v.x) + (p.y - v.y) * (w.y - v.y)) / l2;
    t = Math.max(0, Math.min(1, t));
    return Math.hypot(p.x - (v.x + t * (w.x - v.x)), p.y - (v.y + t * (w.y - v.y)));
}

// ฟังก์ชันหาระยะห่างที่สั้นที่สุดระหว่างกล่องสี่เหลี่ยม 2 กล่อง
function getGapBetweenBoxes(box1, box2) {
    let minD = Infinity;
    for (let i = 0; i < 4; i++) {
        for (let j = 0; j < 4; j++) {
            // เช็คระยะจากจุดมุมของกล่อง 1 ไปยังขอบของกล่อง 2
            minD = Math.min(minD, distToSegment(box1[i], box2[j], box2[(j + 1) % 4]));
            // เช็คระยะจากจุดมุมของกล่อง 2 ไปยังขอบของกล่อง 1
            minD = Math.min(minD, distToSegment(box2[i], box1[j], box1[(j + 1) % 4]));
        }
    }
    return minD;
}

function checkSafety() {
    let mathLog = "";
    placedAircraft.forEach((ac, idx) => {
        let staticSafe = true, leftSafe = true, rightSafe = true, error = "";
        const minReq = Number(safetySettings[ac.ICAO]) || 4.5;
        const jetLimit = Number(ac.JetBlast) || 0;
        const acBox = getACBox(ac); // คำนวณขอบเขตเครื่องลำปัจจุบัน
        
        let stand = findBestStand(ac);
        if (stand) {
            // เช็ค Nose/Tail Limit อิงตามตำแหน่งหัว/ท้ายจริงหลังหมุน
            const rad = ac.heading * Math.PI / 180;
            const noseX = ac.mX - (ac.Length / 2) * Math.sin(rad);
            const noseY = ac.mY + (ac.Length / 2) * Math.cos(rad);
            const tailY = ac.mY - (ac.Length / 2) * Math.cos(rad);

            const distFromBottom = (stand.mY + stand.Length / 2) - noseY;
            if (distFromBottom < -0.1) { staticSafe = false; error = "จมูกล้นเขตหัวหลุม"; }
            const tailDistFromTop = tailY - (stand.mY - stand.Length / 2);
            if (tailDistFromTop < Number(stand.TailLimit || 5)) { staticSafe = false; error = "ท้ายล้นเขต Taxiway"; }
            if (ac.ICAO.charCodeAt(0) > stand.MaxCode.charCodeAt(0)) { staticSafe = false; error = "เครื่องใหญ่เกินขนาดหลุม"; }
            
            if (ac.swing) {
                const wheelbase = Number(ac.Wheelbase) || (Number(ac.NoseToMainGear) * 0.75);
                const turnR = wheelbase / Math.tan((ac.SteeringAngle || 45) * Math.PI / 180);
                const sweptR = Math.hypot(turnR + ac.WingSpan / 2, ac.NoseToMainGear * 0.25) + minReq;
                if (stand.LeftBorder && sweptR > Number(stand.LeftBorder)) leftSafe = false;
                if (stand.RightBorder && sweptR > Number(stand.RightBorder)) rightSafe = false;
            }
        } else { staticSafe = false; error = "อยู่นอกเขตหลุมจอด"; }

        let nearL = null, nearR = null, minDistL = Infinity, minDistR = Infinity, isJetViolation = false;

        placedAircraft.forEach((other, oIdx) => {
            if (idx === oIdx) return;
            const otherBox = getACBox(other);
            const distCenter = Math.hypot(ac.mX - other.mX, ac.mY - other.mY);
            const actualGap = getGapBetweenBoxes(acBox, otherBox); // ระยะห่างจากขอบถึงขอบจริง

            if (distCenter < jetLimit) isJetViolation = true;

            // ตรวจสอบความปลอดภัยขณะจอดนิ่ง (Static) อิงตามระยะห่างจริง
            if (actualGap < minReq) { 
                staticSafe = false; 
                if (other.mX < ac.mX) rightSafe = false; else leftSafe = false;
                if (error === "") error = "ระยะจอดนิ่งไม่ปลอดภัย"; 
            }

            if (ac.swing) {
                const wheelbase = Number(ac.Wheelbase) || (Number(ac.NoseToMainGear) * 0.75);
                const turnR = wheelbase / Math.tan((ac.SteeringAngle || 45) * Math.PI / 180);
                const sweptR = Math.hypot(turnR + ac.WingSpan / 2, ac.NoseToMainGear * 0.25) + minReq;
                // ระยะจากจุดศูนย์กลางลำปัจจุบัน ถึง ขอบที่ใกล้ที่สุดของอีกลำ
                let distToOtherBox = Infinity;
                for(let i=0; i<4; i++) distToOtherBox = Math.min(distToOtherBox, distToSegment({x:ac.mX, y:ac.mY}, otherBox[i], otherBox[(i+1)%4]));

                if (distToOtherBox < sweptR) {
                    if (other.mX < ac.mX) rightSafe = false; else leftSafe = false;
                }
            }

            if (idx === selectedIdx) {
                if (other.mX >= ac.mX) { if (distCenter < minDistL) { minDistL = distCenter; nearL = other; } } 
                else { if (distCenter < minDistR) { minDistR = distCenter; nearR = other; } }
            }
        });

        if (ac.swing && isJetViolation) { leftSafe = false; rightSafe = false; error = "ห้ามเลี้ยว: อันตรายจาก Jet Blast"; }

        if (idx === selectedIdx) {
            [ {obj: nearL, side: "ซ้าย (Left)"}, {obj: nearR, side: "ขวา (Right)"} ].forEach(item => {
                if (!item.obj && !(ac.swing && isJetViolation)) return;
                const other = item.obj;
                const otherBox = other ? getACBox(other) : null;
                const actualGap = other ? getGapBetweenBoxes(acBox, otherBox) : 0;
                
                const wheelbase = Number(ac.Wheelbase) || (Number(ac.NoseToMainGear) * 0.75);
                const turnR = wheelbase / Math.tan((ac.SteeringAngle || 45) * Math.PI / 180);
                const sweptR = Math.hypot(turnR + ac.WingSpan / 2, ac.NoseToMainGear * 0.25) + minReq;
                let distToOtherBox = Infinity;
                if(other) for(let i=0; i<4; i++) distToOtherBox = Math.min(distToOtherBox, distToSegment({x:ac.mX, y:ac.mY}, otherBox[i], otherBox[(i+1)%4]));

                let swingPass = ac.swing ? (distToOtherBox >= sweptR && !isJetViolation) : true;
                let swingReason = distToOtherBox < sweptR ? "ปีกไม่พ้น" : (isJetViolation ? "Jet Blast" : "");

                mathLog += `<div class="mt-3 p-3 rounded-2xl border bg-slate-800/80 border-slate-600 shadow-xl animate-fadeIn text-[10px]">`;
                mathLog += `<p class="text-sky-400 font-black mb-2 border-b border-white/10 pb-1">ฝั่ง${item.side} vs ${other ? (findBestStand(other)?.StandID || other.Model) : 'N/A'}</p>`;
                mathLog += `<p class="text-slate-400 font-bold uppercase text-[9px]">● Static Parking</p>`;
                mathLog += `<div class="flex justify-between pl-2"><span>Gap จริง (ขอบ-ขอบ):</span> <span class="${actualGap >= minReq ? 'text-emerald-400':'text-red-400'}">${other ? actualGap.toFixed(2) : '-'} ม.</span></div>`;
                mathLog += `<p class="text-slate-400 font-bold uppercase text-[9px] mt-2">● Dynamic Swing</p>`;
                mathLog += `<div class="flex justify-between pl-2"><span>รัศมีปลอดภัย (R):</span> <span>${sweptR.toFixed(2)} ม.</span></div>`;
                mathLog += `<div class="flex justify-between pl-2"><span>ระยะว่างจริง:</span> <span>${distToOtherBox === Infinity ? '-' : distToOtherBox.toFixed(2)} ม.</span></div>`;
                mathLog += `<div class="flex justify-between pl-2 font-bold mt-1"><span>ผลลัพธ์:</span> <span class="${swingPass?'text-emerald-400':'text-red-400'}">${swingPass?'✅ พ้น':'⚠️ '+swingReason}</span></div></div>`;
            });
        }
        ac.isSafe = staticSafe && leftSafe && rightSafe;
        ac.leftSafe = leftSafe; ac.rightSafe = rightSafe;
        ac.errorMsg = error || (!leftSafe || !rightSafe ? "ไม่ปลอดภัยสำหรับการเลี้ยว" : "");
    });
    document.getElementById('mathOutput').innerHTML = mathLog || '<p class="text-slate-500 italic text-[10px]">เลือกเครื่องบินเพื่อตรวจสอบพารามิเตอร์...</p>';
    if (selectedIdx !== -1) updateInspector();
}

 function animate() {
    ctx.clearRect(0, 0, canvas.width, canvas.height); checkSafety();
    
    // 1. วาดหลุมจอด
    stands.forEach(s => {
      const p = mToP(s.mX, s.mY), w = s.Width * scale, l = s.Length * scale;
      ctx.save(); ctx.translate(p.x, p.y); ctx.rotate((s.Heading || 0) * Math.PI / 180);
      ctx.strokeStyle = s.Status === 'active' ? '#94a3b8' : '#ef4444'; ctx.setLineDash([5, 5]); ctx.strokeRect(-w/2, -l/2, w, l);
      ctx.beginPath(); ctx.setLineDash(s.ParentID ? [10, 5] : []); ctx.strokeStyle = "#facc15"; ctx.lineWidth = 3;
      const t1Y = (l/2) - (Number(s.TMark1 || 15) * scale);
      ctx.moveTo(0, -l/2); ctx.lineTo(0, t1Y); ctx.stroke();
      ctx.setLineDash([]); ctx.lineWidth = 2;
      [s.TMark1, s.TMark2].forEach(tm => { const tmY = (l/2) - (Number(tm) * scale); ctx.beginPath(); ctx.moveTo(-5*scale, tmY); ctx.lineTo(5*scale, tmY); ctx.stroke(); });
      const fs = Math.max(9, 14 * (zoomPercent/100)); ctx.fillStyle = s.ParentID ? "#334155" : "#0f172a"; 
      const label = `${s.StandID} (${s.MaxCode})`; const tw = ctx.measureText(label).width;
      const lblY = s.ParentID ? (-l/2 - fs * 1.5) : (-l/2 - fs * 3.5);
      ctx.fillRect(-tw/2 - 10, lblY - fs, tw + 20, fs * 1.8);
      ctx.fillStyle = "white"; ctx.textAlign = "center"; ctx.fillText(label, 0, lblY + (fs * 0.2));
      ctx.fillStyle = "#64748b"; ctx.font = `bold ${fs*0.8}px Inter`; ctx.fillText(`${s.Width} x ${s.Length} ม.`, 0, l/2 + fs + 5);
      ctx.restore();
    });

    // 2. วาดเส้นวัดระยะระหว่างปีก (Adjacent Dimension Lines)
    let sortedAC = [...placedAircraft].sort((a,b) => b.mX - a.mX);
    ctx.setLineDash([4, 4]); ctx.lineWidth = 1; ctx.strokeStyle = "#475569";
    for(let i=0; i < sortedAC.length - 1; i++) {
        const acR = sortedAC[i], acL = sortedAC[i+1];
        const clearM = Math.abs(acR.mX - acL.mX) - (acR.WingSpan/2 + acL.WingSpan/2);
        if (Math.abs(acR.mX - acL.mX) < 120) { // วาดเฉพาะลำที่จอดโซนติดกัน
            const pR = mToP(acR.mX - acR.WingSpan/2, acR.mY);
            const pL = mToP(acL.mX + acL.WingSpan/2, acL.mY);
            ctx.beginPath(); ctx.moveTo(pR.x, pR.y); ctx.lineTo(pL.x, pL.y); ctx.stroke();
            ctx.fillStyle = "#1e293b"; ctx.font = "bold 11px monospace"; ctx.textAlign="center";

function drawAircraft(ac, isSelected) {
    const p = mToP(ac.mX, ac.mY), w = ac.WingSpan * scale, l = ac.Length * scale, mb = ac.NoseToMainGear * scale;
    const fs = Math.max(8, 11 * (zoomPercent/100));
    
    // 1. วาด Aura แบ่งครึ่งสี (ซ้าย-ขวาของจอ)
    ctx.save();
    ctx.translate(p.x, p.y);
    const auraRadius = (ac.WingSpan/2 + (safetySettings[ac.ICAO] || 4.5)) * scale;

    // ซีกซ้ายของจอ (พิกัดเมตรติดลบมากขึ้น) -> คือฝั่งขวาของนักบิน (Right Side)
    ctx.beginPath(); ctx.arc(0, 0, auraRadius, Math.PI/2, 1.5 * Math.PI);
    ctx.fillStyle = ac.rightSafe ? 'rgba(34, 197, 94, 0.08)' : 'rgba(239, 68, 68, 0.2)';
    ctx.fill();

    // ซีกขวาของจอ (พิกัดเมตรเข้าใกล้ 0) -> คือฝั่งซ้ายของนักบิน (Left Side)
    ctx.beginPath(); ctx.arc(0, 0, auraRadius, 1.5 * Math.PI, 0.5 * Math.PI);
    ctx.fillStyle = ac.leftSafe ? 'rgba(34, 197, 94, 0.08)' : 'rgba(239, 68, 68, 0.2)';
    ctx.fill();
    ctx.restore();

    // 2. วาดตัวเครื่องและวงเลี้ยว
    ctx.save(); 
    ctx.translate(p.x, p.y); 
    ctx.rotate(ac.heading * Math.PI / 180);
    if (ac.swing) {
        ctx.setLineDash([4, 4]); ctx.lineWidth = 2;
        const turnR_m = ac.NoseToMainGear / Math.sin((ac.SteeringAngle || 45) * Math.PI / 180);
        const sweptR_px = Math.hypot(turnR_m + ac.WingSpan/2, ac.Length - ac.NoseToMainGear) * scale;
        const pivot_px = turnR_m * scale;
        // เส้นประฝั่งขวานักบิน (วาดทางซ้ายของจอ)
        ctx.strokeStyle = ac.rightSafe ? 'rgba(34, 197, 94, 0.6)' : 'rgba(239, 68, 68, 0.8)';
        ctx.beginPath(); ctx.arc(-pivot_px, mb, sweptR_px, 1.5 * Math.PI, 2 * Math.PI); ctx.stroke();
        // เส้นประฝั่งซ้ายนักบิน (วาดทางขวาของจอ)
        ctx.strokeStyle = ac.leftSafe ? 'rgba(34, 197, 94, 0.6)' : 'rgba(239, 68, 68, 0.8)';
        ctx.beginPath(); ctx.arc(pivot_px, mb, sweptR_px, Math.PI, 1.5 * Math.PI); ctx.stroke();
        ctx.setLineDash([]);
    }
    ctx.fillStyle = isSelected ? '#0ea5e9' : (ac.isSafe ? ac.Color : '#ef4444');
    ctx.fillRect(-w/20, -mb, w/10, l); ctx.fillRect(-w/2, -mb + l*0.15, w, l/10); ctx.fillRect(-w/4, -mb + l*0.85, w/2, l/20);
    ctx.restore();

    // 3. วาดป้ายชื่อและสัญลักษณ์ L/R (ตั้งตรงและสลับฝั่งตามมุมมองนักบิน)
    ctx.save(); 
    ctx.translate(p.x, p.y);
    ctx.fillStyle = 'rgba(15, 23, 42, 0.8)';
    const modelLabel = ac.Model; ctx.font = `bold ${fs}px Inter`;
    const mTw = ctx.measureText(modelLabel).width;
    ctx.fillRect(-mTw/2-6, -fs/2-5, mTw+12, fs+10);
    ctx.fillStyle = "white"; ctx.textAlign="center"; ctx.fillText(modelLabel, 0, fs/3);

    if (ac.swing) {
        ctx.font = `bold ${fs-1}px Inter`;
        // ฝั่งขวาของนักบิน (แสดงที่ซ้ายของจอ)
        ctx.fillStyle = ac.rightSafe ? "#22c55e" : "#ef4444";
        ctx.fillText(ac.rightSafe ? "R:OK" : "R:⚠️", -w/2 - 18, 0);
        // ฝั่งซ้ายของนักบิน (แสดงที่ขวาของจอ)
        ctx.fillStyle = ac.leftSafe ? "#22c55e" : "#ef4444";
        ctx.fillText(ac.leftSafe ? "L:OK" : "L:⚠️", w/2 + 18, 0);
    }

    if (!ac.isSafe) {
        ctx.fillStyle = '#ef4444'; ctx.font = `bold ${fs+2}px Sarabun`;
        ctx.fillText("⚠️ " + ac.errorMsg, 0, -fs * 6);
    }
    ctx.restore();
  }

  // --- UI Handlers ---
  function updateInspector() { const ac = placedAircraft[selectedIdx]; if(!ac) return; document.getElementById('activePlanePanel').classList.remove('hidden'); document.getElementById('noSelectionMsg').classList.add('hidden'); document.getElementById('swingToggle').checked = ac.swing; document.getElementById('insModel').innerText = ac.Model; const hdr = document.getElementById('insHeader'); hdr.className = ac.isSafe ? "p-5 bg-emerald-600 text-white rounded-3xl shadow-xl border-b-4 border-emerald-800" : "p-5 bg-red-600 text-white rounded-3xl shadow-xl border-b-4 border-red-800"; document.getElementById('insStatusText').innerText = ac.isSafe ? "✅ ปลอดภัย (SAFE)" : `⚠️ ${ac.errorMsg}`; }
  function renderSafetyConfig() { document.getElementById('safetyConfigList').innerHTML = Object.keys(safetySettings).map(code => `<div class="bg-white p-2 rounded-lg border text-center"><label class="text-[8px] text-slate-400">Code ${code}</label><input type="number" step="0.1" value="${safetySettings[code]}" id="safe-${code}" class="w-full text-xs font-bold border-none outline-none p-0 text-center"></div>`).join(''); }
  async function uiSaveSafety() { for (let c of Object.keys(safetySettings)) { const v = Number(document.getElementById(`safe-${c}`).value); await apiCall('saveSafety', { Code: c, MinClearance: v }); } showToast("อัปเดตมาตรฐานสำเร็จ"); await loadData(); }
  function renderStandsTable() { document.getElementById('standsTable').innerHTML = stands.map((s, i) => `<div class="flex justify-between items-center p-2.5 bg-white border rounded-xl text-[10px] font-bold shadow-sm"><div>${s.StandID}</div><div class="flex gap-1"><button onclick="editStand(${i})" class="bg-sky-50 text-sky-600 p-1.5 rounded hover:bg-sky-500 hover:text-white transition">แก้ไข</button><button onclick="uiDeleteStand('${s.StandID}')" class="bg-red-50 text-red-400 p-1.5 rounded hover:bg-red-500 hover:text-white transition">ลบ</button></div></div>`).join(''); }
  function renderAircraftTypeTable() { document.getElementById('aircraftTable').innerHTML = aircraftTypes.map((ac, i) => `<div class="flex justify-between items-center p-3 bg-white border rounded-xl text-[10px] font-bold shadow-sm group"><span>${ac.Model}</span><div class="flex gap-1"><button onclick="editAircraft(${i})" class="bg-sky-50 text-sky-600 p-1.5 rounded hover:bg-sky-500 hover:text-white transition">แก้ไข</button><button onclick="uiDeleteAircraft('${ac.Model}')" class="bg-red-50 text-red-400 p-1.5 rounded hover:bg-red-500 hover:text-white transition">ลบ</button></div></div>`).join(''); }
  // แก้ไขฟังก์ชัน Edit เพื่อดึงข้อมูลมาแสดงให้ครบ
function editStand(i) {
    const s = stands[i];
    document.getElementById('st-id').value = s.StandID;
    document.getElementById('st-id').readOnly = true; // ห้ามแก้ ID ขณะ Edit
    document.getElementById('st-w').value = s.Width;
    document.getElementById('st-l').value = s.Length;
    document.getElementById('st-t1').value = s.TMark1;
    document.getElementById('st-t1l').value = s.TMark1Label || '';
    document.getElementById('st-t2').value = s.TMark2;
    document.getElementById('st-t2l').value = s.TMark2Label || '';
    document.getElementById('st-lb').value = s.LeftBorder || 0;
    document.getElementById('st-rb').value = s.RightBorder || 0;
    document.getElementById('st-tail').value = s.TailLimit;
    document.getElementById('st-heading').value = s.Heading || 0;
    document.getElementById('st-code').value = s.MaxCode;
    document.getElementById('st-parent').value = s.ParentID || "";
    document.getElementById('st-offset').value = s.OffsetX || 0;
    document.getElementById('st-status').value = s.Status;
    document.getElementById('modalStand').classList.add('active');
}
  function editAircraft(i) {
    const ac = aircraftTypes[i];
    document.getElementById('ac-m').value = ac.Model;
    document.getElementById('ac-m').readOnly = true;
    document.getElementById('ac-s').value = ac.WingSpan;
    document.getElementById('ac-l').value = ac.Length;
    document.getElementById('ac-wb').value = ac.Wheelbase || 0;
    document.getElementById('ac-nmg').value = ac.NoseToMainGear;
    document.getElementById('ac-sa').value = ac.SteeringAngle || 45;
    document.getElementById('ac-jb').value = ac.JetBlast || 40;
    document.getElementById('ac-code').value = ac.ICAO;
    document.getElementById('ac-col').value = ac.Color;
    document.getElementById('modalAircraft').classList.add('active');
}
  // แก้ไขฟังก์ชัน Save เพื่อส่งข้อมูลไป GS ให้ครบตาม Schema
async function uiSaveStand() {
    const d = {
        StandID: document.getElementById('st-id').value,
        Width: Number(document.getElementById('st-w').value),
        Length: Number(document.getElementById('st-l').value),
        TMark1: Number(document.getElementById('st-t1').value),
        TMark1Label: document.getElementById('st-t1l').value,
        TMark2: Number(document.getElementById('st-t2').value),
        TMark2Label: document.getElementById('st-t2l').value,
        LeftBorder: Number(document.getElementById('st-lb').value),
        RightBorder: Number(document.getElementById('st-rb').value),
        TailLimit: Number(document.getElementById('st-tail').value),
        Heading: Number(document.getElementById('st-heading').value),
        MaxCode: document.getElementById('st-code').value,
        ParentID: document.getElementById('st-parent').value,
        OffsetX: Number(document.getElementById('st-offset').value),
        Status: document.getElementById('st-status').value
    };
    await apiCall('saveStand', d);
    closeModal('modalStand');
    await loadData();
}
  async function uiSaveAircraft() {
    const d = {
        Model: document.getElementById('ac-m').value,
        WingSpan: Number(document.getElementById('ac-s').value),
        Length: Number(document.getElementById('ac-l').value),
        Wheelbase: Number(document.getElementById('ac-wb').value),
        NoseToMainGear: Number(document.getElementById('ac-nmg').value),
        SteeringAngle: Number(document.getElementById('ac-sa').value),
        JetBlast: Number(document.getElementById('ac-jb').value),
        ICAO: document.getElementById('ac-code').value,
        Color: document.getElementById('ac-col').value
    };
    await apiCall('saveAircraftType', d);
    closeModal('modalAircraft');
    await loadData();
}
  function switchTab(t) { ['inspector','data'].forEach(v => { document.getElementById('tab-'+v).className = `flex-1 p-4 border-b-2 text-[10px] font-black uppercase ${v===t ? 'border-sky-500 text-sky-600 bg-sky-50/50' : 'border-transparent text-slate-400'}`; document.getElementById('view-'+v).classList.toggle('hidden', v!==t); }); }
  function handleZoom(v) { zoomPercent=v; document.getElementById('zoomDisplay').innerText=v+"%"; scale=(baseScale*zoomPercent)/100; calculateApronLayout(); }
  function pickGhost(i) { ghostAircraft = { ...aircraftTypes[i], heading: 180, mX: 0, mY: 0, swing: false }; }
  function toggleSwingOut() { if(selectedIdx !== -1) placedAircraft[selectedIdx].swing = document.getElementById('swingToggle').checked; }
  function rotateSelected(d) { if(selectedIdx !== -1) placedAircraft[selectedIdx].heading += d; }
  function deleteSelected() { if(selectedIdx !== -1) { placedAircraft.splice(selectedIdx, 1); selectedIdx = -1; document.getElementById('activePlanePanel').classList.add('hidden'); } }
  function updateParentDropdown() { document.getElementById('st-parent').innerHTML = '<option value="">-- ไม่มี --</option>' + stands.filter(s => !s.ParentID).map(p => `<option value="${p.StandID}">${p.StandID}</option>`).join(''); }
  async function uiDeleteStand(id) { if(confirm('ลบหลุมจอด '+id+'?')) { await apiCall('deleteStand', {id}); await loadData(); } }
  async function uiDeleteAircraft(id) { if(confirm('ลบโมเดล '+id+'?')) { await apiCall('deleteAircraftType', {id}); await loadData(); } }
  const mToP = (mx, my) => ({ x: originX + mx * scale, y: originY + my * scale });
  const pToM = (px, py) => ({ mx: (px - originX) / scale, my: (py - originY) / scale });
  canvas.onmousedown = (e) => {
    const r = canvas.getBoundingClientRect(); const pos = pToM(e.clientX-r.left, e.clientY-r.top);
    if (ghostAircraft) { const s = findBestSnap(ghostAircraft, pos); ghostAircraft.mX = s.x; ghostAircraft.mY = s.y; ghostAircraft.heading = s.h; placedAircraft.push({ ...ghostAircraft }); ghostAircraft = null; return; }
    selectedIdx = placedAircraft.findIndex(ac => Math.hypot(ac.mX - pos.mx, ac.mY - pos.my) < (ac.WingSpan/2 + 2));
    if(selectedIdx !== -1) updateInspector(); else document.getElementById('activePlanePanel').classList.add('hidden');
  };
  canvas.onmousemove = (e) => {
    const r = canvas.getBoundingClientRect(); const pos = pToM(e.clientX-r.left, e.clientY-r.top);
    if (ghostAircraft) { const s = findBestSnap(ghostAircraft, pos); ghostAircraft.mX = s.x; ghostAircraft.mY = s.y; ghostAircraft.heading = s.h; 
    } else if (selectedIdx !== -1 && e.buttons === 1) { const s = findBestSnap(placedAircraft[selectedIdx], pos); placedAircraft[selectedIdx].mX = s.x; placedAircraft[selectedIdx].mY = s.y; updateInspector(); }
  };
  function renderAircraftToolbar() { document.getElementById('acToolbar').innerHTML = aircraftTypes.map((t, i) => `<button onclick="pickGhost(${i})" class="flex flex-col items-center justify-center p-2 bg-white border-2 border-slate-100 rounded-xl hover:border-sky-500 transition w-24 shrink-0 shadow-sm"><b class="text-[10px] text-slate-800">${t.Model}</b><span class="text-[8px] font-black text-sky-500 uppercase font-Inter">Code ${t.ICAO}</span></button>`).join(''); }
</script>
