<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <title>Apron Simulation BETA v1.0 - ทดลองระบบ</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=Sarabun:wght@400;700&display=swap" rel="stylesheet">
  <style>
    body { height: 100vh; display: flex; flex-direction: column; overflow: hidden; font-family: 'Inter', 'Sarabun', sans-serif; }
    /* พื้นที่เลื่อนอิสระสำหรับแผนผัง */
    #canvasContainer { flex: 1; overflow: auto; background-color: #cbd5e1; position: relative; scroll-behavior: smooth; }
    canvas { background-color: #f1f5f9; cursor: crosshair; touch-action: none; display: block; margin: auto; }
    
    /* ตกแต่ง Sidebar และ Tabs */
    .tab-btn { border-bottom: 3px solid transparent; transition: all 0.3s; }
    .tab-btn.active { border-bottom: 3px solid #0ea5e9; color: #0ea5e9; background-color: #f8fafc; }
    label { font-size: 10px; font-weight: 800; color: #64748b; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 2px; display: block; }
    
    /* Scrollbar Styling */
    #canvasContainer::-webkit-scrollbar { width: 12px; height: 12px; }
    #canvasContainer::-webkit-scrollbar-track { background: #e2e8f0; }
    #canvasContainer::-webkit-scrollbar-thumb { background: #94a3b8; border-radius: 10px; border: 3px solid #e2e8f0; }
    #canvasContainer::-webkit-scrollbar-thumb:hover { background: #64748b; }

    /* Loading Overlay */
    #loader { display: none; position: fixed; inset: 0; background: rgba(15, 23, 42, 0.7); z-index: 999; flex-direction: column; align-items: center; justify-content: center; color: white; backdrop-filter: blur(4px); }
    .spinner { width: 40px; height: 40px; border: 4px solid rgba(255,255,255,0.1); border-top-color: #0ea5e9; border-radius: 50%; animation: spin 1s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body class="bg-slate-50">

  <!-- Loading & Toast Notifications -->
  <div id="loader"><div class="spinner mb-4"></div><p class="font-bold text-sm animate-pulse">กำลังสื่อสารกับเซิร์ฟเวอร์...</p></div>
  <div id="toast" class="hidden fixed top-4 left-1/2 -translate-x-1/2 bg-emerald-600 text-white px-6 py-2 rounded-full shadow-2xl font-bold text-sm z-[1000] animate-bounce">สำเร็จ!</div>

  <!-- Header -->
  <header class="bg-slate-900 text-white h-14 px-6 flex justify-between items-center shadow-xl shrink-0 z-30">
    <div class="flex items-center gap-3">
      <div class="bg-sky-500 p-1.5 rounded text-white shadow-lg shadow-sky-500/30"><i data-lucide="shield-check" class="w-5 h-5"></i></div>
      <h1 class="text-lg font-black tracking-tighter text-sky-400 uppercase">Apron Control <span class="text-white text-xs ml-1">v1.0 Pro</span></h1>
    </div>
    <div class="flex gap-4 items-center">
      <input type="date" id="datePicker" class="text-slate-900 px-3 py-1 rounded text-xs font-bold border-none outline-none">
      <button onclick="loadData()" class="bg-slate-700 p-2 rounded hover:bg-slate-600 transition" title="Refresh Data"><i data-lucide="refresh-cw" class="w-4 h-4"></i></button>
    </div>
  </header>

  <div class="flex flex-1 overflow-hidden">
    <!-- Sidebar -->
    <aside class="w-80 bg-white border-r flex flex-col shadow-2xl z-20 shrink-0">
      <div class="flex border-b text-[10px] font-black uppercase text-slate-400">
        <button onclick="switchTab('planner')" id="tab-planner" class="tab-btn flex-1 p-4 active">จัดสรรหลุมจอด</button>
        <button onclick="switchTab('stands')" id="tab-stands" class="tab-btn flex-1 p-4">จัดการหลุม</button>
        <button onclick="switchTab('aircraft')" id="tab-aircraft" class="tab-btn flex-1 p-4">ประเภทเครื่อง</button>
      </div>

      <div class="p-5 flex-1 overflow-y-auto">
        <!-- View: Planner (Main Workspace) -->
        <div id="view-planner" class="space-y-6">
          <div class="p-4 bg-sky-50 rounded-2xl border border-sky-100 shadow-inner">
             <div class="flex justify-between items-center mb-2">
                <span class="text-[10px] font-black text-sky-700 uppercase tracking-widest">การขยายขนาด (Zoom)</span>
                <span id="zoomDisplay" class="text-xs font-bold text-sky-600">100%</span>
             </div>
             <input type="range" id="zoomSlider" min="50" max="200" value="100" class="w-full h-1.5 bg-sky-200 rounded-lg appearance-none cursor-pointer accent-sky-600" oninput="handleZoom(this.value)">
          </div>

          <div id="acList" class="grid grid-cols-1 gap-2"></div>
          
          <!-- Inspector (Context Menu for Selected Aircraft) -->
          <div id="inspector" class="hidden p-5 bg-slate-50 rounded-3xl border-2 border-slate-200 space-y-4">
             <div id="insDetail" class="text-xs font-bold text-slate-600 space-y-1 leading-relaxed"></div>
             <label class="flex items-center justify-between p-3 bg-white rounded-xl border cursor-pointer shadow-sm">
                <span class="text-[10px] font-black text-slate-400 uppercase">จำลอง Swing-out</span>
                <input type="checkbox" id="swingToggle" onchange="toggleSwingOut()" class="w-5 h-5 accent-sky-500">
             </label>
             <div class="flex gap-2">
                <button onclick="rotateSelected(-5)" class="p-3 bg-white border rounded-xl flex-1 hover:bg-sky-100 transition shadow-sm"><i data-lucide="rotate-ccw" class="w-4 h-4 mx-auto"></i></button>
                <button onclick="rotateSelected(5)" class="p-3 bg-white border rounded-xl flex-1 hover:bg-sky-100 transition shadow-sm"><i data-lucide="rotate-cw" class="w-4 h-4 mx-auto"></i></button>
                <button onclick="deleteSelected()" class="p-3 bg-red-50 text-red-500 rounded-xl flex-1 hover:bg-red-500 hover:text-white transition shadow-sm"><i data-lucide="trash-2" class="w-4 h-4 mx-auto"></i></button>
             </div>
          </div>
        </div>

        <!-- View: Manage Stands -->
        <div id="view-stands" class="hidden space-y-4">
          <div class="bg-white p-5 rounded-2xl border-2 border-sky-100 space-y-3 shadow-sm">
            <h4 class="font-black text-sky-600 mb-2 uppercase text-[10px]" id="standFormTitle">ตั้งค่าหลุมจอด</h4>
            <div><label>ชื่อหลุมจอด (ID)</label><input id="st-id" class="w-full p-2.5 border rounded-lg focus:ring-2 outline-none"></div>
            <div class="grid grid-cols-2 gap-2">
               <div><label>กว้าง (ม.)</label><input id="st-w" type="number" class="w-full p-2.5 border rounded-lg"></div>
               <div><label>ยาว (ม.)</label><input id="st-l" type="number" class="w-full p-2.5 border rounded-lg"></div>
            </div>
            <div class="grid grid-cols-2 gap-2">
               <div><label>องศา (Heading)</label><input id="st-heading" type="number" value="0" class="w-full p-2.5 border rounded-lg"></div>
               <div><label>Max ICAO Code</label><select id="st-code" class="w-full p-2.5 border rounded-lg"><option value="C">Code C</option><option value="E">Code E</option><option value="F">Code F</option></select></div>
            </div>
            <div class="p-3 bg-slate-50 rounded-xl space-y-3 border">
                <p class="text-[9px] font-black text-slate-400 uppercase">MARS Logic (Shared Stand)</p>
                <div><label>หลุมหลัก (Parent)</label><select id="st-parent" class="w-full p-2 border rounded-lg"></select></div>
                <div><label>ระยะเยื้อง X (Offset m.)</label><input id="st-offset" type="number" value="0" class="w-full p-2.5 border rounded-lg"></div>
            </div>
            <select id="st-status" class="w-full p-2.5 border rounded-lg font-bold"><option value="active">🟢 เปิดใช้งาน (Active)</option><option value="closed">🔴 ปิดใช้งาน (Closed)</option></select>
            <button onclick="uiSaveStand()" class="w-full bg-sky-600 text-white p-3 rounded-xl font-black text-xs uppercase shadow-lg shadow-sky-200">บันทึกข้อมูลหลุม</button>
          </div>
          <div id="standsTable" class="space-y-2"></div>
        </div>

        <!-- View: Manage Aircraft Models -->
        <div id="view-aircraft" class="hidden space-y-4">
           <div class="bg-slate-800 p-5 rounded-2xl text-white space-y-3 shadow-xl">
             <h4 class="font-black text-slate-400 mb-2 uppercase text-[10px]" id="acFormTitle">ตั้งค่าประเภทเครื่องบิน</h4>
             <div><label class="text-slate-400">รุ่นเครื่องบิน (Model Name)</label><input id="ac-m" class="w-full p-2.5 rounded-lg text-slate-900 border-none"></div>
             <div class="grid grid-cols-2 gap-2">
                <div><label class="text-slate-400">ปีกกว้าง (Span m.)</label><input id="ac-s" type="number" class="w-full p-2.5 rounded-lg text-slate-900 border-none"></div>
                <div><label class="text-slate-400">ยาว (Full Length m.)</label><input id="ac-l" type="number" class="w-full p-2.5 rounded-lg text-slate-900 border-none"></div>
             </div>
             <div class="grid grid-cols-2 gap-2">
                <div><label class="text-slate-400">จมูก-ล้อเมน (m.)</label><input id="ac-nmg" type="number" class="w-full p-2.5 rounded-lg text-slate-900 border-none"></div>
                <div><label class="text-slate-400">องศาเลี้ยว SA (deg)</label><input id="ac-sa" type="number" value="45" class="w-full p-2.5 rounded-lg text-slate-900 border-none"></div>
             </div>
             <div class="grid grid-cols-2 gap-2">
                <div><label class="text-slate-400">Jet Blast (m.)</label><input id="ac-jb" type="number" value="50" class="w-full p-2.5 rounded-lg text-slate-900 border-none"></div>
                <div><label class="text-slate-400">ICAO Category</label><select id="ac-code" class="w-full p-2.5 rounded-lg text-slate-900 border-none font-bold"><option value="C">Code C</option><option value="E">Code E</option><option value="F">Code F</option></select></div>
             </div>
             <div><label class="text-slate-400">สีสัญลักษณ์</label><input id="ac-col" type="color" value="#0ea5e9" class="w-full h-8 rounded-lg border-none p-0.5"></div>
             <button onclick="uiSaveAircraft()" class="w-full bg-sky-500 text-white p-3 rounded-xl font-black text-xs uppercase shadow-lg shadow-sky-900">บันทึกโมเดล</button>
           </div>
           <div id="aircraftTable" class="space-y-2"></div>
        </div>
      </div>
    </aside>

    <!-- Map Area (Canvas Workspace) -->
    <main id="canvasContainer">
      <canvas id="mainCanvas"></canvas>
      
      <!-- Safe Indicators Overlay -->
      <div class="fixed bottom-6 left-96 flex flex-col gap-2 bg-white/95 p-4 rounded-2xl shadow-2xl border border-slate-200 text-[9px] font-black uppercase tracking-wider z-20">
         <div class="flex items-center gap-3"><span class="w-3 h-3 bg-green-500 rounded-full shadow-sm"></span> ปลอดภัย (Safe)</div>
         <div class="flex items-center gap-3"><span class="w-3 h-3 bg-red-500 rounded-full shadow-sm"></span> ไม่ปลอดภัย / พื้นที่ทับซ้อน</div>
         <div class="flex items-center gap-3"><span class="w-3 h-0.5 border-t-2 border-dashed border-red-400"></span> วงเลี้ยว Swing-out (L/R)</div>
         <div class="mt-2 pt-2 border-t text-slate-400">Order: 4-3-2-1 (ขวาไปซ้าย)</div>
      </div>
    </main>
  </div>

<script>
  // --- CONFIG: ใส่ URL AppScript ของท่าน ---
  const WEB_APP_URL = 'https://script.google.com/macros/s/AKfycbxqCIfejWJerGZfjRfZs-Bn0Bq37jIxzAUdX_-fpK5i3hDiEK-6rBNNSE4KFDuITRT7/exec'; 

  let aircraftTypes = [], stands = [], safetyRules = {};
  let placedAircraft = [], selectedIdx = -1, ghostAircraft = null;
  
  // Coordinate & Zoom System
  let baseScale = 4, zoomPercent = 100, scale = 4, originX = 0, originY = 0;
  let isDraggingAC = false;

  const canvas = document.getElementById('mainCanvas');
  const ctx = canvas.getContext('2d');

  async function apiCall(action, data = {}) {
    showLoader(true);
    try {
        const response = await fetch(WEB_APP_URL, { method: 'POST', body: JSON.stringify({ action, data }) });
        const res = await response.json();
        showLoader(false);
        if(res.success) showToast("ดำเนินการสำเร็จ");
        return res.data;
    } catch(e) {
        showLoader(false);
        alert("เกิดข้อผิดพลาดในการเชื่อมต่อเซิร์ฟเวอร์");
        console.error(e);
    }
  }

  function showLoader(show) { document.getElementById('loader').style.display = show ? 'flex' : 'none'; }
  function showToast(msg) { const t = document.getElementById('toast'); t.innerText = msg; t.classList.remove('hidden'); setTimeout(() => t.classList.add('hidden'), 3000); }

  window.onload = async () => { lucide.createIcons(); document.getElementById('datePicker').valueAsDate = new Date(); await loadData(); animate(); };

  async function loadData() {
    const data = await apiCall('getInitialData');
    aircraftTypes = data.aircraftTypes || [];
    stands = data.stands || [];
    safetyRules = data.icaoSafety;
    renderAircraftList(); renderStandsTable(); renderAircraftTypeTable(); updateParentDropdown();
    calculateApronLayout();
  }

  function handleZoom(val) {
    zoomPercent = parseInt(val);
    document.getElementById('zoomDisplay').innerText = zoomPercent + "%";
    scale = (baseScale * zoomPercent) / 100;
    calculateApronLayout();
  }

  function calculateApronLayout() {
    const container = document.getElementById('canvasContainer');
    const parents = stands.filter(s => !s.ParentID).sort((a,b) => String(a.StandID).localeCompare(String(b.StandID), undefined, {numeric: true}));
    
    // คำนวณพื้นที่ Canvas ตามจำนวนหลุมและ Zoom
    const totalWidthM = parents.reduce((sum, s) => sum + s.Width, 0);
    canvas.width = (totalWidthWidthM = (totalWidthM + 150) * scale);
    canvas.height = Math.max(container.clientHeight - 40, 750 * (zoomPercent/100)); 

    // จุดเริ่มวาด (A1 อยู่ขวาสุด)
    originX = canvas.width - (75 * scale);
    originY = canvas.height / 2;

    // คำนวณพิกัดเมตรให้แต่ละหลุม
    let currentMX = 0;
    parents.forEach(s => {
      s.mX = currentMX - (s.Width / 2); s.mY = 0;
      currentMX -= s.Width; 
      stands.filter(child => String(child.ParentID) === String(s.StandID)).forEach(child => {
          child.mX = s.mX + (child.OffsetX || 0); child.mY = 0;
      });
    });
    
    // Auto Scroll ไปที่ A1 เมื่อเปิดครั้งแรก
    if(selectedIdx === -1) {
        setTimeout(() => { container.scrollLeft = container.scrollWidth; }, 100);
    }
  }

  const mToP = (mx, my) => ({ x: originX + mx * scale, y: originY + my * scale });
  const pToM = (px, py) => ({ mx: (px - originX) / scale, my: (py - originY) / scale });

  // --- [CORE LOGIC] Smart Stand Detection ---
  function findBestStand(ac) {
    let potentialStands = stands.filter(s => 
        ac.mX >= (s.mX - s.Width/2) && ac.mX <= (s.mX + s.Width/2) && 
        ac.mY >= (s.mY - s.Length/2) && ac.mY <= (s.mY + s.Length/2)
    );
    if (potentialStands.length === 0) return null;
    
    // เลือกหลุมที่กึ่งกลางใกล้เครื่องที่สุด (สำคัญสำหรับ MARS)
    potentialStands.sort((a, b) => Math.abs(ac.mX - a.mX) - Math.abs(ac.mX - b.mX));
    return potentialStands[0];
  }

  function checkSafety() {
    placedAircraft.forEach((ac, idx) => {
        let safe = true, error = "";
        let stand = findBestStand(ac);
        
        if (stand) {
            if (stand.Status === 'closed') { safe = false; error = "หลุมจอดปิดซ่อมบำรุง"; }
            else if (ac.ICAO.charCodeAt(0) > stand.MaxCode.charCodeAt(0)) { 
                safe = false; error = `ขนาดเครื่องเกิน (หลุม ${stand.StandID} รับได้สูงสุด Code ${stand.MaxCode})`; 
            }
        } else { safe = false; error = "อยู่นอกเขตหลุมจอด"; }

        placedAircraft.forEach((other, oIdx) => {
            if (idx === oIdx) return;
            const dist = Math.hypot(ac.mX - other.mX, ac.mY - other.mY);
            if (dist < (ac.WingSpan/2 + other.WingSpan/2 + safetyRules[ac.ICAO])) { safe = false; error = "ระยะห่างปีกไม่ปลอดภัย"; }
            
            // MARS Sharing Conflict
            let acS = findBestStand(ac); let otS = findBestStand(other);
            if (acS && otS && safe) {
                if (acS.ParentID === otS.StandID || otS.ParentID === acS.StandID || (acS.ParentID && acS.ParentID === otS.ParentID)) {
                    safe = false; error = "พื้นที่ทับซ้อน (MARS Conflict)";
                }
            }
            // Swing-out Collision
            if (ac.swing && safe) {
                const turnRad = Math.hypot(ac.WingSpan/2 + ac.WingSpan/4, ac.Length - ac.NoseToMainGear);
                if (dist - (other.WingSpan/2) < turnRad) { safe = false; error = "วงเลี้ยวชนเครื่องข้างเคียง"; }
            }
        });
        ac.isSafe = safe; ac.errorMsg = error;
    });
  }

  // --- Rendering Loop ---
  function animate() {
    ctx.clearRect(0, 0, canvas.width, canvas.height); checkSafety();
    stands.forEach(s => {
      const p = mToP(s.mX, s.mY), w = s.Width * scale, l = s.Length * scale;
      ctx.save(); ctx.translate(p.x, p.y); ctx.rotate((s.Heading || 0) * Math.PI / 180);
      ctx.strokeStyle = s.Status === 'active' ? '#94a3b8' : '#ef4444'; ctx.setLineDash([4, 4]); ctx.strokeRect(-w/2, -l/2, w, l);
      if(s.Status === 'closed') { ctx.fillStyle = 'rgba(239, 68, 68, 0.1)'; ctx.fillRect(-w/2, -l/2, w, l); }
      ctx.beginPath(); ctx.setLineDash([]); ctx.strokeStyle = '#cbd5e1'; ctx.moveTo(0, -l/2); ctx.lineTo(0, l/2); ctx.stroke();
      
      const fontSize = Math.max(9, 14 * (zoomPercent/100)); 
      ctx.fillStyle = "#0f172a"; const label = `${s.StandID} (Code ${s.MaxCode})`; ctx.font = `bold ${fontSize}px Inter`;
      const tw = ctx.measureText(label).width; ctx.fillRect(-tw/2 - 10, -l/2 - (fontSize * 2.2), tw + 20, fontSize * 1.8);
      ctx.fillStyle = "white"; ctx.textAlign = "center"; ctx.fillText(label, 0, -l/2 - (fontSize * 0.8));
      ctx.fillStyle = "#64748b"; ctx.font = `bold ${fontSize*0.7}px Inter`; ctx.fillText(`${s.Width}x${s.Length}ม.`, 0, l/2 + fontSize);
      ctx.restore();
    });
    placedAircraft.forEach((ac, i) => drawAircraft(ac, i === selectedIdx));
    if (ghostAircraft) { ctx.globalAlpha = 0.5; drawAircraft(ghostAircraft, true); ctx.globalAlpha = 1.0; }
    requestAnimationFrame(animate);
  }

  function drawAircraft(ac, isSelected) {
    const p = mToP(ac.mX, ac.mY), w = ac.WingSpan * scale, l = ac.Length * scale, mb = ac.NoseToMainGear * scale;
    const fontSize = Math.max(8, 11 * (zoomPercent/100));
    ctx.save(); ctx.translate(p.x, p.y); ctx.rotate(ac.heading * Math.PI / 180);
    ctx.beginPath(); ctx.arc(0, 0, (ac.WingSpan/2 + safetyRules[ac.ICAO])*scale, 0, Math.PI*2);
    ctx.fillStyle = ac.isSafe ? 'rgba(34, 197, 94, 0.08)' : 'rgba(239, 68, 68, 0.15)'; ctx.fill();
    if (ac.swing) {
        ctx.setLineDash([4, 4]); ctx.strokeStyle = 'rgba(239, 68, 68, 0.6)';
        const r = Math.hypot(w/2 + w/4, l - mb);
        ctx.beginPath(); ctx.arc(w/4, mb, r, Math.PI, 1.5 * Math.PI); ctx.stroke();
        ctx.beginPath(); ctx.arc(-w/4, mb, r, 1.5 * Math.PI, 2 * Math.PI); ctx.stroke();
    }
    ctx.fillStyle = isSelected ? '#0ea5e9' : (ac.isSafe ? ac.Color : '#ef4444');
    ctx.fillRect(-w/20, -mb, w/10, l); ctx.fillRect(-w/2, -mb + l*0.15, w, l/10); ctx.fillRect(-w/4, -mb + l*0.85, w/2, l/20);
    ctx.restore();
    
    // Labels (Upright)
    ctx.save(); ctx.translate(p.x, p.y);
    ctx.fillStyle = 'rgba(15, 23, 42, 0.8)';
    const mLabel = ac.Model; ctx.font = `bold ${fontSize}px Inter`;
    const mTw = ctx.measureText(mLabel).width; ctx.fillRect(-mTw/2 - 6, -fontSize/2 - 5, mTw + 12, fontSize + 10);
    ctx.fillStyle = "white"; ctx.textAlign = "center"; ctx.fillText(mLabel, 0, fontSize/3);
    if (!ac.isSafe) { ctx.fillStyle = '#b91c1c'; ctx.font = `bold ${fontSize+1}px Sarabun`; ctx.fillText(`⚠️ ${ac.errorMsg}`, 0, -fontSize * 5); }
    ctx.restore();
  }

  // --- UI Handlers ---
  function switchTab(t) { ['planner','stands','aircraft'].forEach(v => { document.getElementById('tab-'+v).classList.toggle('active', v===t); document.getElementById('view-'+v).classList.toggle('hidden', v!==t); }); }
  function pickGhost(i) { ghostAircraft = { ...aircraftTypes[i], heading: 180, mX: 0, mY: 0, swing: false }; }
  function toggleSwingOut() { if(selectedIdx !== -1) placedAircraft[selectedIdx].swing = document.getElementById('swingToggle').checked; }
  function rotateSelected(d) { if(selectedIdx !== -1) placedAircraft[selectedIdx].heading += d; }
  function deleteSelected() { if(selectedIdx !== -1) { placedAircraft.splice(selectedIdx, 1); selectedIdx = -1; document.getElementById('inspector').classList.add('hidden'); } }
  function updateInspector() { const ac = placedAircraft[selectedIdx]; document.getElementById('inspector').classList.remove('hidden'); document.getElementById('swingToggle').checked = ac.swing; document.getElementById('insDetail').innerHTML = `<b>รุ่น: ${ac.Model}</b><br>รหัส: ${ac.ICAO}<br>สถานะ: ${ac.isSafe ? '<span class="text-green-600">ปลอดภัย</span>' : '<span class="text-red-600">ไม่ปลอดภัย</span>'}`; }
  function renderAircraftList() { document.getElementById('acList').innerHTML = aircraftTypes.map((t, i) => `<button onclick="pickGhost(${i})" class="w-full p-4 bg-white border-2 border-slate-100 rounded-2xl text-left hover:border-sky-400 transition flex justify-between items-center shadow-sm group"><div><b class="text-slate-800 text-sm">${t.Model}</b><br><span class="text-[9px] font-black text-slate-400 uppercase tracking-widest">Code ${t.ICAO} | ${t.WingSpan}m</span></div><i data-lucide="plus" class="w-4 h-4 text-slate-300 group-hover:text-sky-500"></i></button>`).join(''); lucide.createIcons(); }
  function renderStandsTable() { document.getElementById('standsTable').innerHTML = stands.map((s, i) => `<div class="flex justify-between items-center p-3 bg-white border rounded-xl text-[10px] font-bold shadow-sm group"><div>${s.StandID}</div><div class="flex gap-1"><button onclick="editStand(${i})" class="bg-sky-50 text-sky-600 p-1.5 rounded hover:bg-sky-500 hover:text-white transition">แก้ไข</button><button onclick="uiDeleteStand('${s.StandID}')" class="bg-red-50 text-red-400 p-1.5 rounded hover:bg-red-500 hover:text-white transition">ลบ</button></div></div>`).join(''); lucide.createIcons(); }
  function renderAircraftTypeTable() { document.getElementById('aircraftTable').innerHTML = aircraftTypes.map((ac, i) => `<div class="flex justify-between items-center p-3 bg-white border rounded-xl text-[10px] font-bold shadow-sm group"><span>${ac.Model}</span><div class="flex gap-1"><button onclick="editAircraft(${i})" class="bg-sky-50 text-sky-600 p-1.5 rounded hover:bg-sky-500 hover:text-white transition">แก้ไข</button><button onclick="uiDeleteAircraft('${ac.Model}')" class="bg-red-50 text-red-500 p-1.5 rounded hover:bg-red-500 hover:text-white transition">ลบ</button></div></div>`).join(''); lucide.createIcons(); }
  function updateParentDropdown() { document.getElementById('st-parent').innerHTML = '<option value="">-- ไม่มี (หลุมจอดหลัก) --</option>' + stands.filter(s => !s.ParentID).map(p => `<option value="${p.StandID}">${p.StandID}</option>`).join(''); }
  
  canvas.onmousedown = (e) => {
    const r = canvas.getBoundingClientRect(); const pos = pToM(e.clientX - r.left, e.clientY - r.top);
    if (ghostAircraft) { placedAircraft.push({ ...ghostAircraft }); ghostAircraft = null; return; }
    selectedIdx = placedAircraft.findIndex(ac => Math.hypot(ac.mX - pos.mx, ac.mY - pos.my) < (ac.WingSpan/2 + 2));
    if(selectedIdx !== -1) { isDraggingAC = true; updateInspector(); } else document.getElementById('inspector').classList.add('hidden');
  };
  canvas.onmousemove = (e) => {
    const r = canvas.getBoundingClientRect(); const pos = pToM(e.clientX - r.left, e.clientY - r.top);
    if (ghostAircraft) { ghostAircraft.mX = pos.mx; ghostAircraft.mY = pos.my; 
        stands.forEach(s => { if(Math.abs(pos.mx - s.mX) < 10 && Math.abs(pos.my - s.mY) < 15) { ghostAircraft.mX = s.mX; ghostAircraft.mY = s.mY; ghostAircraft.heading = 180; }});
    } else if (isDraggingAC && selectedIdx !== -1) { placedAircraft[selectedIdx].mX = pos.mx; placedAircraft[selectedIdx].mY = pos.my; updateInspector(); }
  };
  canvas.onmouseup = () => isDraggingAC = false;

  // --- CRUD Functions ---
  async function uiSaveStand() { const data = { StandID: document.getElementById('st-id').value, Width: Number(document.getElementById('st-w').value), Length: Number(document.getElementById('st-l').value), Heading: Number(document.getElementById('st-heading').value), MaxCode: document.getElementById('st-code').value, Status: document.getElementById('st-status').value, ParentID: document.getElementById('st-parent').value, OffsetX: Number(document.getElementById('st-offset').value) }; await apiCall('saveStand', data); await loadData(); }
  async function uiSaveAircraft() { const data = { Model: document.getElementById('ac-m').value, WingSpan: Number(document.getElementById('ac-s').value), Length: Number(document.getElementById('ac-l').value), NoseToMainGear: Number(document.getElementById('ac-nmg').value), SteeringAngle: Number(document.getElementById('ac-sa').value), JetBlast: Number(document.getElementById('ac-jb').value), ICAO: document.getElementById('ac-code').value, Color: document.getElementById('ac-col').value }; await apiCall('saveAircraftType', data); await loadData(); }
  async function uiDeleteStand(id) { if(confirm('ลบหลุมจอด '+id+'?')) { await apiCall('deleteStand', {id}); await loadData(); } }
  async function uiDeleteAircraft(id) { if(confirm('ลบประเภทเครื่อง '+id+'?')) { await apiCall('deleteAircraftType', {id}); await loadData(); } }
  function editStand(i) { const s = stands[i]; document.getElementById('st-id').value = s.StandID; document.getElementById('st-w').value = s.Width; document.getElementById('st-l').value = s.Length; document.getElementById('st-heading').value = s.Heading || 0; document.getElementById('st-code').value = s.MaxCode; document.getElementById('st-status').value = s.Status; document.getElementById('st-parent').value = s.ParentID || ""; document.getElementById('st-offset').value = s.OffsetX || 0; switchTab('stands'); }
  function editAircraft(i) { const ac = aircraftTypes[i]; document.getElementById('ac-m').value = ac.Model; document.getElementById('ac-s').value = ac.WingSpan; document.getElementById('ac-l').value = ac.Length; document.getElementById('ac-nmg').value = ac.NoseToMainGear; document.getElementById('ac-sa').value = ac.SteeringAngle; document.getElementById('ac-jb').value = ac.JetBlast; document.getElementById('ac-code').value = ac.ICAO; document.getElementById('ac-col').value = ac.Color; switchTab('aircraft'); }
</script>
</body>
