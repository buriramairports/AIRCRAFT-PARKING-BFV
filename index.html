<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <title>Apron Simulation BETA v1.0 - BURIRAM AIRPORT</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=Sarabun:wght@400;700&display=swap" rel="stylesheet">
  <style>
    body { height: 100vh; display: flex; flex-direction: column; overflow: hidden; font-family: 'Inter', 'Sarabun', sans-serif; }
    #canvasContainer { flex: 1; overflow: auto; background-color: #cbd5e1; position: relative; scroll-behavior: smooth; }
    canvas { background-color: #f1f5f9; cursor: crosshair; touch-action: none; display: block; margin: auto; }
    .tab-btn.active { border-bottom: 3px solid #0ea5e9; color: #0ea5e9; background-color: #f8fafc; }
    label { font-size: 10px; font-weight: 800; color: #64748b; text-transform: uppercase; letter-spacing: 0.05em; display: block; }
    #mathPanel { position: fixed; top: 70px; right: 20px; width: 280px; background: rgba(15, 23, 42, 0.9); color: #22d3ee; padding: 15px; border-radius: 20px; font-family: monospace; font-size: 11px; z-index: 50; border: 1px solid #0ea5e9; }
    #mathPanel h4 { color: #fff; font-weight: bold; margin-bottom: 10px; border-bottom: 1px solid #334155; padding-bottom: 5px; }
  </style>
</head>
<body class="bg-slate-50">

  <!-- Math & Formula Panel -->
  <div id="mathPanel" class="shadow-2xl">
     <h4><i data-lucide="calculator" class="w-4 h-4 inline mr-1"></i> Calculation Engine</h4>
     <div id="mathOutput" class="space-y-2">
        <p class="text-slate-400">เลือกเครื่องบินเพื่อดูการคำนวณ...</p>
     </div>
  </div>

  <header class="bg-slate-900 text-white h-14 px-6 flex justify-between items-center shadow-xl shrink-0 z-30">
    <div class="flex items-center gap-3">
      <div class="bg-yellow-500 p-1.5 rounded text-slate-900 shadow-lg"><i data-lucide="compass"></i></div>
      <h1 class="text-lg font-black tracking-tighter text-sky-400 uppercase">Apron Simulation BETA - BURIRAM AIRPORT<span class="text-white text-xs ml-1">v1.0</span></h1>
    </div>
    <button onclick="loadData()" class="bg-slate-700 p-2 rounded hover:bg-slate-600 transition"><i data-lucide="refresh-cw" class="w-4 h-4 text-white"></i></button>
  </header>

  <!-- Aircraft Toolbar -->
  <div class="bg-white border-b h-20 flex items-center px-6 gap-3 overflow-x-auto shrink-0 z-20 shadow-sm no-scrollbar">
     <div id="acToolbar" class="flex gap-2"></div>
  </div>

  <div class="flex flex-1 overflow-hidden">
    <aside class="w-80 bg-white border-r flex flex-col shadow-2xl z-20 shrink-0">
      <div class="flex border-b text-[10px] font-black uppercase text-slate-400">
        <button onclick="switchTab('inspector')" id="tab-inspector" class="flex-1 p-4 border-b-2 border-sky-500 text-sky-600 bg-sky-50/50">Details</button>
        <button onclick="switchTab('data')" id="tab-data" class="flex-1 p-4 border-b-2 border-transparent">Config</button>
      </div>

      <div class="p-5 flex-1 overflow-y-auto">
        <div id="view-inspector" class="space-y-6">
          <div class="p-4 bg-sky-50 rounded-2xl border border-sky-100 shadow-inner">
             <div class="flex justify-between items-center mb-2">
                <span class="text-[9px] font-black text-slate-400 uppercase">Map Zoom</span>
                <span id="zoomDisplay" class="text-xs font-bold text-sky-600">100%</span>
             </div>
             <input type="range" id="zoomSlider" min="50" max="200" value="100" class="w-full h-1 bg-sky-200 rounded-lg appearance-none cursor-pointer accent-sky-600" oninput="handleZoom(this.value)">
          </div>

          <div id="activePlanePanel" class="hidden animate-fadeIn space-y-4">
             <div class="p-5 bg-slate-900 text-white rounded-3xl shadow-xl space-y-1 border-b-4 border-sky-500">
                <h3 id="insModel" class="text-2xl font-black">Model</h3>
                <p id="insStatus" class="text-xs font-bold uppercase tracking-widest text-emerald-400">Safe</p>
             </div>
             <label class="flex items-center justify-between p-3 bg-white rounded-xl border-2 border-slate-100 cursor-pointer">
                <span class="text-[10px] font-black uppercase text-slate-400">Swing-out Sim</span>
                <input type="checkbox" id="swingToggle" onchange="toggleSwingOut()" class="w-5 h-5 accent-sky-500">
             </label>
             <div class="grid grid-cols-2 gap-2">
                <button onclick="rotateSelected(-5)" class="p-4 bg-slate-100 rounded-2xl hover:bg-slate-200 transition font-bold"><i data-lucide="rotate-ccw" class="w-5 h-5 mx-auto"></i></button>
                <button onclick="rotateSelected(5)" class="p-4 bg-slate-100 rounded-2xl hover:bg-slate-200 transition font-bold"><i data-lucide="rotate-cw" class="w-5 h-5 mx-auto"></i></button>
                <button onclick="deleteSelected()" class="col-span-2 p-3 bg-red-50 text-red-500 rounded-xl font-bold flex items-center justify-center gap-2 hover:bg-red-500 hover:text-white transition shadow-sm"><i data-lucide="trash-2" class="w-4 h-4"></i> ลบ</button>
             </div>
          </div>
          <div id="noSelectionMsg" class="py-20 text-center text-slate-300 italic text-sm">คลิกเลือกเครื่องเพื่อจำลอง</div>
        </div>

        <div id="view-data" class="hidden space-y-6">
           <div class="space-y-4">
              <div class="flex justify-between items-center"><h3 class="font-black text-[10px] text-slate-400 uppercase">Stands</h3><button onclick="openStandModal()" class="text-sky-600 font-bold text-[10px]">+ เพิ่มหลุม</button></div>
              <div id="standsTable" class="space-y-2"></div>
           </div>
        </div>
      </div>

      <div class="p-5 bg-slate-50 border-t flex flex-col gap-2 shrink-0">
         <div class="flex items-center gap-3"><span class="w-3 h-3 bg-green-500 rounded-full"></span> <span class="text-[10px] font-bold text-slate-500">SAFE (PASS)</span></div>
         <div class="flex items-center gap-3"><span class="w-3 h-3 bg-red-500 rounded-full"></span> <span class="text-[10px] font-bold text-slate-500">DANGER / CONFLICT</span></div>
      </div>
    </aside>

    <main id="canvasContainer">
      <canvas id="mainCanvas"></canvas>
    </main>
  </div>

  <!-- Modal Stand (Updated with T-Mark Fields) -->
  <div id="modalStand" class="modal fixed inset-0 bg-slate-900/60 backdrop-blur hidden items-center justify-center z-[100]">
    <div class="bg-white rounded-3xl w-[400px] shadow-2xl overflow-hidden animate-fadeIn">
       <div class="bg-slate-900 p-5 text-white flex justify-between items-center">
          <h3 id="standFormTitle" class="font-bold">ตั้งค่าหลุมจอด</h3>
          <button onclick="closeModal('modalStand')"><i data-lucide="x"></i></button>
       </div>
       <div class="p-6 space-y-4">
          <div><label>Stand ID</label><input id="st-id" class="w-full p-2 border rounded-lg"></div>
          <div class="grid grid-cols-2 gap-4">
             <div><label>กว้าง (ม.)</label><input id="st-w" type="number" class="w-full p-2 border rounded-lg"></div>
             <div><label>ยาว (ม.)</label><input id="st-l" type="number" class="w-full p-2 border rounded-lg"></div>
          </div>
          <div class="grid grid-cols-2 gap-4">
             <div><label>T-MARK 1 (Nose Gear)</label><input id="st-t1" type="number" value="15" class="w-full p-2 border border-yellow-400 rounded-lg"></div>
             <div><label>T-MARK 2 (Limit)</label><input id="st-t2" type="number" value="20" class="w-full p-2 border border-yellow-400 rounded-lg"></div>
          </div>
          <select id="st-parent" class="w-full p-2 border rounded-lg"></select>
          <input id="st-offset" type="number" value="0" class="w-full p-2 border rounded-lg" placeholder="OffsetX">
          <button onclick="uiSaveStand()" class="w-full bg-sky-600 text-white p-4 rounded-2xl font-bold shadow-lg">Save Configuration</button>
       </div>
    </div>
  </div>

<script>
  const WEB_APP_URL = 'https://script.google.com/macros/s/AKfycbxqCIfejWJerGZfjRfZs-Bn0Bq37jIxzAUdX_-fpK5i3hDiEK-6rBNNSE4KFDuITRT7/exec'; 

  let aircraftTypes = [], stands = [], safetyRules = {};
  let placedAircraft = [], selectedIdx = -1, ghostAircraft = null;
  let baseScale = 4, zoomPercent = 100, scale = 4, originX = 0, originY = 0;
  let isDraggingAC = false;

  const canvas = document.getElementById('mainCanvas');
  const ctx = canvas.getContext('2d');

  async function apiCall(action, data = {}) {
    showLoader(true);
    const response = await fetch(WEB_APP_URL, { method: 'POST', body: JSON.stringify({ action, data }) });
    const res = await response.json();
    showLoader(false);
    return res.data;
  }

  function showLoader(show) { document.getElementById('loader').style.display = show ? 'flex' : 'none'; }
  function showToast(msg) { const t = document.getElementById('toast'); t.innerText = msg; t.classList.remove('hidden'); setTimeout(() => t.classList.add('hidden'), 3000); }
  function closeModal(id) { document.getElementById(id).classList.add('hidden'); }
  function switchTab(t) { 
    ['inspector','data'].forEach(v => {
      document.getElementById('tab-'+v).classList.toggle('bg-sky-50/50', v===t);
      document.getElementById('tab-'+v).classList.toggle('border-sky-500', v===t);
      document.getElementById('view-'+v).classList.toggle('hidden', v!==t);
    });
  }

  window.onload = async () => { lucide.createIcons(); await loadData(); animate(); };

  async function loadData() {
    const data = await apiCall('getInitialData');
    aircraftTypes = data.aircraftTypes || [];
    stands = data.stands || [];
    safetyRules = data.icaoSafety;
    renderAircraftToolbar(); renderStandsTable(); updateParentDropdown();
    calculateApronLayout();
  }

  function renderAircraftToolbar() {
    document.getElementById('acToolbar').innerHTML = aircraftTypes.map((t, i) => `
      <button onclick="pickGhost(${i})" class="flex flex-col items-center justify-center p-2 bg-slate-50 border-2 border-slate-100 rounded-xl hover:border-sky-500 transition w-24 shrink-0 shadow-sm">
        <b class="text-[10px] text-slate-800">${t.Model}</b>
        <span class="text-[8px] font-black text-sky-500">CODE ${t.ICAO}</span>
      </button>`).join('');
  }

  function calculateApronLayout() {
    const container = document.getElementById('canvasContainer');
    const parents = stands.filter(s => !s.ParentID).sort((a,b) => String(a.StandID).localeCompare(String(b.StandID), undefined, {numeric: true}));
    const totalW = parents.reduce((sum, s) => sum + s.Width, 0);
    canvas.width = (totalW + 200) * scale; canvas.height = 700 * (zoomPercent/100);
    originX = canvas.width - (100 * scale); originY = canvas.height / 2;
    let currX = 0;
    parents.forEach(s => {
      s.mX = currX - (s.Width/2); s.mY = 0;
      currX -= s.Width;
      stands.filter(c => String(c.ParentID) === String(s.StandID)).forEach(c => { c.mX = s.mX + (c.OffsetX || 0); c.mY = 0; });
    });
    container.scrollLeft = container.scrollWidth;
  }

  // --- SAFETY ENGINE v18 ---
  function checkSafety() {
    let mathLog = "";
    placedAircraft.forEach((ac, idx) => {
        let safe = true, error = "";
        let stand = stands.find(s => ac.mX >= (s.mX - s.Width/2) && ac.mX <= (s.mX + s.Width/2) && ac.mY >= (s.mY - s.Length/2) && ac.mY <= (s.mY + s.Length/2));
        
        if (stand) {
            // 1. Boundary & T-Mark Check (Nose wheel limit)
            const t1 = Number(stand.TMark1 || 15);
            const t2 = Number(stand.TMark2 || 20);
            const noseWheelY = ac.mY + (ac.Length/2 - ac.NoseToMainGear);
            const noseYFromStandEdge = noseWheelY - (stand.mY - stand.Length/2);

            if (noseYFromStandEdge < 0) { safe=false; error="จอดล้นขอบท้าย (Tail Overhang)"; }
            if (noseYFromStandEdge > stand.Length) { safe=false; error="จอดล้นขอบหน้า (Head Overhang)"; }

            // Math Logging for UI
            if (idx === selectedIdx) {
                mathLog += `<p class="text-sky-300 underline">Stand Boundary Checklist</p>`;
                mathLog += `<p>Stand: ${stand.StandID} (Len: ${stand.Length}m)</p>`;
                mathLog += `<p>Nose Wheel Pos: ${noseYFromStandEdge.toFixed(2)}m</p>`;
                mathLog += `<p>Limit: 0m < Nose < ${stand.Length}m</p>`;
            }
        } else { safe=false; error="อยู่นอกเขตหลุมจอด"; }

        placedAircraft.forEach((other, oIdx) => {
            if (idx === oIdx) return;
            const dist = Math.hypot(ac.mX - other.mX, ac.mY - other.mY);
            const clearance = dist - (ac.WingSpan/2 + other.WingSpan/2);
            const minReq = safetyRules[ac.ICAO];

            if (clearance < minReq) { safe=false; error="ปีกใกล้เครื่องข้างเคียงเกินไป"; }

            if (idx === selectedIdx) {
                mathLog += `<div class="mt-2 p-2 bg-slate-800 rounded">`;
                mathLog += `<p class="text-yellow-400">vs Stand ${other.StandID}</p>`;
                mathLog += `<p>Span1: ${ac.WingSpan} | Span2: ${other.WingSpan}</p>`;
                mathLog += `<p>Clearance: ${clearance.toFixed(2)}m (Min: ${minReq}m)</p>`;
                mathLog += `</div>`;
            }
        });
        ac.isSafe = safe; ac.errorMsg = error;
    });
    document.getElementById('mathOutput').innerHTML = mathLog || '<p class="text-slate-500 italic">Ready for calculation...</p>';
  }

  function animate() {
    ctx.clearRect(0, 0, canvas.width, canvas.height); checkSafety();
    
    // วาดหลุมจอดและเส้นมาตรฐาน
    stands.forEach(s => {
      const p = mToP(s.mX, s.mY), w = s.Width * scale, l = s.Length * scale;
      ctx.save(); ctx.translate(p.x, p.y); ctx.rotate((s.Heading || 0) * Math.PI / 180);
      
      // Box & Background
      ctx.strokeStyle = s.Status === 'active' ? '#94a3b8' : '#ef4444';
      ctx.setLineDash([5, 5]); ctx.strokeRect(-w/2, -l/2, w, l);
      
      // --- เส้นกึ่งกลางหลุม (Yellow Centerline) ---
      ctx.beginPath(); ctx.setLineDash(s.ParentID ? [10, 5] : []);
      ctx.strokeStyle = "#facc15"; ctx.lineWidth = 3;
      const t1Y = -l/2 + (Number(s.TMark1 || 15) * scale);
      ctx.moveTo(0, l/2); ctx.lineTo(0, t1Y); ctx.stroke();

      // --- T-MARK Visuals ---
      ctx.setLineDash([]); ctx.lineWidth = 2;
      [s.TMark1, s.TMark2].forEach(tm => {
          const tmY = -l/2 + (Number(tm || 15) * scale);
          ctx.moveTo(-5*scale, tmY); ctx.lineTo(5*scale, tmY); ctx.stroke();
      });

      // Name Badge
      ctx.fillStyle = "#0f172a"; ctx.font = "bold 15px Inter";
      const lbl = `${s.StandID} (Code ${s.MaxCode})`;
      const tw = ctx.measureText(lbl).width; ctx.fillRect(-tw/2-10, -l/2-35, tw+20, 25);
      ctx.fillStyle="#fff"; ctx.textAlign="center"; ctx.fillText(lbl, 0, -l/2-18);
      ctx.restore();
    });

    placedAircraft.forEach((ac, i) => drawAircraft(ac, i === selectedIdx));
    
    // --- เส้นเชื่อมระยะห่างปลายปีก (Wingtip Dimension Line) ---
    for(let i=0; i<placedAircraft.length; i++){
        for(let j=i+1; j<placedAircraft.length; j++){
            const ac1 = placedAircraft[i]; const ac2 = placedAircraft[j];
            const dist = Math.hypot(ac1.mX - ac2.mX, ac1.mY - ac2.mY);
            const clearance = dist - (ac1.WingSpan/2 + ac2.WingSpan/2);
            
            if(clearance < 20) { // แสดงเมื่ออยู่ใกล้กัน
                const p1 = mToP(ac1.mX + ac1.WingSpan/2, ac1.mY);
                const p2 = mToP(ac2.mX - ac2.WingSpan/2, ac1.mY);
                ctx.beginPath(); ctx.strokeStyle="#64748b"; ctx.lineWidth=1;
                ctx.moveTo(p1.x, p1.y); ctx.lineTo(p2.x, p2.y); ctx.stroke();
                ctx.fillStyle="#475569"; ctx.font="9px monospace";
                ctx.fillText(clearance.toFixed(1)+"m", (p1.x+p2.x)/2, p1.y-5);
            }
        }
    }

    if (ghostAircraft) { ctx.globalAlpha = 0.5; drawAircraft(ghostAircraft, true); ctx.globalAlpha = 1.0; }
    requestAnimationFrame(animate);
  }

  function drawAircraft(ac, isSelected) {
    const p = mToP(ac.mX, ac.mY), w = ac.WingSpan * scale, l = ac.Length * scale, mb = ac.NoseToMainGear * scale;
    ctx.save(); ctx.translate(p.x, p.y); ctx.rotate(ac.heading * Math.PI / 180);
    ctx.beginPath(); ctx.arc(0, 0, (ac.WingSpan/2 + safetyRules[ac.ICAO])*scale, 0, Math.PI*2);
    ctx.fillStyle = ac.isSafe ? 'rgba(34, 197, 94, 0.08)' : 'rgba(239, 68, 68, 0.15)'; ctx.fill();
    
    // Body Shape
    ctx.fillStyle = isSelected ? '#0ea5e9' : (ac.isSafe ? ac.Color : '#ef4444');
    ctx.fillRect(-w/20, -mb, w/10, l); ctx.fillRect(-w/2, -mb + l*0.15, w, l/10); ctx.fillRect(-w/4, -mb + l*0.85, w/2, l/20);
    ctx.restore();

    // Model Label (Upright)
    ctx.save(); ctx.translate(p.x, p.y); ctx.fillStyle='rgba(15,23,42,0.8)';
    const mTw = ctx.measureText(ac.Model).width; ctx.fillRect(-mTw/2-6, -11, mTw+12, 22);
    ctx.fillStyle="#fff"; ctx.textAlign="center"; ctx.font="bold 11px Inter"; ctx.fillText(ac.Model, 0, 4);
    if (!ac.isSafe) { ctx.fillStyle='#ef4444'; ctx.font="bold 12px Sarabun"; ctx.fillText("⚠️ "+ac.errorMsg, 0, -50); }
    ctx.restore();
  }

  // --- Interaction & Helpers ---
  function handleZoom(v) { zoomPercent=v; document.getElementById('zoomDisplay').innerText=v+"%"; scale=(baseScale*zoomPercent)/100; calculateApronLayout(); }
  function switchTab(t) { ['inspector','data'].forEach(v => { document.getElementById('tab-'+v).classList.toggle('bg-sky-50/50', v===t); document.getElementById('view-'+v).classList.toggle('hidden', v!==t); }); }
  function pickGhost(i) { ghostAircraft = { ...aircraftTypes[i], heading: 180, mX: 0, mY: 0, swing: false }; }
  function toggleSwingOut() { if(selectedIdx !== -1) placedAircraft[selectedIdx].swing = document.getElementById('swingToggle').checked; }
  function rotateSelected(d) { if(selectedIdx !== -1) placedAircraft[selectedIdx].heading += d; }
  function deleteSelected() { if(selectedIdx !== -1) { placedAircraft.splice(selectedIdx, 1); selectedIdx = -1; document.getElementById('activePlanePanel').classList.add('hidden'); document.getElementById('noSelectionMsg').classList.remove('hidden'); } }
  function updateInspector() { const ac = placedAircraft[selectedIdx]; document.getElementById('activePlanePanel').classList.remove('hidden'); document.getElementById('noSelectionMsg').classList.add('hidden'); document.getElementById('swingToggle').checked = ac.swing; document.getElementById('insModel').innerText = ac.Model; }
  canvas.onmousedown = (e) => {
    const r = canvas.getBoundingClientRect(); const world = pToM(e.clientX-r.left, e.clientY-r.top);
    if (ghostAircraft) { placedAircraft.push({ ...ghostAircraft }); ghostAircraft = null; return; }
    selectedIdx = placedAircraft.findIndex(ac => Math.hypot(ac.mX - world.mx, ac.mY - world.my) < (ac.WingSpan/2 + 2));
    if(selectedIdx !== -1) updateInspector(); else { document.getElementById('activePlanePanel').classList.add('hidden'); document.getElementById('noSelectionMsg').classList.remove('hidden'); }
  };
  canvas.onmousemove = (e) => {
    const r = canvas.getBoundingClientRect(); const world = pToM(e.clientX-r.left, e.clientY-r.top);
    if (ghostAircraft) { ghostAircraft.mX = world.mx; ghostAircraft.mY = world.my; 
        stands.forEach(s => { if(Math.abs(world.mx-s.mX) < 10 && Math.abs(world.my-s.mY) < 15) { ghostAircraft.mX=s.mX; ghostAircraft.mY=s.mY; ghostAircraft.heading=180; }});
    } else if (selectedIdx !== -1 && e.buttons === 1) { placedAircraft[selectedIdx].mX = world.mx; placedAircraft[selectedIdx].mY = world.my; updateInspector(); }
  };
  function renderStandsTable() { document.getElementById('standsTable').innerHTML = stands.map((s, i) => `<div class="flex justify-between items-center p-2.5 bg-white border rounded-xl text-[10px] font-bold shadow-sm"><div>${s.StandID}</div><button onclick="editStand(${i})" class="text-sky-600 px-2 py-1 bg-sky-50 rounded">แก้ไข</button></div>`).join(''); }
  function openStandModal() { document.getElementById('modalStand').classList.remove('hidden'); updateParentDropdown(); }
  function editStand(i) { const s = stands[i]; document.getElementById('st-id').value = s.StandID; document.getElementById('st-w').value = s.Width; document.getElementById('st-l').value = s.Length; document.getElementById('st-t1').value = s.TMark1 || 15; document.getElementById('st-t2').value = s.TMark2 || 20; document.getElementById('modalStand').classList.remove('hidden'); }
  async function uiSaveStand() { const d = { StandID: document.getElementById('st-id').value, Width: Number(document.getElementById('st-w').value), Length: Number(document.getElementById('st-l').value), TMark1: Number(document.getElementById('st-t1').value), TMark2: Number(document.getElementById('st-t2').value), Status: 'active' }; await apiCall('saveStand', d); closeModal('modalStand'); await loadData(); }
</script>
</body>
</html>
