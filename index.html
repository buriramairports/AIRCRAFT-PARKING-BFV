<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <title>Apron Simulation v5 - Right-to-Left</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>
  <style>
    body { height: 100vh; display: flex; flex-direction: column; overflow: hidden; font-family: 'Inter', sans-serif; }
    canvas { background-color: #f1f5f9; cursor: crosshair; touch-action: none; border-radius: 12px; }
  </style>
</head>
<body class="bg-slate-100">

  <header class="bg-slate-900 text-white p-4 flex justify-between items-center shadow-xl z-20">
    <div class="flex items-center gap-3">
      <div class="bg-sky-500 p-2 rounded-lg text-white shadow-lg"><i data-lucide="shield-check"></i></div>
      <h1 class="text-xl font-black tracking-tighter text-sky-400">APRON OPS v5 <span class="text-white">| R-TO-L LAYOUT</span></h1>
    </div>
    <div class="flex gap-3">
      <input type="date" id="datePicker" class="text-slate-900 px-3 py-2 rounded-lg text-sm font-bold shadow-inner">
      <button onclick="location.reload()" class="bg-slate-700 hover:bg-slate-600 px-4 py-2 rounded-lg font-bold text-sm transition"><i data-lucide="refresh-cw" class="w-4 h-4"></i></button>
    </div>
  </header>

  <div class="flex flex-1 overflow-hidden">
    <!-- Sidebar -->
    <aside class="w-80 bg-white border-r flex flex-col shadow-2xl z-10">
      <div class="p-6 overflow-y-auto flex-1 space-y-6">
        <div>
          <h3 class="text-[10px] font-black text-slate-400 uppercase tracking-[0.2em] mb-4">Select Aircraft Model</h3>
          <div id="acList" class="grid grid-cols-1 gap-2"></div>
        </div>

        <div id="inspector" class="hidden animate-fadeIn space-y-4">
          <h3 class="text-[10px] font-black text-slate-400 uppercase tracking-[0.2em]">Inspector</h3>
          <div class="p-4 bg-slate-50 rounded-2xl border-2 border-slate-100 space-y-3 shadow-sm">
             <div id="insDetail" class="text-sm font-medium text-slate-700 leading-relaxed"></div>
             
             <div class="flex items-center justify-between p-2 bg-white rounded-lg border">
                <span class="text-xs font-bold text-slate-500">Dual Swing-out Sim</span>
                <input type="checkbox" id="swingToggle" onchange="toggleSwingOut()" class="w-5 h-5 accent-sky-500 cursor-pointer">
             </div>

             <div class="flex gap-2">
                <button onclick="rotateSelected(-5)" class="p-3 bg-white border rounded-xl hover:bg-slate-200 transition"><i data-lucide="rotate-ccw" class="w-4 h-4 text-slate-600"></i></button>
                <button onclick="rotateSelected(5)" class="p-3 bg-white border rounded-xl hover:bg-slate-200 transition"><i data-lucide="rotate-cw" class="w-4 h-4 text-slate-600"></i></button>
                <button onclick="deleteSelected()" class="p-3 bg-red-50 text-red-500 rounded-xl flex-1 font-bold transition hover:bg-red-500 hover:text-white flex items-center justify-center gap-2 border border-red-100 shadow-sm"><i data-lucide="trash-2" class="w-4 h-4"></i> ลบ</button>
             </div>
          </div>
        </div>
      </div>
    </aside>

    <!-- Canvas Area -->
    <main class="flex-1 p-8 relative bg-slate-200 shadow-inner">
      <canvas id="mainCanvas"></canvas>
      
      <!-- Indicators -->
      <div class="absolute bottom-10 left-10 flex flex-col gap-3 bg-white/95 p-5 rounded-2xl shadow-2xl border border-slate-200 text-[10px] font-black uppercase tracking-wider">
         <div class="flex items-center gap-3"><span class="w-4 h-4 bg-green-500 rounded-full shadow-sm"></span> Safe (ICAO Clearance)</div>
         <div class="flex items-center gap-3"><span class="w-4 h-4 bg-red-500 rounded-full shadow-sm"></span> Danger / Intersection</div>
         <div class="flex items-center gap-3"><span class="w-4 h-1 border-t-2 border-dashed border-red-400"></span> Bilateral Swing-out</div>
         <div class="mt-2 pt-3 border-t-2 border-slate-100 text-slate-400 flex flex-col gap-1">
            <span>Layout: Right to Left (1 → 4)</span>
            <span>Scale: 1m = 4px</span>
         </div>
      </div>
    </main>
  </div>

<script>
  // CONFIG: แก้ไข URL ของคุณที่นี่
  const WEB_APP_URL = 'https://script.google.com/macros/s/AKfycbxqCIfejWJerGZfjRfZs-Bn0Bq37jIxzAUdX_-fpK5i3hDiEK-6rBNNSE4KFDuITRT7/exec'; 

  let aircraftTypes = [], stands = [], safetyRules = {};
  let placedAircraft = [];
  let selectedIdx = -1, isDragging = false, ghostAircraft = null;
  let scale = 4;

  const canvas = document.getElementById('mainCanvas');
  const ctx = canvas.getContext('2d');

  async function apiCall(action, data = {}) {
    const response = await fetch(WEB_APP_URL, { method: 'POST', body: JSON.stringify({ action, data }) });
    const res = await response.json();
    return res.data;
  }

  window.onload = async () => {
    lucide.createIcons();
    document.getElementById('datePicker').valueAsDate = new Date();
    await loadData();
    resize();
    calculateStandPositions(); // คำนวณครั้งเดียวหลังโหลดข้อมูล
    animate();
  };

  async function loadData() {
    try {
      const data = await apiCall('getInitialData');
      aircraftTypes = data.aircraftTypes;
      // เรียงจาก A1 ไป A4 เพื่อเตรียมวาดจากขวามาซ้าย
      stands = data.stands.sort((a,b) => a.StandID.localeCompare(b.StandID, undefined, {numeric: true}));
      safetyRules = data.icaoSafety;
      renderAircraftList();
    } catch(e) { console.error(e); }
  }

  // ปรับจูนระบบคำนวณ: เริ่มวาดจากขวาสุดของจอ และลดพิกัด X ลงเรื่อยๆ
  function calculateStandPositions() {
    let currentX = canvas.width - 100; // จุดเริ่มฝั่งขวา (เว้นขอบ 100px)
    stands.forEach(s => {
      const w = s.Width * scale;
      s.computedX = currentX - w/2; // กึ่งกลางหลุม
      s.computedY = 350;            // ความสูงมาตรฐานบน Canvas
      currentX -= w;                // หลุมถัดไปขยับไปทางซ้าย
    });
  }

  function renderAircraftList() {
    const list = document.getElementById('acList');
    aircraftTypes.forEach(type => {
      const div = document.createElement('div');
      div.className = "plane-card p-4 bg-white border-2 border-slate-100 rounded-2xl cursor-pointer hover:border-sky-400 transition flex justify-between items-center group shadow-sm";
      div.innerHTML = `<div><div class="font-black text-slate-800 text-sm">${type.Model}</div><div class="text-[9px] text-slate-400 font-bold">Span: ${type.WingSpan}m | Code: ${type.ICAO}</div></div><i data-lucide="plus" class="w-4 h-4 text-slate-300 group-hover:text-sky-500"></i>`;
      div.onclick = () => { ghostAircraft = { ...type, heading: 180, x: 0, y: 0, swing: false, isSafe: true }; };
      list.appendChild(div);
    });
    lucide.createIcons();
  }

  // --- Interaction ---
  canvas.onmousemove = (e) => {
    const rect = canvas.getBoundingClientRect();
    const mx = e.clientX - rect.left, my = e.clientY - rect.top;

    if (ghostAircraft) {
      updatePos(ghostAircraft, mx, my);
    } else if (isDragging && selectedIdx !== -1) {
      updatePos(placedAircraft[selectedIdx], mx, my);
      updateInspector();
    }
  };

  function updatePos(ac, mx, my) {
    ac.x = mx; ac.y = my;
    stands.forEach(s => {
      if (Math.abs(mx - s.computedX) < 30 && Math.abs(my - s.computedY) < 100) {
        ac.x = s.computedX; ac.y = s.computedY; ac.heading = 180;
      }
    });
  }

  canvas.onmousedown = (e) => {
    const rect = canvas.getBoundingClientRect();
    const mx = e.clientX - rect.left, my = e.clientY - rect.top;

    if (ghostAircraft) {
      placedAircraft.push({ ...ghostAircraft });
      selectedIdx = placedAircraft.length - 1; ghostAircraft = null;
      updateInspector(); return;
    }
    
    const clickedIdx = placedAircraft.findIndex(ac => Math.hypot(ac.x - mx, ac.y - my) < 40);
    if (clickedIdx !== -1) {
      selectedIdx = clickedIdx; isDragging = true; updateInspector();
    } else {
      selectedIdx = -1; document.getElementById('inspector').classList.add('hidden');
    }
  };

  canvas.onmouseup = () => isDragging = false;

  // --- Animation & Physics ---
  function checkSafety() {
    placedAircraft.forEach((ac, idx) => {
      let safe = true, error = "";
      
      // 1. ตรวจสอบขนาดหลุมจอด
      stands.forEach(s => {
        if (Math.abs(ac.x - s.computedX) < 5) {
          if (ac.ICAO.charCodeAt(0) > s.MaxCode.charCodeAt(0)) {
            safe = false; error = `Code ${ac.ICAO} too big for Stand ${s.StandID}`;
          }
        }
      });

      // 2. ตรวจสอบการทับซ้อนกับเครื่องอื่น
      placedAircraft.forEach((other, oIdx) => {
        if (idx === oIdx) return;
        const dist = Math.hypot(ac.x - other.x, ac.y - other.y) / scale;
        const minReq = (ac.WingSpan/2) + (other.WingSpan/2) + safetyRules[ac.ICAO];
        if (dist < minReq) { safe = false; error = "Wingtip clearance violation"; }
      });

      ac.isSafe = safe; ac.errorMsg = error;
    });
  }

  function animate() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    checkSafety();
    
    // Draw Stands (เรียง 4 3 2 1 จากซ้ายมาขวา เพราะ A1 อยู่ขวา)
    stands.forEach(s => {
      const w = s.Width * scale, l = s.Length * scale;
      ctx.strokeStyle = '#94a3b8';
      ctx.setLineDash([3, 3]);
      ctx.strokeRect(s.computedX - w/2, s.computedY - l/2, w, l);
      
      ctx.beginPath();
      ctx.setLineDash([]);
      ctx.strokeStyle = '#cbd5e1';
      ctx.moveTo(s.computedX, s.computedY - l/2); ctx.lineTo(s.computedX, s.computedY + l/2);
      ctx.stroke();

      // ป้ายชื่อ Stand และ Max Code (ตามคำขอ)
      ctx.fillStyle = '#1e293b';
      ctx.font = 'black 13px Inter';
      ctx.textAlign = 'center';
      ctx.fillText(`${s.StandID} (Code ${s.MaxCode})`, s.computedX, s.computedY - l/2 - 15);
    });

    placedAircraft.forEach((ac, i) => drawAircraft(ac, i === selectedIdx));
    if (ghostAircraft) { ctx.globalAlpha = 0.5; drawAircraft(ghostAircraft, true); ctx.globalAlpha = 1.0; }
    requestAnimationFrame(animate);
  }

  function drawAircraft(ac, isSelected) {
    const w = ac.WingSpan * scale, l = ac.Length * scale;
    const mb = ac.NoseToMainGear * scale;

    ctx.save();
    ctx.translate(ac.x, ac.y);
    ctx.rotate(ac.heading * Math.PI / 180);

    // Aura
    ctx.beginPath();
    ctx.arc(0, 0, (ac.WingSpan/2 + safetyRules[ac.ICAO])*scale, 0, Math.PI*2);
    ctx.fillStyle = ac.isSafe ? 'rgba(34, 197, 94, 0.1)' : 'rgba(239, 68, 68, 0.2)';
    ctx.fill();

    // Dual Swing-out (L & R)
    if (ac.swing) {
        ctx.setLineDash([4, 4]); ctx.lineWidth = 1.5; ctx.strokeStyle = 'rgba(239, 68, 68, 0.7)';
        const pivotRX = w/4, pivotRY = mb;
        const radius = Math.hypot(w/2 + pivotRX, l - mb);
        ctx.beginPath(); ctx.arc(pivotRX, pivotRY, radius, Math.PI, 1.5 * Math.PI); ctx.stroke();
        const pivotLX = -w/4;
        ctx.beginPath(); ctx.arc(pivotLX, pivotRY, radius, 1.5 * Math.PI, 2 * Math.PI); ctx.stroke();
        ctx.setLineDash([]);
    }

    // Airplane Body
    ctx.fillStyle = isSelected ? '#0ea5e9' : (ac.isSafe ? ac.Color : '#ef4444');
    ctx.fillRect(-w/20, -mb, w/10, l); // Body
    ctx.fillRect(-w/2, -mb + l*0.1, w, l/10); // Wing
    ctx.fillRect(-w/4, -mb + l*0.8, w/2, l/20); // Tail
    ctx.fillStyle = '#fff'; ctx.beginPath(); ctx.arc(0, -mb+l, 2, 0, Math.PI*2); ctx.fill(); // Nose

    if (!ac.isSafe) {
        ctx.rotate(-ac.heading * Math.PI / 180); ctx.fillStyle = '#b91c1c';
        ctx.font = 'bold 11px Inter'; ctx.fillText(`⚠️ ${ac.errorMsg}`, 0, -50);
    }
    ctx.restore();
  }

  function toggleSwingOut() { if(selectedIdx !== -1) placedAircraft[selectedIdx].swing = document.getElementById('swingToggle').checked; }
  function rotateSelected(deg) { if(selectedIdx !== -1) placedAircraft[selectedIdx].heading += deg; }
  function deleteSelected() { if(selectedIdx !== -1) { placedAircraft.splice(selectedIdx, 1); selectedIdx = -1; document.getElementById('inspector').classList.add('hidden'); } }
  function updateInspector() {
    const ac = placedAircraft[selectedIdx];
    document.getElementById('inspector').classList.remove('hidden');
    document.getElementById('swingToggle').checked = ac.swing;
    document.getElementById('insDetail').innerHTML = `<strong>${ac.Model}</strong><br>Code ${ac.ICAO} | Heading: ${ac.heading}°<br>Status: ${ac.isSafe ? '<span class="text-green-600 font-bold">✅ SAFE</span>' : '<span class="text-red-600 font-bold">❌ DANGER</span>'}`;
  }
  function resize() { canvas.width = canvas.parentElement.clientWidth; canvas.height = 700; calculateStandPositions(); }
  window.onresize = resize;
</script>
</body>
</html>
