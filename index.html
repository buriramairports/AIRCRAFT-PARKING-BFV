<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <title>Apron Simulation Pro v21 - Engineering View</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=Sarabun:wght@400;700&display=swap" rel="stylesheet">
  <style>
    body { height: 100vh; display: flex; flex-direction: column; overflow: hidden; font-family: 'Inter', 'Sarabun', sans-serif; }
    #canvasContainer { flex: 1; overflow: auto; background-color: #cbd5e1; position: relative; scroll-behavior: smooth; }
    canvas { background-color: #f1f5f9; cursor: crosshair; touch-action: none; display: block; margin: auto; }
    .tab-btn.active { border-bottom: 3px solid #0ea5e9; color: #0ea5e9; background-color: #f8fafc; }
    label { font-size: 10px; font-weight: 800; color: #64748b; text-transform: uppercase; letter-spacing: 0.05em; display: block; margin-bottom: 2px; }
    #mathPanel { position: fixed; top: 160px; right: 20px; width: 300px; background: rgba(15, 23, 42, 0.95); color: #22d3ee; padding: 18px; border-radius: 24px; font-family: monospace; font-size: 10px; z-index: 50; border: 1px solid #0ea5e9; backdrop-filter: blur(8px); }
    #mathPanel h4 { color: #fff; font-weight: 900; margin-bottom: 10px; border-bottom: 1px solid #334155; padding-bottom: 5px; text-transform: uppercase; }
    #loader { display: none; position: fixed; inset: 0; background: rgba(15, 23, 42, 0.8); z-index: 999; flex-direction: column; align-items: center; justify-content: center; color: white; }
    .spinner { width: 40px; height: 40px; border: 4px solid rgba(255,255,255,0.1); border-top-color: #0ea5e9; border-radius: 50%; animation: spin 1s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body class="bg-slate-100">

  <div id="loader"><div class="spinner mb-4"></div><p class="font-bold text-sm">Processing Simulation...</p></div>
  <div id="toast" class="hidden fixed top-4 left-1/2 -translate-x-1/2 bg-emerald-600 text-white px-6 py-2 rounded-full shadow-2xl font-bold text-sm z-[1000] animate-bounce">สำเร็จ!</div>

  <!-- Math Display -->
  <div id="mathPanel" class="shadow-2xl">
     <h4><i data-lucide="calculator" class="w-4 h-4 inline mr-1"></i> Calculation Engine</h4>
     <div id="mathOutput" class="space-y-2"></div>
  </div>

  <header class="bg-slate-900 text-white h-14 px-6 flex justify-between items-center shadow-xl shrink-0 z-30">
    <div class="flex items-center gap-3">
      <div class="bg-sky-500 p-1.5 rounded text-white shadow-lg"><i data-lucide="shield-check"></i></div>
      <h1 class="text-lg font-black tracking-tighter text-sky-400 uppercase">Apron Simulation <span class="text-white text-xs ml-1">v21.0</span></h1>
    </div>
    <div class="flex gap-4">
      <input type="date" id="datePicker" class="text-slate-900 px-3 py-1 rounded text-xs font-bold border-none outline-none">
      <button onclick="loadData()" class="bg-slate-700 p-2 rounded hover:bg-slate-600 transition"><i data-lucide="refresh-cw" class="w-4 h-4"></i></button>
    </div>
  </header>

  <div class="bg-white border-b h-20 flex items-center px-6 gap-3 overflow-x-auto shrink-0 z-20 shadow-sm no-scrollbar">
     <div id="acToolbar" class="flex gap-2"></div>
  </div>

  <div class="flex flex-1 overflow-hidden">
    <aside class="w-80 bg-white border-r flex flex-col shadow-2xl z-10 shrink-0">
      <div class="flex border-b text-[10px] font-black uppercase text-slate-400">
        <button onclick="switchTab('inspector')" id="tab-inspector" class="tab-btn flex-1 p-4 active">รายละเอียด</button>
        <button onclick="switchTab('data')" id="tab-data" class="tab-btn flex-1 p-4">จัดการข้อมูล</button>
      </div>

      <div class="p-5 flex-1 overflow-y-auto">
        <div id="view-inspector" class="space-y-6">
          <div class="p-4 bg-sky-50 rounded-2xl border border-sky-100">
             <div class="flex justify-between items-center mb-2">
                <span class="text-[9px] font-black text-slate-400">Map Zoom</span>
                <span id="zoomDisplay" class="text-xs font-bold text-sky-600">100%</span>
             </div>
             <input type="range" id="zoomSlider" min="50" max="200" value="100" class="w-full h-1 bg-sky-200 rounded-lg appearance-none cursor-pointer accent-sky-600" oninput="handleZoom(this.value)">
          </div>

          <div id="activePlanePanel" class="hidden animate-fadeIn space-y-4">
             <div class="p-5 bg-slate-900 text-white rounded-3xl shadow-xl border-b-4 border-sky-500">
                <h3 id="insModel" class="text-2xl font-black">Model</h3>
                <p id="insStatus" class="text-xs font-bold uppercase tracking-widest text-emerald-400">Safe</p>
             </div>
             <label class="flex items-center justify-between p-3 bg-white rounded-xl border-2 border-slate-100 cursor-pointer hover:bg-slate-50 transition">
                <span class="text-[10px] font-black uppercase">จำลอง Swing-out (Power)</span>
                <input type="checkbox" id="swingToggle" onchange="toggleSwingOut()" class="w-5 h-5 accent-sky-500">
             </label>
             <div class="grid grid-cols-2 gap-2">
                <button onclick="rotateSelected(-5)" class="p-4 bg-slate-100 rounded-2xl hover:bg-slate-200 transition font-bold"><i data-lucide="rotate-ccw" class="w-5 h-5 mx-auto text-slate-600"></i></button>
                <button onclick="rotateSelected(5)" class="p-4 bg-slate-100 rounded-2xl hover:bg-slate-200 transition font-bold"><i data-lucide="rotate-cw" class="w-5 h-5 mx-auto text-slate-600"></i></button>
                <button onclick="deleteSelected()" class="col-span-2 p-3 bg-red-50 text-red-500 rounded-xl font-bold flex items-center justify-center gap-2 hover:bg-red-500 hover:text-white transition shadow-sm"><i data-lucide="trash-2" class="w-4 h-4"></i> ลบเครื่อง</button>
             </div>
          </div>
          <div id="noSelectionMsg" class="py-20 text-center text-slate-300 italic text-sm">คลิกเลือกเครื่องเพื่อจำลอง...</div>
        </div>

        <div id="view-data" class="hidden space-y-4">
            <!-- ข้อมูล Stands & Types จะแสดงที่นี่ -->
            <button onclick="openStandModal()" class="w-full bg-sky-600 text-white p-3 rounded-xl font-bold text-xs uppercase mb-3">เพิ่มหลุมจอดใหม่</button>
            <div id="standsTable" class="space-y-2"></div>
            <hr class="my-4">
            <button onclick="openAircraftModal()" class="w-full bg-slate-800 text-white p-3 rounded-xl font-bold text-xs uppercase mb-3">เพิ่มประเภทเครื่อง</button>
            <div id="aircraftTable" class="space-y-2"></div>
        </div>
      </div>
    </aside>

    <main id="canvasContainer">
      <canvas id="mainCanvas"></canvas>
    </main>
  </div>

  <!-- Modals -->
  <div id="modalStand" class="modal"><div class="bg-white rounded-3xl w-[400px] p-6 shadow-2xl space-y-4 animate-fadeIn"> <h3 class="font-black text-slate-800 border-b pb-2">ข้อมูลหลุมจอด</h3> <div><label>Stand ID</label><input id="st-id" class="w-full p-2 border rounded-lg"></div> <div class="grid grid-cols-2 gap-4"> <div><label>กว้าง (ม.)</label><input id="st-w" type="number" class="w-full p-2 border rounded-lg"></div> <div><label>ยาว (ม.)</label><input id="st-l" type="number" class="w-full p-2 border rounded-lg"></div> </div> <div class="grid grid-cols-2 gap-4"> <div><label>T-Mark 1</label><input id="st-t1" type="number" value="15" class="w-full p-2 border rounded-lg"></div> <div><label>T-Mark 2</label><input id="st-t2" type="number" value="20" class="w-full p-2 border rounded-lg"></div> </div> <div class="grid grid-cols-2 gap-4"> <div><label>หลุมหลัก (Parent)</label><select id="st-parent" class="w-full p-2 border rounded-lg"></select></div> <div><label>OffsetX (ม.)</label><input id="st-offset" type="number" value="0" class="w-full p-2 border rounded-lg"></div> </div> <button onclick="uiSaveStand()" class="w-full bg-sky-600 text-white p-3 rounded-xl font-bold shadow-lg">Save Stand</button> <button onclick="closeModal('modalStand')" class="w-full text-slate-400 text-xs mt-2">ยกเลิก</button> </div></div>

  <div id="modalAircraft" class="modal"><div class="bg-white rounded-3xl w-[400px] p-6 shadow-2xl space-y-4 animate-fadeIn"> <h3 class="font-black text-slate-800 border-b pb-2">ประเภทเครื่องบิน</h3> <div><label>รุ่น (Model)</label><input id="ac-m" class="w-full p-2 border rounded-lg"></div> <div class="grid grid-cols-2 gap-4"> <div><label>ปีกกว้าง (Span ม.)</label><input id="ac-s" type="number" class="w-full p-2 border rounded-lg"></div> <div><label>ยาว (Length ม.)</label><input id="ac-l" type="number" class="w-full p-2 border rounded-lg"></div> </div> <div class="grid grid-cols-2 gap-4"> <div><label>จมูก-ล้อเมน (ม.)</label><input id="ac-nmg" type="number" class="w-full p-2 border rounded-lg"></div> <div><label>Steering (deg)</label><input id="ac-sa" type="number" value="45" class="w-full p-2 border rounded-lg"></div> </div> <div><label>Jet Blast (ม.)</label><input id="ac-jb" type="number" value="40" class="w-full p-2 border rounded-lg"></div> <select id="ac-code" class="w-full p-2 border rounded-lg font-bold"><option value="C">Code C</option><option value="E">Code E</option><option value="F">Code F</option></select> <input id="ac-col" type="color" class="w-full h-10 rounded-lg border-none"> <button onclick="uiSaveAircraft()" class="w-full bg-slate-900 text-white p-3 rounded-xl font-bold shadow-lg">Save Type</button> <button onclick="closeModal('modalAircraft')" class="w-full text-slate-400 text-xs mt-2">ยกเลิก</button> </div></div>

<script>
  const WEB_APP_URL = 'https://script.google.com/macros/s/AKfycbxqCIfejWJerGZfjRfZs-Bn0Bq37jIxzAUdX_-fpK5i3hDiEK-6rBNNSE4KFDuITRT7/exec'; 

  let aircraftTypes = [], stands = [], safetyRules = {};
  let placedAircraft = [], selectedIdx = -1, ghostAircraft = null;
  let baseScale = 4, zoomPercent = 100, scale = 4, originX = 0, originY = 0;
  let isDraggingAC = false;

  const canvas = document.getElementById('mainCanvas');
  const ctx = canvas.getContext('2d');

  async function apiCall(action, data = {}) {
    showLoader(true);
    const response = await fetch(WEB_APP_URL, { method: 'POST', body: JSON.stringify({ action, data }) });
    const res = await response.json();
    showLoader(false);
    return res.data;
  }

  function showLoader(show) { document.getElementById('loader').style.display = show ? 'flex' : 'none'; }
  function showToast(msg) { const t = document.getElementById('toast'); t.innerText = msg; t.classList.remove('hidden'); setTimeout(() => t.classList.add('hidden'), 3000); }
  function closeModal(id) { document.getElementById(id).classList.remove('active'); }
  function switchTab(t) { ['inspector','data'].forEach(v => { document.getElementById('tab-'+v).className = `flex-1 p-4 border-b-2 text-[10px] font-black uppercase ${v===t ? 'border-sky-500 text-sky-600 bg-sky-50/50' : 'border-transparent text-slate-400'}`; document.getElementById('view-'+v).classList.toggle('hidden', v!==t); }); }

  window.onload = async () => { lucide.createIcons(); document.getElementById('datePicker').valueAsDate = new Date(); await loadData(); animate(); };

  async function loadData() {
    const data = await apiCall('getInitialData');
    if(!data) return;
    aircraftTypes = data.aircraftTypes || [];
    stands = data.stands || [];
    safetyRules = data.icaoSafety;
    renderAircraftToolbar(); renderStandsTable(); renderAircraftTypeTable(); updateParentDropdown();
    calculateApronLayout();
  }

  function calculateApronLayout() {
    const container = document.getElementById('canvasContainer');
    const parents = stands.filter(s => !s.ParentID).sort((a,b) => String(a.StandID).localeCompare(String(b.StandID), undefined, {numeric: true}));
    const totalW = parents.reduce((sum, s) => sum + Number(s.Width), 0);
    canvas.width = (totalW + 200) * scale;
    canvas.height = 750 * (zoomPercent/100);
    originX = canvas.width - (100 * scale); originY = canvas.height / 2;
    let currX = 0;
    parents.forEach(s => {
      s.mX = currX - (Number(s.Width)/2); s.mY = 0;
      currX -= Number(s.Width);
      stands.filter(c => String(c.ParentID) === String(s.StandID)).forEach(c => { c.mX = s.mX + (Number(c.OffsetX) || 0); c.mY = 0; });
    });
    if(selectedIdx === -1) setTimeout(() => { container.scrollLeft = container.scrollWidth; }, 100);
  }

  // --- Logic Precision Snap ---
  function findBestSnap(ac, world) {
    let bx = world.mx, by = world.my, bh = ac.heading;
    stands.forEach(s => {
      if (Math.abs(world.mx - s.mX) < 10) {
        bx = s.mX; bh = 180;
        // สูตร Snap: ให้ Nose Gear ทับ T-Mark พอดี
        // noseOffset = ระยะจากจุดศูนย์กลางเครื่องถึงล้อหน้า
        const noseOffset = (ac.Length/2 - ac.NoseToMainGear);
        const noseY1 = (s.mY + s.Length/2) - s.TMark1;
        const noseY2 = (s.mY + s.Length/2) - s.TMark2;
        
        const center_for_T1 = noseY1 - noseOffset;
        const center_for_T2 = noseY2 - noseOffset;

        if (Math.abs(world.my - center_for_T1) < 10) by = center_for_T1;
        else if (Math.abs(world.my - center_for_T2) < 10) by = center_for_T2;
      }
    });
    return { x: bx, y: by, h: bh };
  }

  function checkSafety() {
    let mathLog = "";
    placedAircraft.forEach((ac, idx) => {
        let safe = true, error = "";
        let stand = stands.find(s => ac.mX >= (s.mX - s.Width/2) && ac.mX <= (s.mX + s.Width/2) && ac.mY >= (s.mY - s.Length/2) && ac.mY <= (s.mY + s.Length/2));
        
        if (stand) {
            const noseY = ac.mY + (ac.Length/2 - ac.NoseToMainGear);
            const distFromBottom = (stand.mY + stand.Length/2) - noseY;
            if (distFromBottom < 0) { safe=false; error="ล้นเขต Terminal"; }
            if (distFromBottom > stand.Length) { safe=false; error="ล้นเขต Taxiway"; }
            
            if (idx === selectedIdx) {
                // Physics Calculations
                const wheelbase = ac.NoseToMainGear;
                const saRad = (ac.SteeringAngle || 45) * Math.PI / 180;
                const turningRad = wheelbase / Math.sin(saRad);
                const wingtipPath = Math.hypot(turningRad + ac.WingSpan/2, ac.Length - ac.NoseToMainGear);

                mathLog += `<div class="space-y-1">`;
                mathLog += `<p class="text-sky-300 font-black border-b border-sky-900 mb-1">AIRCRAFT PHYSICS</p>`;
                mathLog += `<p>Nose Gear to Head: ${distFromBottom.toFixed(2)}m</p>`;
                mathLog += `<p>Turning Radius (R): ${turningRad.toFixed(2)}m</p>`;
                mathLog += `<p>Wingtip Swept (Max): ${wingtipPath.toFixed(2)}m</p>`;
                mathLog += `<p class="mt-2 text-slate-400">Formula: R = Wheelbase / sin(SA)</p>`;
                mathLog += `</div>`;
            }
        } else { safe=false; error="อยู่นอกหลุม"; }

        placedAircraft.forEach((other, oIdx) => {
            if (idx === oIdx) return;
            const dist = Math.hypot(ac.mX - other.mX, ac.mY - other.mY);
            const clear = dist - (ac.WingSpan/2 + other.WingSpan/2);
            if (clear < safetyRules[ac.ICAO]) { safe=false; error="ระยะปีกอันตราย"; }
            
            // Dynamic Swing Collision Check
            if (ac.swing && safe) {
                const wheelbase = ac.NoseToMainGear;
                const saRad = (ac.SteeringAngle || 45) * Math.PI / 180;
                const turningRad = wheelbase / Math.sin(saRad);
                const sweptRadius = Math.hypot(turningRad + ac.WingSpan/2, ac.Length - ac.NoseToMainGear);
                if (dist - (other.WingSpan/2) < sweptRadius - (turningRad - ac.WingSpan/2)) {
                   //safe = false; error = "วงเลี้ยวชนเครื่องข้างเคียง";
                }
            }
        });
        ac.isSafe = safe; ac.errorMsg = error;
    });
    document.getElementById('mathOutput').innerHTML = mathLog || '<p class="text-slate-500 italic">เลือกเครื่องบิน...</p>';
  }

  function animate() {
    ctx.clearRect(0, 0, canvas.width, canvas.height); checkSafety();
    stands.forEach(s => {
      const p = mToP(s.mX, s.mY), w = s.Width * scale, l = s.Length * scale;
      ctx.save(); ctx.translate(p.x, p.y); ctx.rotate((s.Heading || 0) * Math.PI / 180);
      ctx.strokeStyle = s.Status === 'active' ? '#94a3b8' : '#ef4444'; ctx.setLineDash([5, 5]); ctx.strokeRect(-w/2, -l/2, w, l);
      ctx.beginPath(); ctx.setLineDash(s.ParentID ? [10, 5] : []); ctx.strokeStyle = "#facc15"; ctx.lineWidth = 3;
      const t1Y = (l/2) - (Number(s.TMark1 || 15) * scale);
      ctx.moveTo(0, -l/2); ctx.lineTo(0, t1Y); ctx.stroke();
      ctx.setLineDash([]); ctx.lineWidth = 2;
      [s.TMark1, s.TMark2].forEach(tm => { const tmY = (l/2) - (Number(tm) * scale); ctx.beginPath(); ctx.moveTo(-5*scale, tmY); ctx.lineTo(5*scale, tmY); ctx.stroke(); });
      const fs = Math.max(9, 14 * (zoomPercent/100)); ctx.fillStyle = s.ParentID ? "#334155" : "#0f172a"; 
      const label = `${s.StandID} (Code ${s.MaxCode})`; const tw = ctx.measureText(label).width;
      const lblY = s.ParentID ? (-l/2 - fs * 1.5) : (-l/2 - fs * 3.5);
      ctx.fillRect(-tw/2 - 10, lblY - fs, tw + 20, fs * 1.8);
      ctx.fillStyle = "white"; ctx.textAlign = "center"; ctx.fillText(label, 0, lblY + (fs * 0.2));
      ctx.restore();
    });
    placedAircraft.forEach((ac, i) => drawAircraft(ac, i === selectedIdx));
    if (ghostAircraft) { ctx.globalAlpha = 0.5; drawAircraft(ghostAircraft, true); ctx.globalAlpha = 1.0; }
    requestAnimationFrame(animate);
  }

  function drawAircraft(ac, isSelected) {
    const p = mToP(ac.mX, ac.mY), w = ac.WingSpan * scale, l = ac.Length * scale, mb = ac.NoseToMainGear * scale;
    const fs = Math.max(8, 11 * (zoomPercent/100));
    ctx.save(); ctx.translate(p.x, p.y); ctx.rotate(ac.heading * Math.PI / 180);
    ctx.beginPath(); ctx.arc(0, 0, (ac.WingSpan/2 + safetyRules[ac.ICAO])*scale, 0, Math.PI*2);
    ctx.fillStyle = ac.isSafe ? 'rgba(34, 197, 94, 0.08)' : 'rgba(239, 68, 68, 0.15)'; ctx.fill();
    
    // Bilateral Swing-out Arcs
    if (ac.swing) {
        ctx.setLineDash([4, 4]); ctx.strokeStyle = 'rgba(239, 68, 68, 0.8)'; ctx.lineWidth = 2;
        const wheelbase = ac.NoseToMainGear;
        const saRad = (ac.SteeringAngle || 45) * Math.PI / 180;
        const turningRad = (wheelbase / Math.sin(saRad)) * scale;
        const sweptRad = Math.hypot(turningRad + (w/2), l - mb);
        
        // Pivot Right (Leaning Out Left)
        ctx.beginPath(); ctx.arc(turningRad, mb, sweptRad, Math.PI, 1.5 * Math.PI); ctx.stroke();
        // Pivot Left (Leaning Out Right)
        ctx.beginPath(); ctx.arc(-turningRad, mb, sweptRad, 1.5 * Math.PI, 2 * Math.PI); ctx.stroke();
    }
    
    ctx.fillStyle = isSelected ? '#0ea5e9' : (ac.isSafe ? ac.Color : '#ef4444');
    ctx.fillRect(-w/20, -mb, w/10, l); ctx.fillRect(-w/2, -mb + l*0.15, w, l/10); ctx.fillRect(-w/4, -mb + l*0.85, w/2, l/20);
    ctx.restore();
    
    // Upright Model Tag
    ctx.save(); ctx.translate(p.x, p.y); ctx.fillStyle = 'rgba(15, 23, 42, 0.8)';
    const mTw = ctx.measureText(ac.Model).width; ctx.fillRect(-mTw/2 - 6, -fs/2 - 5, mTw + 12, fs + 10);
    ctx.fillStyle = "white"; ctx.textAlign = "center"; ctx.font = `bold ${fs}px Inter`; ctx.fillText(ac.Model, 0, fs/3);
    if (!ac.isSafe) { ctx.fillStyle = '#ef4444'; ctx.font = `bold ${fs+2}px Sarabun`; ctx.fillText("⚠️ "+ac.errorMsg, 0, -fs*6); }
    ctx.restore();
  }

  // --- UI Helpers ---
  function handleZoom(v) { zoomPercent=v; document.getElementById('zoomDisplay').innerText=v+"%"; scale=(baseScale*zoomPercent)/100; calculateApronLayout(); }
  function pickGhost(i) { ghostAircraft = { ...aircraftTypes[i], heading: 180, mX: 0, mY: 0, swing: false }; }
  function toggleSwingOut() { if(selectedIdx !== -1) placedAircraft[selectedIdx].swing = document.getElementById('swingToggle').checked; }
  function rotateSelected(d) { if(selectedIdx !== -1) placedAircraft[selectedIdx].heading += d; }
  function deleteSelected() { if(selectedIdx !== -1) { placedAircraft.splice(selectedIdx, 1); selectedIdx = -1; document.getElementById('activePlanePanel').classList.add('hidden'); } }
  function updateInspector() { const ac = placedAircraft[selectedIdx]; document.getElementById('activePlanePanel').classList.remove('hidden'); document.getElementById('noSelectionMsg').classList.add('hidden'); document.getElementById('swingToggle').checked = ac.swing; document.getElementById('insModel').innerText = ac.Model; }
  
  canvas.onmousedown = (e) => {
    const r = canvas.getBoundingClientRect(); const world = pToM(e.clientX-r.left, e.clientY-r.top);
    if (ghostAircraft) { const snapped = findBestSnap(ghostAircraft, world); ghostAircraft.mX = snapped.x; ghostAircraft.mY = snapped.y; ghostAircraft.heading = snapped.h; placedAircraft.push({ ...ghostAircraft }); ghostAircraft = null; return; }
    selectedIdx = placedAircraft.findIndex(ac => Math.hypot(ac.mX - world.mx, ac.mY - world.my) < (ac.WingSpan/2 + 2));
    if(selectedIdx !== -1) updateInspector(); else document.getElementById('activePlanePanel').classList.add('hidden');
  };
  canvas.onmousemove = (e) => {
    const r = canvas.getBoundingClientRect(); const world = pToM(e.clientX-r.left, e.clientY-r.top);
    if (ghostAircraft) { const s = findBestSnap(ghostAircraft, world); ghostAircraft.mX = s.x; ghostAircraft.mY = s.y; ghostAircraft.heading = s.h; 
    } else if (selectedIdx !== -1 && e.buttons === 1) { const s = findBestSnap(placedAircraft[selectedIdx], world); placedAircraft[selectedIdx].mX = s.x; placedAircraft[selectedIdx].mY = s.y; updateInspector(); }
  };
  
  function renderAircraftToolbar() { document.getElementById('acToolbar').innerHTML = aircraftTypes.map((t, i) => `<button onclick="pickGhost(${i})" class="flex flex-col items-center justify-center p-2 bg-slate-50 border-2 border-slate-100 rounded-xl hover:border-sky-500 transition w-24 shrink-0 shadow-sm"> <b class="text-[10px] text-slate-800">${t.Model}</b> <span class="text-[8px] font-black text-sky-500 uppercase">Code ${t.ICAO}</span> </button>`).join(''); }
  function renderStandsTable() { document.getElementById('standsTable').innerHTML = stands.map((s, i) => `<div class="flex justify-between items-center p-2.5 bg-white border rounded-xl text-[10px] font-bold shadow-sm"><div>${s.StandID}</div><div class="flex gap-1"><button onclick="editStand(${i})" class="bg-sky-50 text-sky-600 p-1.5 rounded">แก้</button><button onclick="uiDeleteStand('${s.StandID}')" class="bg-red-50 text-red-500 p-1.5 rounded">ลบ</button></div></div>`).join(''); }
  function renderAircraftTypeTable() { document.getElementById('aircraftTable').innerHTML = aircraftTypes.map((ac, i) => `<div class="flex justify-between items-center p-2.5 bg-white border rounded-xl text-[10px] font-bold shadow-sm"><div>${ac.Model}</div><div class="flex gap-1"><button onclick="editAircraft(${i})" class="bg-sky-50 text-sky-600 p-1.5 rounded">แก้</button><button onclick="uiDeleteAircraft('${ac.Model}')" class="bg-red-50 text-red-500 p-1.5 rounded">ลบ</button></div></div>`).join(''); }
  function updateParentDropdown() { document.getElementById('st-parent').innerHTML = '<option value="">-- Main Stand --</option>' + stands.filter(s => !s.ParentID).map(p => `<option value="${p.StandID}">${p.StandID}</option>`).join(''); }
  function openStandModal() { document.getElementById('modalStand').classList.add('active'); updateParentDropdown(); }
  function openAircraftModal() { document.getElementById('modalAircraft').classList.add('active'); }
  async function uiDeleteStand(id) { if(confirm('ลบหลุมจอด '+id+'?')) { await apiCall('deleteStand', {id}); await loadData(); } }
  async function uiDeleteAircraft(id) { if(confirm('ลบประเภท '+id+'?')) { await apiCall('deleteAircraftType', {id}); await loadData(); } }
  function editStand(i) { const s = stands[i]; document.getElementById('st-id').value = s.StandID; document.getElementById('st-w').value = s.Width; document.getElementById('st-l').value = s.Length; document.getElementById('st-t1').value = s.TMark1 || 15; document.getElementById('st-t2').value = s.TMark2 || 20; document.getElementById('st-heading').value = s.Heading || 0; document.getElementById('st-code').value = s.MaxCode; document.getElementById('st-parent').value = s.ParentID || ""; document.getElementById('modalStand').classList.add('active'); }
  function editAircraft(i) { const ac = aircraftTypes[i]; document.getElementById('ac-m').value = ac.Model; document.getElementById('ac-s').value = ac.WingSpan; document.getElementById('ac-l').value = ac.Length; document.getElementById('ac-nmg').value = ac.NoseToMainGear; document.getElementById('ac-sa').value = ac.SteeringAngle; document.getElementById('ac-jb').value = ac.JetBlast; document.getElementById('ac-code').value = ac.ICAO; document.getElementById('ac-col').value = ac.Color; document.getElementById('modalAircraft').classList.add('active'); }
  async function uiSaveStand() { const d = { StandID: document.getElementById('st-id').value, Width: Number(document.getElementById('st-w').value), Length: Number(document.getElementById('st-l').value), TMark1: Number(document.getElementById('st-t1').value), TMark2: Number(document.getElementById('st-t2').value), Heading: Number(document.getElementById('st-heading').value), MaxCode: document.getElementById('st-code').value, ParentID: document.getElementById('st-parent').value, OffsetX: Number(document.getElementById('st-offset').value), Status: 'active' }; await apiCall('saveStand', d); closeModal('modalStand'); await loadData(); }
  async function uiSaveAircraft() { const d = { Model: document.getElementById('ac-m').value, WingSpan: Number(document.getElementById('ac-s').value), Length: Number(document.getElementById('ac-l').value), NoseToMainGear: Number(document.getElementById('ac-nmg').value), SteeringAngle: Number(document.getElementById('ac-sa').value), JetBlast: Number(document.getElementById('ac-jb').value), ICAO: document.getElementById('ac-code').value, Color: document.getElementById('ac-col').value }; await apiCall('saveAircraftType', d); closeModal('modalAircraft'); await loadData(); }
  
  const mToP = (mx, my) => ({ x: originX + mx * scale, y: originY + my * scale });
  const pToM = (px, py) => ({ mx: (px - originX) / scale, my: (py - originY) / scale });
</script>
</body>
