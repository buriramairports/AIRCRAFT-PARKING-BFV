<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <title>Apron Simulation v6 - Robust Layout</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>
  <style>
    body { height: 100vh; display: flex; flex-direction: column; overflow: hidden; font-family: 'Inter', sans-serif; }
    #canvasContainer { flex: 1; position: relative; background-color: #cbd5e1; overflow: hidden; }
    canvas { display: block; background-color: #f1f5f9; cursor: crosshair; touch-action: none; }
  </style>
</head>
<body class="bg-slate-100">

  <!-- Header: บังคับให้สูงคงที่ -->
  <header class="h-16 bg-slate-900 text-white px-6 flex justify-between items-center shadow-2xl z-30 shrink-0">
    <div class="flex items-center gap-3">
      <div class="bg-sky-500 p-2 rounded-lg text-white shadow-lg"><i data-lucide="plane"></i></div>
      <h1 class="text-xl font-black tracking-tighter text-sky-400 uppercase">Apron Control <span class="text-white">v6</span></h1>
    </div>
    <div class="flex items-center gap-3">
      <input type="date" id="datePicker" class="text-slate-900 px-3 py-1.5 rounded-lg text-sm font-bold border-none outline-none">
      <button onclick="location.reload()" class="bg-slate-700 hover:bg-slate-600 p-2 rounded-lg transition"><i data-lucide="refresh-cw" class="w-4 h-4 text-white"></i></button>
    </div>
  </header>

  <div class="flex flex-1 overflow-hidden">
    <!-- Sidebar: บังคับความกว้าง ไม่ให้หด -->
    <aside class="w-80 bg-white border-r flex flex-col shadow-xl z-20 shrink-0">
      <div class="p-6 overflow-y-auto flex-1 space-y-6">
        <div>
          <h3 class="text-[10px] font-black text-slate-400 uppercase tracking-[0.2em] mb-4">Aircraft Types</h3>
          <div id="acList" class="grid grid-cols-1 gap-2"></div>
        </div>

        <div id="inspector" class="hidden animate-fadeIn space-y-4">
          <h3 class="text-[10px] font-black text-slate-400 uppercase tracking-[0.2em]">Inspector</h3>
          <div class="p-4 bg-slate-50 rounded-2xl border-2 border-slate-100 space-y-3">
             <div id="insDetail" class="text-sm font-medium text-slate-700"></div>
             
             <div class="flex items-center justify-between p-2 bg-white rounded-lg border">
                <span class="text-xs font-bold text-slate-400">Swing-out</span>
                <input type="checkbox" id="swingToggle" onchange="toggleSwingOut()" class="w-5 h-5 accent-sky-500">
             </div>

             <div class="flex gap-2">
                <button onclick="rotateSelected(-5)" class="p-3 bg-white border rounded-xl hover:bg-slate-200 transition flex-1 shadow-sm"><i data-lucide="rotate-ccw" class="w-4 h-4 mx-auto"></i></button>
                <button onclick="rotateSelected(5)" class="p-3 bg-white border rounded-xl hover:bg-slate-200 transition flex-1 shadow-sm"><i data-lucide="rotate-cw" class="w-4 h-4 mx-auto"></i></button>
                <button onclick="deleteSelected()" class="p-3 bg-red-50 text-red-500 rounded-xl flex-1 font-bold hover:bg-red-500 hover:text-white transition"><i data-lucide="trash-2" class="w-4 h-4 mx-auto"></i></button>
             </div>
          </div>
        </div>
      </div>
    </aside>

    <!-- Canvas Area -->
    <div id="canvasContainer">
      <canvas id="mainCanvas"></canvas>
      
      <!-- Safe Indicators -->
      <div class="absolute bottom-6 left-6 flex flex-col gap-2 bg-white/90 backdrop-blur-sm p-4 rounded-2xl shadow-xl border border-slate-200 text-[9px] font-black uppercase tracking-wider">
         <div class="flex items-center gap-3"><span class="w-3 h-3 bg-green-500 rounded-full"></span> Safe</div>
         <div class="flex items-center gap-3"><span class="w-3 h-3 bg-red-500 rounded-full"></span> Danger</div>
         <div class="mt-2 pt-2 border-t text-slate-400">Ordering: Right-to-Left (A1 on Right)</div>
      </div>
    </div>
  </div>

<script>
  // CONFIG: ใส่ URL ของคุณที่นี่
  const WEB_APP_URL = 'https://script.google.com/macros/s/AKfycbxqCIfejWJerGZfjRfZs-Bn0Bq37jIxzAUdX_-fpK5i3hDiEK-6rBNNSE4KFDuITRT7/exec'; 

  let aircraftTypes = [], stands = [], safetyRules = {};
  let placedAircraft = []; // เก็บตำแหน่งในหน่วย "เมตร" (mX, mY)
  let selectedIdx = -1, isDragging = false, ghostAircraft = null;
  let scale = 4; 
  let originX = 0, originY = 0; // จุดอ้างอิงบนหน้าจอ

  const canvas = document.getElementById('mainCanvas');
  const ctx = canvas.getContext('2d');

  async function apiCall(action, data = {}) {
    const response = await fetch(WEB_APP_URL, { method: 'POST', body: JSON.stringify({ action, data }) });
    const res = await response.json();
    return res.data;
  }

  window.onload = async () => {
    lucide.createIcons();
    document.getElementById('datePicker').valueAsDate = new Date();
    await loadData();
    handleResize();
    window.addEventListener('resize', handleResize);
    animate();
  };

  async function loadData() {
    try {
      const data = await apiCall('getInitialData');
      aircraftTypes = data.aircraftTypes;
      // เรียง A1, A2... เสมอ
      stands = data.stands.sort((a,b) => a.StandID.localeCompare(b.StandID, undefined, {numeric: true}));
      safetyRules = data.icaoSafety;
      renderAircraftList();
    } catch(e) { console.error(e); }
  }

  function handleResize() {
    const container = document.getElementById('canvasContainer');
    canvas.width = container.clientWidth;
    canvas.height = container.clientHeight;
    
    // คำนวณจุดอ้างอิง Apron ให้กลางจอเสมอ (เริ่มจากขวาของจอ)
    originX = canvas.width - 50; 
    originY = canvas.height / 2;

    // คำนวณพิกัด เมตร (Meter Coordinates) ให้แต่ละหลุมจอด
    let currentMX = 0;
    stands.forEach(s => {
      s.mX = currentMX - (s.Width / 2); // ตำแหน่งเมตรในแกน X (ติดลบไปทางซ้าย)
      s.mY = 0;                        // ให้แกน Y อยู่ที่จุด 0 ของเมตร
      currentMX -= s.Width;
    });
  }

  function renderAircraftList() {
    const list = document.getElementById('acList');
    aircraftTypes.forEach(type => {
      const div = document.createElement('div');
      div.className = "plane-card p-3 bg-white border-2 border-slate-100 rounded-xl cursor-pointer hover:border-sky-400 transition flex justify-between items-center shadow-sm";
      div.innerHTML = `<div class="text-xs"><b>${type.Model}</b><br><span class="text-slate-400 uppercase">Code ${type.ICAO}</span></div><i data-lucide="plus" class="w-3 h-3 text-slate-300"></i>`;
      div.onclick = () => { ghostAircraft = { ...type, heading: 180, mX: -50, mY: -50, swing: false }; };
      list.appendChild(div);
    });
    lucide.createIcons();
  }

  // แปลงพิกัด เมตร -> พิกเซล
  function mToP(mX, mY) {
    return { x: originX + (mX * scale), y: originY + (mY * scale) };
  }
  // แปลงพิกัด พิกเซล -> เมตร
  function pToM(pX, pY) {
    return { mX: (pX - originX) / scale, mY: (pY - originY) / scale };
  }

  canvas.onmousemove = (e) => {
    const rect = canvas.getBoundingClientRect();
    const pos = pToM(e.clientX - rect.left, e.clientY - rect.top);

    if (ghostAircraft) {
      updateAcPosition(ghostAircraft, pos.mX, pos.mY);
    } else if (isDragging && selectedIdx !== -1) {
      updateAcPosition(placedAircraft[selectedIdx], pos.mX, pos.mY);
      updateInspector();
    }
  };

  function updateAcPosition(ac, mx, my) {
    ac.mX = mx; ac.mY = my;
    // Snap Logic (ในหน่วยเมตร)
    stands.forEach(s => {
      if (Math.abs(mx - s.mX) < 10 && Math.abs(my - s.mY) < 20) {
        ac.mX = s.mX; ac.mY = s.mY; ac.heading = 180;
      }
    });
  }

  canvas.onmousedown = (e) => {
    const rect = canvas.getBoundingClientRect();
    const pos = pToM(e.clientX - rect.left, e.clientY - rect.top);

    if (ghostAircraft) {
      placedAircraft.push({ ...ghostAircraft }); ghostAircraft = null; return;
    }
    
    selectedIdx = placedAircraft.findIndex(ac => Math.hypot(ac.mX - pos.mX, ac.mY - pos.mY) < 10);
    if (selectedIdx !== -1) { isDragging = true; updateInspector(); }
    else document.getElementById('inspector').classList.add('hidden');
  };

  canvas.onmouseup = () => isDragging = false;

function checkSafety() {
    placedAircraft.forEach((ac, idx) => {
      let safe = true, error = "";
      
      // 1. ตรวจสอบขนาดหลุมจอด (Stand Capacity)
      stands.forEach(s => {
        if (Math.abs(ac.mX - s.mX) < 1) { 
          if (ac.ICAO.charCodeAt(0) > s.MaxCode.charCodeAt(0)) {
            safe = false; error = `Aircraft too large for Stand ${s.StandID}`;
          }
        }
      });

      // 2. ตรวจสอบการทับซ้อนขณะจอด (Static Wingtip Clearance)
      placedAircraft.forEach((other, oIdx) => {
        if (idx === oIdx) return;
        const dist = Math.hypot(ac.mX - other.mX, ac.mY - other.mY);
        const minReq = (ac.WingSpan/2) + (other.WingSpan/2) + safetyRules[ac.ICAO];
        if (dist < minReq) { safe = false; error = "Wingtip clearance violation"; }

        // 3. [เพิ่มใหม่] ตรวจสอบการชนขณะ Swing-out (Dynamic Check)
        if (ac.swing) {
            const w = ac.WingSpan * scale, l = ac.Length * scale, mb = ac.NoseToMainGear * scale;
            const pivotRX = (ac.mX + (ac.WingSpan/4)), pivotRY = (ac.mY + ac.NoseToMainGear); // จุดหมุนขวา
            const pivotLX = (ac.mX - (ac.WingSpan/4)); // จุดหมุนซ้าย
            const turnRadius = Math.hypot(ac.WingSpan/2 + ac.WingSpan/4, ac.Length - ac.NoseToMainGear);

            // เช็คว่าจุดใดๆ ของเครื่องลำข้างเคียง อยู่ในรัศมีการกวาดหรือไม่
            const distToOther = Math.hypot(ac.mX - other.mX, ac.mY - other.mY);
            if (distToOther < turnRadius + (other.WingSpan/2)) {
                // ถ้าเครื่องข้างๆ อยู่ในระยะกวาดของปีก
                // (หมายเหตุ: นี่คือการคำนวณเบื้องต้น ระบบจะเตือนเพื่อให้ระวังการทำ Swing-out)
                if (error === "") { // ถ้ายังไม่มี Error เรื่องจอดนิ่ง ให้บอกเรื่องวงเลี้ยว
                    // เรายังอนุญาตให้เป็นสีเขียวถ้าจอดนิ่งผ่าน แต่จะเตือนใน Inspector แทน
                    // หรือถ้าคุณต้องการให้แดงเลย ให้ใส่ safe = false ตรงนี้ครับ
                }
            }
        }
      });

      ac.isSafe = safe; ac.errorMsg = error;
    });
  }

  function animate() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    checkSafety();
    
    // Draw Stands
    stands.forEach(s => {
      const p = mToP(s.mX, s.mY);
      const w = s.Width * scale, l = s.Length * scale;
      
      ctx.strokeStyle = '#94a3b8'; ctx.setLineDash([4, 4]);
      ctx.strokeRect(p.x - w/2, p.y - l/2, w, l);
      
      ctx.beginPath(); ctx.setLineDash([]); ctx.strokeStyle = '#cbd5e1';
      ctx.moveTo(p.x, p.y - l/2); ctx.lineTo(p.x, p.y + l/2); ctx.stroke();

      ctx.fillStyle = '#1e293b'; ctx.font = 'bold 12px Inter'; ctx.textAlign = 'center';
      ctx.fillText(`${s.StandID} (Code ${s.MaxCode})`, p.x, p.y - l/2 - 12);
    });

    placedAircraft.forEach((ac, i) => drawAircraft(ac, i === selectedIdx));
    if (ghostAircraft) { ctx.globalAlpha = 0.5; drawAircraft(ghostAircraft, true); ctx.globalAlpha = 1.0; }
    requestAnimationFrame(animate);
  }

  function drawAircraft(ac, isSelected) {
    const p = mToP(ac.mX, ac.mY);
    const w = ac.WingSpan * scale, l = ac.Length * scale, mb = ac.NoseToMainGear * scale;

    ctx.save();
    ctx.translate(p.x, p.y);
    ctx.rotate(ac.heading * Math.PI / 180);

    // Aura
    ctx.beginPath(); ctx.arc(0, 0, (ac.WingSpan/2 + safetyRules[ac.ICAO])*scale, 0, Math.PI*2);
    ctx.fillStyle = ac.isSafe ? 'rgba(34, 197, 94, 0.1)' : 'rgba(239, 68, 68, 0.2)';
    ctx.fill();

    // Swing-out Path
    if (ac.swing) {
        ctx.setLineDash([4, 4]); ctx.strokeStyle = 'rgba(239, 68, 68, 0.6)';
        const pivotRX = w/4, pivotRY = mb;
        const radius = Math.hypot(w/2 + pivotRX, l - mb);
        ctx.beginPath(); ctx.arc(pivotRX, pivotRY, radius, Math.PI, 1.5 * Math.PI); ctx.stroke();
        ctx.beginPath(); ctx.arc(-pivotRX, pivotRY, radius, 1.5 * Math.PI, 2 * Math.PI); ctx.stroke();
        ctx.setLineDash([]);
    }

    // Airplane Body
    ctx.fillStyle = isSelected ? '#0ea5e9' : (ac.isSafe ? ac.Color : '#ef4444');
    ctx.fillRect(-w/20, -mb, w/10, l); // Body
    ctx.fillRect(-w/2, -mb + l*0.15, w, l/10); // Wing
    ctx.fillRect(-w/4, -mb + l*0.85, w/2, l/20); // Tail
    ctx.fillStyle = '#fff'; ctx.beginPath(); ctx.arc(0, -mb+l, 2, 0, Math.PI*2); ctx.fill();

    if (!ac.isSafe) {
        ctx.rotate(-ac.heading * Math.PI / 180); ctx.fillStyle = '#b91c1c';
        ctx.font = 'bold 10px Inter'; ctx.fillText(`⚠️ ${ac.errorMsg}`, 0, -40);
    }
    ctx.restore();
  }

  function toggleSwingOut() { if(selectedIdx !== -1) placedAircraft[selectedIdx].swing = document.getElementById('swingToggle').checked; }
  function rotateSelected(deg) { if(selectedIdx !== -1) placedAircraft[selectedIdx].heading += deg; }
  function deleteSelected() { if(selectedIdx !== -1) { placedAircraft.splice(selectedIdx, 1); selectedIdx = -1; document.getElementById('inspector').classList.add('hidden'); } }
  function updateInspector() {
    const ac = placedAircraft[selectedIdx];
    document.getElementById('inspector').classList.remove('hidden');
    document.getElementById('swingToggle').checked = ac.swing;
    document.getElementById('insDetail').innerHTML = `<b>${ac.Model}</b> (Code ${ac.ICAO})<br>Pos: ${ac.mX.toFixed(1)}m, ${ac.mY.toFixed(1)}m`;
  }
</script>
</body>
</html>
