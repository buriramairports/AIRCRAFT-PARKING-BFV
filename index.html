<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <title>Apron Simulation Pro v31.0 - Stable Edition</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=Sarabun:wght@400;700&display=swap" rel="stylesheet">
  <style>
    body { height: 100vh; display: flex; flex-direction: column; overflow: hidden; font-family: 'Inter', 'Sarabun', sans-serif; }
    #canvasContainer { flex: 1; overflow: auto; background-color: #cbd5e1; position: relative; scroll-behavior: smooth; }
    canvas { background-color: #f1f5f9; cursor: crosshair; touch-action: none; display: block; margin: auto; }
    .tab-btn { border-bottom: 3px solid transparent; transition: all 0.3s; }
    .tab-btn.active { border-bottom: 3px solid #0ea5e9; color: #0ea5e9; background-color: #f8fafc; }
    label { font-size: 10px; font-weight: 800; color: #64748b; text-transform: uppercase; letter-spacing: 0.05em; display: block; margin-bottom: 2px; }
    #mathPanel { position: fixed; top: 160px; right: 20px; width: 300px; background: rgba(15, 23, 42, 0.95); color: #22d3ee; padding: 18px; border-radius: 24px; font-family: monospace; font-size: 10px; z-index: 50; border: 1px solid #0ea5e9; backdrop-filter: blur(8px); }
    #mathPanel h4 { color: #fff; font-weight: 900; margin-bottom: 10px; border-bottom: 1px solid #334155; padding-bottom: 5px; text-transform: uppercase; }
    .modal { display: none; position: fixed; inset: 0; background: rgba(15, 23, 42, 0.6); z-index: 100; backdrop-filter: blur(4px); align-items: center; justify-content: center; }
    .modal.active { display: flex; }
    #loader { display: none; position: fixed; inset: 0; background: rgba(15, 23, 42, 0.8); z-index: 999; flex-direction: column; align-items: center; justify-content: center; color: white; }
    .spinner { width: 40px; height: 40px; border: 4px solid rgba(255,255,255,0.1); border-top-color: #0ea5e9; border-radius: 50%; animation: spin 1s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    #canvasContainer::-webkit-scrollbar { width: 12px; height: 12px; }
    #canvasContainer::-webkit-scrollbar-thumb { background: #94a3b8; border-radius: 10px; border: 3px solid #e2e8f0; }
  </style>
</head>
<body class="bg-slate-100">

  <div id="loader"><div class="spinner mb-4"></div><p class="font-bold text-sm animate-pulse">กำลังประมวลผลข้อมูล...</p></div>
  <div id="toast" class="hidden fixed top-4 left-1/2 -translate-x-1/2 bg-emerald-600 text-white px-6 py-2 rounded-full shadow-2xl font-bold text-sm z-[1000] animate-bounce">สำเร็จ!</div>

  <!-- Safety Engine Dashboard -->
  <div id="mathPanel" class="shadow-2xl shadow-sky-900/20">
     <h4><i data-lucide="calculator" class="w-4 h-4 inline mr-1"></i> Safety Math Engine</h4>
     <div id="mathOutput" class="space-y-2"></div>
  </div>

  <header class="bg-slate-900 text-white h-14 px-6 flex justify-between items-center shadow-xl shrink-0 z-30">
    <div class="flex items-center gap-3">
      <div class="bg-sky-500 p-1.5 rounded text-white shadow-lg shadow-sky-500/30"><i data-lucide="shield-check"></i></div>
      <h1 class="text-lg font-black tracking-tighter text-sky-400 uppercase">Apron Control <span class="text-white text-xs ml-1">v31.0 Stable</span></h1>
    </div>
    <div class="flex gap-4">
      <input type="date" id="datePicker" class="text-slate-900 px-3 py-1 rounded text-xs font-bold border-none outline-none shadow-inner">
      <button onclick="loadData()" class="bg-slate-700 p-2 rounded hover:bg-slate-600 transition"><i data-lucide="refresh-cw" class="w-4 h-4 text-white"></i></button>
    </div>
  </header>

  <!-- Aircraft Picker -->
  <div class="bg-white border-b h-20 flex items-center px-6 gap-3 overflow-x-auto shrink-0 z-20 shadow-sm no-scrollbar">
     <div class="flex flex-col shrink-0 border-r pr-4 mr-2">
        <span class="text-[9px] font-black text-slate-400 uppercase tracking-widest">Models</span>
        <span class="text-[10px] font-bold text-slate-600 italic">เลือกเพื่อวาง</span>
     </div>
     <div id="acToolbar" class="flex gap-2"></div>
  </div>

  <div class="flex flex-1 overflow-hidden">
    <aside class="w-80 bg-white border-r flex flex-col shadow-2xl z-10 shrink-0">
      <div class="flex border-b text-[10px] font-black uppercase text-slate-400">
        <button onclick="switchTab('inspector')" id="tab-inspector" class="tab-btn flex-1 p-4 active">รายละเอียด</button>
        <button onclick="switchTab('data')" id="tab-data" class="tab-btn flex-1 p-4">จัดการข้อมูล</button>
      </div>

      <div class="p-5 flex-1 overflow-y-auto bg-slate-50/20">
        <div id="view-inspector" class="space-y-6">
          <div class="p-4 bg-sky-50 rounded-2xl border border-sky-100 shadow-inner">
             <div class="flex justify-between items-center mb-2">
                <span class="text-[9px] font-black text-slate-400">Map Zoom</span>
                <span id="zoomDisplay" class="text-xs font-bold text-sky-600">100%</span>
             </div>
             <input type="range" id="zoomSlider" min="50" max="200" value="100" class="w-full h-1 bg-sky-200 rounded-lg appearance-none cursor-pointer accent-sky-600" oninput="handleZoom(this.value)">
          </div>

          <div id="activePlanePanel" class="hidden animate-fadeIn space-y-4">
             <div id="insHeader" class="p-5 text-white rounded-3xl shadow-xl border-b-4">
                <h3 id="insModel" class="text-2xl font-black tracking-tighter">Model</h3>
                <p id="insStatusText" class="text-xs font-bold uppercase tracking-widest">Safe</p>
             </div>
             <label class="flex items-center justify-between p-3 bg-white rounded-xl border-2 border-slate-100 cursor-pointer hover:bg-slate-50 transition shadow-sm">
                <span class="text-[10px] font-black uppercase text-slate-500">จำลอง Swing-out</span>
                <input type="checkbox" id="swingToggle" onchange="toggleSwingOut()" class="w-5 h-5 accent-sky-500">
             </label>
             <div class="grid grid-cols-2 gap-2">
                <button onclick="rotateSelected(-5)" class="p-4 bg-white border rounded-2xl hover:bg-sky-50 transition shadow-sm font-bold text-slate-600"><i data-lucide="rotate-ccw" class="w-5 h-5 mx-auto"></i></button>
                <button onclick="rotateSelected(5)" class="p-4 bg-white border rounded-2xl hover:bg-sky-50 transition shadow-sm font-bold text-slate-600"><i data-lucide="rotate-cw" class="w-5 h-5 mx-auto"></i></button>
                <button onclick="deleteSelected()" class="col-span-2 p-3 bg-red-50 text-red-500 rounded-xl font-bold hover:bg-red-500 hover:text-white transition flex items-center justify-center gap-2 shadow-sm"><i data-lucide="trash-2" class="w-4 h-4"></i> ลบเครื่องที่เลือก</button>
             </div>
          </div>
          <div id="noSelectionMsg" class="py-20 text-center text-slate-300 italic text-sm">คลิกเลือกเครื่องบินบนแผนผัง</div>
        </div>

        <div id="view-data" class="hidden space-y-6">
           <div class="bg-emerald-50 p-4 rounded-2xl border border-emerald-100 space-y-3 shadow-sm">
              <h4 class="font-black text-emerald-800 text-[10px] uppercase">ปีกปลอดภัย Min Clearance (m)</h4>
              <div id="safetyConfigList" class="grid grid-cols-2 gap-2"></div>
              <button onclick="uiSaveSafety()" class="w-full bg-emerald-600 text-white p-2 rounded-lg text-[10px] font-black uppercase shadow-lg">อัปเดตมาตรฐาน</button>
           </div>
           <div class="space-y-3">
              <div class="flex justify-between items-center"><h3 class="font-black text-[10px] text-slate-400 uppercase tracking-widest">Stands List</h3><button onclick="openStandModal()" class="text-sky-600 font-bold text-[10px] bg-sky-50 px-2 py-1 rounded">+ เพิ่ม</button></div>
              <div id="standsTable" class="space-y-2"></div>
           </div>
           <div class="space-y-3 border-t pt-4">
              <div class="flex justify-between items-center"><h3 class="font-black text-[10px] text-slate-400 uppercase tracking-widest">Aircraft Models</h3><button onclick="openAircraftModal()" class="text-sky-600 font-bold text-[10px] bg-sky-50 px-2 py-1 rounded">+ เพิ่ม</button></div>
              <div id="aircraftTable" class="space-y-2"></div>
           </div>
        </div>
      </div>

      <div class="p-5 bg-slate-50 border-t shrink-0 flex flex-col gap-2">
         <div class="flex items-center gap-3"><span class="w-3.5 h-3.5 bg-green-500 rounded-full shadow-sm"></span> <span class="text-[10px] font-bold text-slate-600 uppercase tracking-widest">SAFE (PASS)</span></div>
         <div class="flex items-center gap-3"><span class="w-3.5 h-3.5 bg-red-500 rounded-full shadow-sm"></span> <span class="text-[10px] font-bold text-slate-600 uppercase tracking-widest">DANGER / CLASH</span></div>
      </div>
    </aside>

    <main id="canvasContainer">
      <canvas id="mainCanvas"></canvas>
    </main>
  </div>

  <!-- Modal Stand Form -->
  <div id="modalStand" class="modal">
    <div class="bg-white rounded-3xl w-[400px] p-6 shadow-2xl space-y-4 animate-fadeIn text-slate-700">
       <h3 class="font-black border-b pb-2 uppercase tracking-tighter" id="standFormTitle">Stand Configuration</h3>
       <div><label>Stand ID</label><input id="st-id" class="w-full p-2 border rounded-lg focus:ring-2 outline-none"></div>
       <div class="grid grid-cols-2 gap-4">
          <div><label>กว้าง Width (ม.)</label><input id="st-w" type="number" class="w-full p-2 border rounded-lg"></div>
          <div><label>ยาว Length (ม.)</label><input id="st-l" type="number" class="w-full p-2 border rounded-lg"></div>
       </div>
       <div class="grid grid-cols-2 gap-4">
          <div><label>ขอบซ้าย L Border</label><input id="st-border-l" type="number" value="50" class="w-full p-2 border border-blue-200 rounded-lg"></div>
          <div><label>ขอบขวา R Border</label><input id="st-border-r" type="number" value="50" class="w-full p-2 border border-blue-200 rounded-lg"></div>
       </div>
       <div class="grid grid-cols-2 gap-4">
          <div><label>T-MARK 1</label><input id="st-t1" type="number" value="15" class="w-full p-2 border border-yellow-400 rounded-lg"></div>
          <div><label>T-MARK 2</label><input id="st-t2" type="number" value="20" class="w-full p-2 border border-yellow-400 rounded-lg"></div>
       </div>
       <div class="grid grid-cols-2 gap-4">
          <div><label>Heading (องศา)</label><input id="st-heading" type="number" value="0" class="w-full p-2 border rounded-lg"></div>
          <div><label>Max ICAO Code</label><select id="st-code" class="w-full p-2 border rounded-lg"><option value="C">Code C</option><option value="E">Code E</option><option value="F">Code F</option></select></div>
       </div>
       <div><label>ระยะปลอดภัยท้าย (Tail Limit)</label><input id="st-tail" type="number" value="5" class="w-full p-2 border border-red-200 rounded-lg"></div>
       <div><label>หลุมหลัก (Parent ID)</label><select id="st-parent" class="w-full p-2 border rounded-lg"></select></div>
       <input id="st-offset" type="number" value="0" class="w-full p-2 border rounded-lg" placeholder="OffsetX (m)">
       <select id="st-status" class="w-full p-2 border rounded-lg font-bold bg-slate-50"><option value="active">Active (เปิด)</option><option value="closed">Closed (ปิด)</option></select>
       <button onclick="uiSaveStand()" class="w-full bg-sky-600 text-white p-4 rounded-2xl font-bold shadow-lg">บันทึกข้อมูลหลุมจอด</button>
       <button onclick="closeModal('modalStand')" class="w-full text-slate-400 text-xs mt-2 text-center underline">ยกเลิก / ปิด</button>
    </div>
  </div>

  <div id="modalAircraft" class="modal">
    <div class="bg-white rounded-3xl w-[400px] p-6 shadow-2xl space-y-4 animate-fadeIn text-slate-700">
       <h3 class="font-black border-b pb-2 uppercase tracking-tighter" id="acFormTitle">Aircraft Model</h3>
       <div><label>รุ่น (Model Name)</label><input id="ac-m" class="w-full p-2 border rounded-lg focus:ring-2 outline-none"></div>
       <div class="grid grid-cols-2 gap-4">
          <div><label>ปีกกว้าง (Span ม.)</label><input id="ac-s" type="number" class="w-full p-2 border rounded-lg"></div>
          <div><label>ยาว (Length ม.)</label><input id="ac-l" type="number" class="w-full p-2 border rounded-lg"></div>
       </div>
       <div class="grid grid-cols-2 gap-4">
          <div><label>จมูก-ล้อเมน (ม.)</label><input id="ac-nmg" type="number" class="w-full p-2 border rounded-lg"></div>
          <div><label>SA Steering (deg)</label><input id="ac-sa" type="number" value="45" class="w-full p-2 border rounded-lg"></div>
       </div>
       <div><label>Jet Blast Safe (ม.)</label><input id="ac-jb" type="number" value="40" class="w-full p-2 border rounded-lg"></div>
       <select id="ac-code" class="w-full p-2 border rounded-lg font-bold"><option value="C">Code C</option><option value="E">Code E</option><option value="F">Code F</option></select>
       <input id="ac-col" type="color" value="#0ea5e9" class="w-full h-10 rounded-lg border-none p-0.5 shadow-inner">
       <button onclick="uiSaveAircraft()" class="w-full bg-slate-900 text-white p-4 rounded-2xl font-bold shadow-lg">บันทึกโมเดลเครื่อง</button>
       <button onclick="closeModal('modalAircraft')" class="w-full text-slate-400 text-xs text-center underline">ยกเลิก / ปิด</button>
    </div>
  </div>

<script>
  const WEB_APP_URL = 'https://script.google.com/macros/s/AKfycbxqCIfejWJerGZfjRfZs-Bn0Bq37jIxzAUdX_-fpK5i3hDiEK-6rBNNSE4KFDuITRT7/exec'; 

  let aircraftTypes = [], stands = [], safetySettings = {};
  let placedAircraft = [], selectedIdx = -1, ghostAircraft = null;
  let baseScale = 4, zoomPercent = 100, scale = 4, originX = 0, originY = 0;
  let isDraggingAC = false;

  const canvas = document.getElementById('mainCanvas');
  const ctx = canvas.getContext('2d');

  // --- CRUD Functions ---
  async function apiCall(action, data = {}) {
    showLoader(true);
    try {
        const response = await fetch(WEB_APP_URL, { method: 'POST', body: JSON.stringify({ action, data }) });
        const res = await response.json();
        showLoader(false);
        if(res.success) showToast("ดำเนินการสำเร็จ");
        return res.data;
    } catch(e) { showLoader(false); return null; }
  }

  function showLoader(show) { document.getElementById('loader').style.display = show ? 'flex' : 'none'; }
  function showToast(msg) { const t = document.getElementById('toast'); t.innerText = msg; t.classList.remove('hidden'); setTimeout(() => t.classList.add('hidden'), 3000); }
  function closeModal(id) { document.getElementById(id).classList.remove('active'); }
  function switchTab(t) { ['inspector','data'].forEach(v => { document.getElementById('tab-'+v).className = `flex-1 p-4 border-b-2 text-[10px] font-black uppercase ${v===t ? 'border-sky-500 text-sky-600 bg-sky-50/50' : 'border-transparent text-slate-400'}`; document.getElementById('view-'+v).classList.toggle('hidden', v!==t); }); }

  // --- Initial Data Load ---
  window.onload = async () => { lucide.createIcons(); document.getElementById('datePicker').valueAsDate = new Date(); await loadData(); animate(); };

  async function loadData() {
    const data = await apiCall('getInitialData');
    if(!data) return;
    aircraftTypes = data.aircraftTypes || [];
    stands = data.stands || [];
    safetySettings = {};
    (data.safetySettings || []).forEach(s => safetySettings[s.Code] = s.MinClearance);
    renderAircraftToolbar(); renderStandsTable(); renderAircraftTypeTable(); renderSafetyConfig(); updateParentDropdown();
    calculateApronLayout();
  }

  function calculateApronLayout() {
    const container = document.getElementById('canvasContainer');
    const parents = stands.filter(s => !s.ParentID).sort((a,b) => String(a.StandID).localeCompare(String(b.StandID), undefined, {numeric: true}));
    let totalM = parents.reduce((sum, s) => sum + Number(s.Width), 0);
    canvas.width = (totalM + 300) * scale;
    canvas.height = 800 * (zoomPercent/100);
    originX = canvas.width - (100 * scale); originY = canvas.height / 2;
    let currentMX = 0;
    parents.forEach(s => {
      s.mX = currentMX - (Number(s.Width) / 2); s.mY = 0;
      currentMX -= Number(s.Width); 
      stands.filter(child => String(child.ParentID) === String(s.StandID)).forEach(child => {
          child.mX = s.mX + (Number(child.OffsetX) || 0); child.mY = 0;
      });
    });
    if(selectedIdx === -1) setTimeout(() => { container.scrollLeft = container.scrollWidth; }, 100);
  }

  // --- Logic Snap Precision ---
  function findBestStand(ac) {
    let pot = stands.filter(s => ac.mX >= (s.mX - s.Width/2) && ac.mX <= (s.mX + s.Width/2) && ac.mY >= (s.mY - s.Length/2) && ac.mY <= (s.mY + s.Length/2));
    if (pot.length === 0) return null;
    pot.sort((a, b) => Math.abs(ac.mX - a.mX) - Math.abs(ac.mX - b.mX));
    return pot[0];
  }

  function findBestSnap(ac, world) {
    let bx = world.mx, by = world.my, bh = ac.heading;
    stands.forEach(s => {
      if (Math.abs(world.mx - s.mX) < 10) {
        bx = s.mX; bh = 180;
        const noseOffset = ac.Length / 2;
        const targetY1 = (s.mY + s.Length/2) - s.TMark1 - noseOffset;
        const targetY2 = (s.mY + s.Length/2) - s.TMark2 - noseOffset;
        if (Math.abs(world.my - targetY1) < 10) by = targetY1;
        else if (Math.abs(world.my - targetY2) < 10) by = targetY2;
      }
    });
    return { x: bx, y: by, h: bh };
  }

  function checkSafety() {
    let mathLog = "";
    placedAircraft.forEach((ac, idx) => {
        let staticSafe = true, lSafe = true, rSafe = true, error = "";
        let stand = findBestStand(ac);
        if (stand) {
            const noseY = ac.mY + (ac.Length / 2);
            const distFromBottom = (stand.mY + stand.Length / 2) - noseY;
            if (distFromBottom < -0.1) { staticSafe = false; error = "จมูกล้นเขตหัวหลุม"; }
            const tailY = ac.mY - (ac.Length / 2);
            const tailDistFromTop = tailY - (stand.mY - stand.Length / 2);
            if (tailDistFromTop < Number(stand.TailLimit || 5)) { staticSafe = false; error = "ท้ายล้นเขต Taxiway"; }
            if (ac.ICAO.charCodeAt(0) > stand.MaxCode.charCodeAt(0)) { staticSafe = false; error = "เครื่องใหญ่เกินหลุม"; }
            if (stand.Status === 'closed') { staticSafe = false; error = "หลุมปิดใช้งาน"; }
            
            if (ac.swing && staticSafe) {
                const turnR = ac.NoseToMainGear / Math.sin((ac.SteeringAngle || 45) * Math.PI / 180);
                const sweptR = Math.hypot(turnR + ac.WingSpan / 2, ac.Length - ac.NoseToMainGear);
                if (Number(stand.LeftBorder) > 0 && sweptR > Number(stand.LeftBorder)) lSafe = false;
                if (Number(stand.RightBorder) > 0 && sweptR > Number(stand.RightBorder)) rSafe = false;
            }

            if (idx === selectedIdx) {
                mathLog += `<p class="text-sky-300 font-black border-b border-sky-900 pb-1 uppercase tracking-tighter">ข้อมูลพิกัดละเอียด</p>`;
                mathLog += `<p>จมูกห่างหัวหลุม: ${distFromBottom.toFixed(2)} ม.</p>`;
                mathLog += `<p>หางห่างท้ายหลุม: ${tailDistFromTop.toFixed(2)} ม.</p>`;
            }
        } else { staticSafe = false; error = "อยู่นอกเขตหลุมจอด"; }

        let leftNeighbor = null, rightNeighbor = null;
        let minL = Infinity, minR = Infinity;
        placedAircraft.forEach((other, oIdx) => {
            if (idx === oIdx) return;
            const dist = Math.hypot(ac.mX - other.mX, ac.mY - other.mY);
            const minReq = safetySettings[ac.ICAO] || 4.5;
            const clear = dist - (ac.WingSpan / 2 + other.WingSpan / 2);
            const isOtherOnLeftScreen = (other.mX < ac.mX); 

            if (clear < minReq) { 
                staticSafe = false; if (isOtherOnLeftScreen) rSafe = false; else lSafe = false;
                if (error === "") error = "ระยะปีกอันตราย"; 
            }
            
            if (ac.swing && staticSafe) {
                const tr = ac.NoseToMainGear / Math.sin((ac.SteeringAngle || 45) * Math.PI / 180);
                const swR = Math.hypot(tr + ac.WingSpan / 2, ac.Length - ac.NoseToMainGear);
                const gap = dist - (other.WingSpan / 2);
                if (gap < swR) { if (isOtherOnLeftScreen) rSafe = false; else lSafe = false; }
                if (idx === selectedIdx) {
                    const relX = other.mX - ac.mX; 
                    if (relX > 0 && relX < minL) { minL = relX; leftNeighbor = other; }
                    else if (relX < 0 && Math.abs(relX) < minR) { minR = Math.abs(relX); rightNeighbor = other; }
                }
            }
        });

        if (idx === selectedIdx && ac.swing) {
            [{d:leftNeighbor, l:"ซ้าย (Left)", s:"L"}, {d:rightNeighbor, l:"ขวา (Right)", s:"R"}].forEach(n => {
                if (n.d) {
                    const d = Math.hypot(ac.mX - n.d.mX, ac.mY - n.d.mY);
                    const tr = ac.NoseToMainGear / Math.sin((ac.SteeringAngle || 45) * Math.PI / 180);
                    const swR = Math.hypot(tr + ac.WingSpan/2, ac.Length - ac.NoseToMainGear);
                    const gap = d - (n.d.WingSpan/2);
                    const isClash = gap < swR;
                    const oS = findBestStand(n.d);
                    const boxCol = isClash ? "bg-red-900/40 border-red-500" : "bg-emerald-900/40 border-emerald-500";
                    mathLog += `<div class="mt-2 p-2 rounded-xl border ${boxCol} text-[10px] animate-fadeIn"><p class="text-white font-bold">เลี้ยว${n.l} vs Stand ${oS?oS.StandID:'?'}</p> กวาด: ${swR.toFixed(1)}ม. | ว่าง: ${gap.toFixed(1)}ม. | ผล: ${isClash ? '⚠️ ชน' : '✅ พ้น'}</div>`;
                }
            });
        }
        if (ac.swing && (!lSafe || !rSafe) && error === "") error = "วงเลี้ยวไม่ปลอดภัย";
        ac.isSafe = staticSafe && lSafe && rSafe;
        ac.leftSafe = lSafe; ac.rightSafe = rSafe; ac.staticSafe = staticSafe; ac.errorMsg = error;
    });
    document.getElementById('mathOutput').innerHTML = mathLog || '<p class="text-slate-500 italic text-[10px]">เลือกเครื่องบินเพื่อตรวจสอบ...</p>';
    if (selectedIdx !== -1) updateInspector();
  }

  function animate() {
    ctx.clearRect(0, 0, canvas.width, canvas.height); checkSafety();
    stands.forEach(s => {
      const p = mToP(s.mX, s.mY), w = s.Width * scale, l = s.Length * scale;
      ctx.save(); ctx.translate(p.x, p.y); ctx.rotate((s.Heading || 0) * Math.PI / 180);
      ctx.strokeStyle = s.Status === 'active' ? '#94a3b8' : '#ef4444'; ctx.setLineDash([5, 5]); ctx.strokeRect(-w/2, -l/2, w, l);
      if(s.Status === 'closed') { ctx.fillStyle = 'rgba(239, 68, 68, 0.1)'; ctx.fillRect(-w/2, -l/2, w, l); }
      ctx.beginPath(); ctx.setLineDash(s.ParentID ? [10, 5] : []); ctx.strokeStyle = "#facc15"; ctx.lineWidth = 3;
      const t1Y = (l/2) - (Number(s.TMark1 || 15) * scale);
      ctx.moveTo(0, -l/2); ctx.lineTo(0, t1Y); ctx.stroke();
      ctx.setLineDash([]); ctx.lineWidth = 2;
      [s.TMark1, s.TMark2].forEach(tm => { const tmY = (l/2) - (Number(tm) * scale); ctx.beginPath(); ctx.moveTo(-5*scale, tmY); ctx.lineTo(5*scale, tmY); ctx.stroke(); });
      const fs = Math.max(9, 14 * (zoomPercent/100)); ctx.fillStyle = s.ParentID ? "#334155" : "#0f172a"; 
      const label = `${s.StandID} (${s.MaxCode})`; const tw = ctx.measureText(label).width;
      const lblY = s.ParentID ? (-l/2 - fs * 1.5) : (-l/2 - fs * 3.5);
      ctx.fillRect(-tw/2 - 10, lblY - fs, tw + 20, fs * 1.8);
      ctx.fillStyle = "white"; ctx.textAlign = "center"; ctx.fillText(label, 0, lblY + (fs * 0.2));
      ctx.fillStyle = "#64748b"; ctx.font = `bold ${fs*0.8}px Inter`; ctx.fillText(`${s.Width} x ${s.Length} ม.`, 0, l/2 + fs + 5);
      ctx.restore();
    });
    // Dimension lines
    let sortedAC = [...placedAircraft].sort((a,b) => b.mX - a.mX);
    ctx.setLineDash([4, 4]); ctx.lineWidth = 1; ctx.strokeStyle = "#475569";
    for(let i=0; i < sortedAC.length - 1; i++) {
        const acR = sortedAC[i], acL = sortedAC[i+1];
        const clearM = Math.abs(acR.mX - acL.mX) - (acR.WingSpan/2 + acL.WingSpan/2);
        if (Math.abs(acR.mX - acL.mX) < 120) {
            const pR = mToP(acR.mX - acR.WingSpan/2, acR.mY), pL = mToP(acL.mX + acL.WingSpan/2, acL.mY);
            ctx.beginPath(); ctx.moveTo(pR.x, pR.y); ctx.lineTo(pL.x, pL.y); ctx.stroke();
            ctx.fillStyle = "#1e293b"; ctx.font = "bold 11px monospace"; ctx.textAlign="center";
            ctx.fillText(clearM.toFixed(1) + "m", (pR.x + pL.x)/2, pR.y - 8);
        }
    }
    placedAircraft.forEach((ac, i) => drawAircraft(ac, i === selectedIdx));
    if (ghostAircraft) { ctx.globalAlpha = 0.5; drawAircraft(ghostAircraft, true); ctx.globalAlpha = 1.0; }
    requestAnimationFrame(animate);
  }

  function drawAircraft(ac, isSelected) {
    const p = mToP(ac.mX, ac.mY), w = ac.WingSpan * scale, l = ac.Length * scale, mb = ac.NoseToMainGear * scale;
    const fs = Math.max(8, 11 * (zoomPercent/100));
    ctx.save(); ctx.translate(p.x, p.y);
    const auraR = (ac.WingSpan/2 + (safetySettings[ac.ICAO] || 4.5)) * scale;
    ctx.beginPath(); ctx.arc(0, 0, auraR, Math.PI/2, 1.5 * Math.PI); ctx.fillStyle = ac.rightSafe ? 'rgba(34, 197, 94, 0.08)' : 'rgba(239, 68, 68, 0.2)'; ctx.fill();
    ctx.beginPath(); ctx.arc(0, 0, auraR, 1.5 * Math.PI, 0.5 * Math.PI); ctx.fillStyle = ac.leftSafe ? 'rgba(34, 197, 94, 0.08)' : 'rgba(239, 68, 68, 0.2)'; ctx.fill();
    ctx.restore();

    ctx.save(); ctx.translate(p.x, p.y); ctx.rotate(ac.heading * Math.PI / 180);
    if (ac.swing) {
        ctx.setLineDash([4, 4]); ctx.lineWidth = 1.5;
        const tr = ac.NoseToMainGear / Math.sin((ac.SteeringAngle || 45) * Math.PI / 180);
        const sr = Math.hypot(tr + ac.WingSpan/2, ac.Length - ac.NoseToMainGear) * scale;
        ctx.strokeStyle = ac.rightSafe ? 'rgba(34, 197, 94, 0.6)' : 'rgba(239, 68, 68, 0.8)';
        ctx.beginPath(); ctx.arc(-tr*scale, mb, sr, 1.5 * Math.PI, 2 * Math.PI); ctx.stroke();
        ctx.strokeStyle = ac.leftSafe ? 'rgba(34, 197, 94, 0.6)' : 'rgba(239, 68, 68, 0.8)';
        ctx.beginPath(); ctx.arc(tr*scale, mb, sr, Math.PI, 1.5 * Math.PI); ctx.stroke();
    }
    ctx.fillStyle = isSelected ? '#0ea5e9' : (ac.isSafe ? ac.Color : '#ef4444');
    ctx.fillRect(-w/20, -mb, w/10, l); ctx.fillRect(-w/2, -mb + l*0.15, w, l/10); ctx.fillRect(-w/4, -mb + l*0.85, w/2, l/20);
    ctx.restore();

    ctx.save(); ctx.translate(p.x, p.y); ctx.fillStyle = 'rgba(15, 23, 42, 0.8)';
    const mLabel = ac.Model; ctx.font = `bold ${fs}px Inter`; const mTw = ctx.measureText(mLabel).width;
    ctx.fillRect(-mTw/2-6, -fs/2-5, mTw+12, fs+10); ctx.fillStyle = "white"; ctx.textAlign="center"; ctx.fillText(mLabel, 0, fs/3);
    if (ac.swing) {
        ctx.font = `bold ${fs-1}px Inter`;
        ctx.fillStyle = ac.rightSafe ? "#22c55e" : "#ef4444"; ctx.fillText(ac.rightSafe ? "R:OK" : "R:⚠️", -w/2 - 20, 0);
        ctx.fillStyle = ac.leftSafe ? "#22c55e" : "#ef4444"; ctx.fillText(ac.leftSafe ? "L:OK" : "L:⚠️", w/2 + 20, 0);
    }
    if (!ac.isSafe) { ctx.fillStyle = '#ef4444'; ctx.font = `bold ${fs+2}px Sarabun`; ctx.fillText("⚠️ " + ac.errorMsg, 0, -fs * 6); }
    ctx.restore();
  }

  // --- UI CRUD ---
  function editStand(i) {
    const s = stands[i];
    document.getElementById('st-id').value = s.StandID;
    document.getElementById('st-w').value = s.Width;
    document.getElementById('st-l').value = s.Length;
    document.getElementById('st-t1').value = s.TMark1;
    document.getElementById('st-t2').value = s.TMark2;
    document.getElementById('st-tail').value = s.TailLimit;
    document.getElementById('st-heading').value = s.Heading || 0;
    document.getElementById('st-code').value = s.MaxCode;
    document.getElementById('st-parent').value = s.ParentID || "";
    document.getElementById('st-status').value = s.Status || 'active';
    document.getElementById('st-border-l').value = s.LeftBorder || 50;
    document.getElementById('st-border-r').value = s.RightBorder || 50;
    document.getElementById('modalStand').classList.add('active');
    updateParentDropdown();
  }
  function editAircraft(i) {
    const ac = aircraftTypes[i];
    document.getElementById('ac-m').value = ac.Model;
    document.getElementById('ac-s').value = ac.WingSpan;
    document.getElementById('ac-l').value = ac.Length;
    document.getElementById('ac-nmg').value = ac.NoseToMainGear;
    document.getElementById('ac-sa').value = ac.SteeringAngle || 45;
    document.getElementById('ac-jb').value = ac.JetBlast || 40;
    document.getElementById('ac-code').value = ac.ICAO;
    document.getElementById('ac-col').value = ac.Color;
    document.getElementById('modalAircraft').classList.add('active');
  }
  async function uiSaveStand() { const d = { StandID: document.getElementById('st-id').value, Width: Number(document.getElementById('st-w').value), Length: Number(document.getElementById('st-l').value), TMark1: Number(document.getElementById('st-t1').value), TMark2: Number(document.getElementById('st-t2').value), TailLimit: Number(document.getElementById('st-tail').value), Heading: Number(document.getElementById('st-heading').value), MaxCode: document.getElementById('st-code').value, ParentID: document.getElementById('st-parent').value, OffsetX: Number(document.getElementById('st-offset').value), Status: document.getElementById('st-status').value, LeftBorder: Number(document.getElementById('st-border-l').value), RightBorder: Number(document.getElementById('st-border-r').value) }; await apiCall('saveStand', d); closeModal('modalStand'); await loadData(); }
  async function uiSaveAircraft() { const d = { Model: document.getElementById('ac-m').value, WingSpan: Number(document.getElementById('ac-s').value), Length: Number(document.getElementById('ac-l').value), NoseToMainGear: Number(document.getElementById('ac-nmg').value), SteeringAngle: Number(document.getElementById('ac-sa').value), JetBlast: Number(document.getElementById('ac-jb').value), ICAO: document.getElementById('ac-code').value, Color: document.getElementById('ac-col').value }; await apiCall('saveAircraftType', d); closeModal('modalAircraft'); await loadData(); }
  function openStandModal() { document.getElementById('st-id').value=""; document.getElementById('modalStand').classList.add('active'); updateParentDropdown(); }
  function openAircraftModal() { document.getElementById('ac-m').value=""; document.getElementById('modalAircraft').classList.add('active'); }
  async function uiDeleteStand(id) { if(confirm('ลบหลุมจอด '+id+'?')) { await apiCall('deleteStand', {id}); await loadData(); } }
  async function uiDeleteAircraft(id) { if(confirm('ลบโมเดล '+id+'?')) { await apiCall('deleteAircraftType', {id}); await loadData(); } }

  // --- Common Helpers ---
  function updateInspector() { const ac = placedAircraft[selectedIdx]; if(!ac) return; document.getElementById('activePlanePanel').classList.remove('hidden'); document.getElementById('noSelectionMsg').classList.add('hidden'); document.getElementById('swingToggle').checked = ac.swing; document.getElementById('insModel').innerText = ac.Model; const hdr = document.getElementById('insHeader'); hdr.className = ac.isSafe ? "p-5 bg-emerald-600 text-white rounded-3xl shadow-xl border-b-4 border-emerald-800" : "p-5 bg-red-600 text-white rounded-3xl shadow-xl border-b-4 border-red-800"; document.getElementById('insStatusText').innerText = ac.isSafe ? "✅ ปลอดภัย (SAFE)" : `⚠️ ${ac.errorMsg}`; }
  function renderAircraftToolbar() { document.getElementById('acToolbar').innerHTML = aircraftTypes.map((t, i) => `<button onclick="pickGhost(${i})" class="flex flex-col items-center justify-center p-2 bg-white border-2 border-slate-100 rounded-xl hover:border-sky-500 transition w-24 shrink-0 shadow-sm"><b class="text-[10px] text-slate-800">${t.Model}</b><span class="text-[8px] font-black text-sky-500 uppercase">Code ${t.ICAO}</span></button>`).join(''); }
  function renderStandsTable() { document.getElementById('standsTable').innerHTML = stands.map((s, i) => `<div class="flex justify-between items-center p-2.5 bg-white border rounded-xl text-[10px] font-bold shadow-sm group"><div>${s.StandID}</div><div class="flex gap-1"><button onclick="editStand(${i})" class="bg-sky-50 text-sky-600 p-1.5 rounded hover:bg-sky-500 hover:text-white transition">แก้</button><button onclick="uiDeleteStand('${s.StandID}')" class="bg-red-50 text-red-400 p-1.5 rounded hover:bg-red-500 hover:text-white transition">ลบ</button></div></div>`).join(''); }
  function renderAircraftTypeTable() { document.getElementById('aircraftTable').innerHTML = aircraftTypes.map((ac, i) => `<div class="flex justify-between items-center p-2.5 bg-white border rounded-xl text-[10px] font-bold shadow-sm"><div>${ac.Model}</div><div class="flex gap-1"><button onclick="editAircraft(${i})" class="bg-sky-50 text-sky-600 p-1.5 rounded hover:bg-sky-500 hover:text-white transition">แก้</button><button onclick="uiDeleteAircraft('${ac.Model}')" class="bg-red-50 text-red-400 p-1.5 rounded hover:bg-red-500 hover:text-white transition">ลบ</button></div></div>`).join(''); }
  function renderSafetyConfig() { document.getElementById('safetyConfigList').innerHTML = Object.keys(safetySettings).map(code => `<div class="bg-white p-2 rounded-lg border text-center"><label class="text-[8px] text-slate-400">Code ${code}</label><input type="number" step="0.1" value="${safetySettings[code]}" id="safe-${code}" class="w-full text-xs font-bold border-none outline-none p-0 text-center"></div>`).join(''); }
  function updateParentDropdown() { document.getElementById('st-parent').innerHTML = '<option value="">-- ไม่มี --</option>' + stands.filter(s => !s.ParentID).map(p => `<option value="${p.StandID}">${p.StandID}</option>`).join(''); }
  function handleZoom(v) { zoomPercent=v; document.getElementById('zoomDisplay').innerText=v+"%"; scale=(baseScale*zoomPercent)/100; calculateApronLayout(); }
  function pickGhost(i) { ghostAircraft = { ...aircraftTypes[i], heading: 180, mX: 0, mY: 0, swing: false }; }
  function toggleSwingOut() { if(selectedIdx !== -1) placedAircraft[selectedIdx].swing = document.getElementById('swingToggle').checked; }
  function rotateSelected(d) { if(selectedIdx !== -1) placedAircraft[selectedIdx].heading += d; }
  function deleteSelected() { if(selectedIdx !== -1) { placedAircraft.splice(selectedIdx, 1); selectedIdx = -1; document.getElementById('activePlanePanel').classList.add('hidden'); } }
  const mToP = (mx, my) => ({ x: originX + mx * scale, y: originY + my * scale });
  const pToM = (px, py) => ({ mx: (px - originX) / scale, my: (py - originY) / scale });
  canvas.onmousedown = (e) => {
    const r = canvas.getBoundingClientRect(); const pos = pToM(e.clientX-r.left, e.clientY-r.top);
    if (ghostAircraft) { const s = findBestSnap(ghostAircraft, pos); ghostAircraft.mX = s.x; ghostAircraft.mY = s.y; ghostAircraft.heading = s.h; placedAircraft.push({ ...ghostAircraft }); ghostAircraft = null; return; }
    selectedIdx = placedAircraft.findIndex(ac => Math.hypot(ac.mX - pos.mx, ac.mY - pos.my) < (ac.WingSpan/2 + 2));
    if(selectedIdx !== -1) updateInspector(); else document.getElementById('activePlanePanel').classList.add('hidden');
  };
  canvas.onmousemove = (e) => {
    const r = canvas.getBoundingClientRect(); const pos = pToM(e.clientX-r.left, e.clientY-r.top);
    if (ghostAircraft) { const s = findBestSnap(ghostAircraft, pos); ghostAircraft.mX = s.x; ghostAircraft.mY = s.y; ghostAircraft.heading = s.h; 
    } else if (selectedIdx !== -1 && e.buttons === 1) { const s = findBestSnap(placedAircraft[selectedIdx], pos); placedAircraft[selectedIdx].mX = s.x; placedAircraft[selectedIdx].mY = s.y; updateInspector(); }
  };
</script>
