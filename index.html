<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <title>Apron Management System</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>
  <style>
    body { height: 100vh; display: flex; flex-direction: column; overflow: hidden; font-family: 'Inter', sans-serif; }
    canvas { background-color: #f1f5f9; cursor: crosshair; touch-action: none; }
    .tab-btn.active { border-bottom: 2px solid #0ea5e9; color: #0ea5e9; }
  </style>
</head>
<body class="bg-slate-50">

  <!-- Header -->
  <header class="bg-slate-900 text-white p-4 flex justify-between items-center shadow-lg">
    <div class="flex items-center gap-3">
      <i data-lucide="layout-dashboard" class="text-sky-400"></i>
      <h1 class="text-xl font-bold tracking-tight text-sky-400">Apron Simulator Pro</h1>
    </div>
    <div class="flex gap-4">
      <input type="date" id="datePicker" class="text-slate-900 p-2 rounded-lg text-sm">
      <button onclick="saveCurrentPlan()" class="bg-sky-500 hover:bg-sky-600 px-4 py-2 rounded-lg font-bold text-sm transition flex items-center gap-2">
        <i data-lucide="save" class="w-4 h-4"></i> บันทึกแผน
      </button>
    </div>
  </header>

  <div class="flex flex-1 overflow-hidden">
    <!-- Sidebar -->
    <aside class="w-80 bg-white border-r flex flex-col shadow-sm">
      <!-- Tabs Menu -->
      <div class="flex border-b text-xs font-bold uppercase tracking-wider">
        <button onclick="switchTab('planner')" id="tab-planner" class="tab-btn flex-1 p-3 active">Planner</button>
        <button onclick="switchTab('stands')" id="tab-stands" class="tab-btn flex-1 p-3">Stands</button>
        <button onclick="switchTab('aircraft')" id="tab-aircraft" class="tab-btn flex-1 p-3">Aircraft</button>
      </div>

      <div class="p-4 flex-1 overflow-y-auto">
        <!-- Planner View -->
        <div id="view-planner" class="space-y-6">
          <div>
            <h3 class="text-xs font-black text-slate-400 uppercase mb-3">1. Time Control</h3>
            <input type="range" id="timeSlider" min="0" max="1439" value="480" class="w-full h-2 bg-slate-200 rounded-lg appearance-none cursor-pointer">
            <div id="timeText" class="text-center font-black text-2xl text-sky-600 mt-2">08:00</div>
          </div>
          <div>
            <h3 class="text-xs font-black text-slate-400 uppercase mb-3">2. Models (Click to place)</h3>
            <div id="acList" class="space-y-2"></div>
          </div>
        </div>

        <!-- Stands Management View -->
        <div id="view-stands" class="hidden space-y-4">
          <h3 class="font-bold text-sm">จัดการหลุมจอด</h3>
          <div class="space-y-2 bg-slate-50 p-3 rounded-lg border">
            <input id="st-id" placeholder="Stand ID (e.g. A4)" class="w-full p-2 border rounded text-sm">
            <input id="st-x" type="number" placeholder="X Position" class="w-full p-2 border rounded text-sm">
            <input id="st-y" type="number" placeholder="Y Position" class="w-full p-2 border rounded text-sm">
            <button onclick="uiAddStand()" class="w-full bg-slate-800 text-white p-2 rounded text-sm font-bold">+ เพิ่มหลุมจอด</button>
          </div>
          <div id="standsListUi" class="text-xs space-y-1"></div>
        </div>

        <!-- Aircraft Management View -->
        <div id="view-aircraft" class="hidden">
           <p class="text-sm text-gray-500 italic"> Aircraft model creation UI coming soon. Edit via Sheet for now. </p>
        </div>
      </div>

      <!-- Info Inspector -->
      <div id="inspector" class="p-4 border-t bg-slate-50 hidden">
        <h3 class="font-bold text-xs uppercase text-slate-400 mb-2">Inspector</h3>
        <div id="insDetail" class="text-xs space-y-1 mb-3"></div>
        <div class="flex gap-2">
          <button onclick="rotateSelected(-15)" class="p-2 bg-white border rounded shadow-sm"><i data-lucide="rotate-ccw" class="w-4 h-4"></i></button>
          <button onclick="rotateSelected(15)" class="p-2 bg-white border rounded shadow-sm"><i data-lucide="rotate-cw" class="w-4 h-4"></i></button>
          <button onclick="deleteSelected()" class="p-2 bg-red-50 text-red-600 border border-red-100 rounded shadow-sm flex-1"><i data-lucide="trash-2" class="w-4 h-4 mx-auto"></i></button>
        </div>
      </div>
    </aside>

    <!-- Canvas -->
    <main class="flex-1 relative bg-slate-200 overflow-hidden">
      <canvas id="mainCanvas"></canvas>
      <div id="emptyState" class="absolute inset-0 flex items-center justify-center pointer-events-none hidden">
        <div class="text-center text-slate-400">
           <i data-lucide="compass" class="w-12 h-12 mx-auto mb-2 opacity-20"></i>
           <p class="font-bold">No stands found. Add some in Stands tab.</p>
        </div>
      </div>
    </main>
  </div>

<script>
  // CONFIG: ใส่ URL ของคุณที่นี่
  const WEB_APP_URL = 'https://script.google.com/macros/s/AKfycbxqCIfejWJerGZfjRfZs-Bn0Bq37jIxzAUdX_-fpK5i3hDiEK-6rBNNSE4KFDuITRT7/exec'; 

  let aircraftTypes = [], stands = [], safetyRules = {};
  let placedAircraft = [];
  let selectedIdx = -1;
  let isDragging = false;
  let ghostAircraft = null; // เครื่องบินที่กำลังตามเมาส์
  let scale = 3; 

  const canvas = document.getElementById('mainCanvas');
  const ctx = canvas.getContext('2d');

  async function apiCall(action, data = {}) {
    const response = await fetch(WEB_APP_URL, { method: 'POST', body: JSON.stringify({ action, data }) });
    const res = await response.json();
    return res.data;
  }

  window.onload = async () => {
    lucide.createIcons();
    document.getElementById('datePicker').valueAsDate = new Date();
    await loadData();
    resize();
    animate();
  };

  async function loadData() {
    try {
      const data = await apiCall('getInitialData');
      aircraftTypes = data.aircraftTypes;
      stands = data.stands;
      safetyRules = data.icaoSafety;
      renderAircraftList();
      renderStandsList();
    } catch(e) { console.error(e); }
  }

  function switchTab(tab) {
    ['planner', 'stands', 'aircraft'].forEach(t => {
      document.getElementById('tab-'+t).classList.toggle('active', t === tab);
      document.getElementById('view-'+t).classList.toggle('hidden', t !== tab);
    });
  }

  function renderAircraftList() {
    const list = document.getElementById('acList');
    list.innerHTML = '';
    aircraftTypes.forEach(type => {
      const btn = document.createElement('button');
      btn.className = "w-full p-3 bg-white border rounded-xl text-left hover:border-sky-400 transition shadow-sm group";
      btn.innerHTML = `<div class="font-bold text-sm">${type.Model}</div>
                       <div class="text-[10px] text-gray-400">Span: ${type.WingSpan}m | Code: ${type.ICAO}</div>`;
      btn.onclick = () => { ghostAircraft = { ...type, heading: 0, x: 0, y: 0 }; };
      list.appendChild(btn);
    });
  }

  function renderStandsList() {
    const list = document.getElementById('standsListUi');
    list.innerHTML = stands.map(s => `
      <div class="flex justify-between items-center p-2 border-b">
        <span><b>${s.StandID}</b> (${s.CenterX}, ${s.CenterY})</span>
        <button onclick="uiDeleteStand('${s.StandID}')" class="text-red-500">Del</button>
      </div>
    `).join('');
    document.getElementById('emptyState').classList.toggle('hidden', stands.length > 0);
  }

  // --- Interaction Logic ---
  canvas.onmousemove = (e) => {
    const rect = canvas.getBoundingClientRect();
    const mx = (e.clientX - rect.left) / scale;
    const my = (e.clientY - rect.top) / scale;

    if (ghostAircraft) {
      ghostAircraft.x = mx;
      ghostAircraft.y = my;
    } else if (isDragging && selectedIdx !== -1) {
      placedAircraft[selectedIdx].x = mx;
      placedAircraft[selectedIdx].y = my;
    }
  };

  canvas.onmousedown = (e) => {
    if (ghostAircraft) {
      placedAircraft.push({ ...ghostAircraft, startTime: 0, endTime: 1440, isSafe: true });
      ghostAircraft = null;
      selectedIdx = placedAircraft.length - 1;
      return;
    }
    
    const rect = canvas.getBoundingClientRect();
    const mx = (e.clientX - rect.left) / scale;
    const my = (e.clientY - rect.top) / scale;
    
    selectedIdx = placedAircraft.findIndex(ac => Math.hypot(ac.x - mx, ac.y - my) < 10);
    if (selectedIdx !== -1) {
      isDragging = true;
      updateInspector();
    } else {
      document.getElementById('inspector').classList.add('hidden');
    }
  };

  canvas.onmouseup = () => isDragging = false;

  function rotateSelected(deg) { if(selectedIdx !== -1) placedAircraft[selectedIdx].heading += deg; }
  function deleteSelected() { if(selectedIdx !== -1) { placedAircraft.splice(selectedIdx, 1); selectedIdx = -1; document.getElementById('inspector').classList.add('hidden'); } }

  function updateInspector() {
    const ac = placedAircraft[selectedIdx];
    document.getElementById('inspector').classList.remove('hidden');
    document.getElementById('insDetail').innerHTML = `<b>${ac.Model}</b><br>Pos: ${ac.x.toFixed(0)}, ${ac.y.toFixed(0)}<br>Heading: ${ac.heading}°`;
  }

  // --- Drawing & Animation ---
  function animate() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    
    // Draw Stands
    stands.forEach(s => {
      ctx.strokeStyle = '#cbd5e1';
      ctx.setLineDash([5, 5]);
      ctx.strokeRect(s.CenterX * scale - (s.Width*scale/2), s.CenterY * scale - (s.Length*scale/2), s.Width * scale, s.Length * scale);
      ctx.setLineDash([]);
      ctx.fillStyle = '#94a3b8';
      ctx.font = 'bold 12px Inter';
      ctx.fillText(s.StandID, s.CenterX * scale - 10, s.CenterY * scale - (s.Length*scale/2) - 10);
    });

    // Draw Placed Aircraft
    placedAircraft.forEach((ac, i) => drawAircraft(ac, i === selectedIdx));

    // Draw Ghost (Following Mouse)
    if (ghostAircraft) {
      ctx.globalAlpha = 0.5;
      drawAircraft(ghostAircraft, true);
      ctx.globalAlpha = 1.0;
    }

    requestAnimationFrame(animate);
  }

  function drawAircraft(ac, isSelected) {
    const x = ac.x * scale, y = ac.y * scale;
    const w = ac.WingSpan * scale, l = ac.Length * scale;
    const mb = ac.NoseToMainGear * scale;

    ctx.save();
    ctx.translate(x, y);
    ctx.rotate(ac.heading * Math.PI / 180);

    // Jet Blast
    ctx.fillStyle = 'rgba(14, 165, 233, 0.15)';
    ctx.fillRect(-w/6, mb, w/3, ac.JetBlast * scale);

    // Body
    ctx.fillStyle = isSelected ? '#0ea5e9' : ac.Color;
    ctx.fillRect(-w/20, -mb, w/10, l); // Fuselage
    ctx.fillRect(-w/2, -mb + l*0.35, w, l/10); // Wings
    ctx.fillRect(-w/4, -mb + l*0.9, w/2, l/20); // Tail

    ctx.restore();
  }

  function resize() { canvas.width = canvas.parentElement.clientWidth; canvas.height = canvas.parentElement.clientHeight; }
  
  async function uiAddStand() {
    const data = {
      StandID: document.getElementById('st-id').value,
      CenterX: Number(document.getElementById('st-x').value),
      CenterY: Number(document.getElementById('st-y').value),
      Width: 60, Length: 80, MaxCode: 'E', Heading: 0, IsBoundary: false
    };
    await apiCall('saveStand', data);
    await loadData();
  }

  async function uiDeleteStand(id) {
    if(confirm('ลบหลุมจอด '+id+'?')) {
      await apiCall('deleteStand', { id });
      await loadData();
    }
  }

  document.getElementById('timeSlider').oninput = function() {
    const val = parseInt(this.value);
    document.getElementById('timeText').innerText = `${Math.floor(val/60).toString().padStart(2,'0')}:${(val%60).toString().padStart(2,'0')}`;
  };
</script>
</body>
</html>
