<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <title>Apron Simulation Pro v1.1</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=Sarabun:wght@400;700&display=swap" rel="stylesheet">
  <style>
    body { height: 100vh; display: flex; flex-direction: column; overflow: hidden; font-family: 'Inter', 'Sarabun', sans-serif; }
    #canvasContainer { flex: 1; overflow: auto; background-color: #cbd5e1; position: relative; scroll-behavior: smooth; }
    canvas { background-color: #f1f5f9; cursor: crosshair; touch-action: none; display: block; margin: auto; }
    .tab-btn { border-bottom: 3px solid transparent; transition: all 0.3s; }
    .tab-btn.active { border-bottom: 3px solid #0ea5e9; color: #0ea5e9; background-color: #f8fafc; }
    label { font-size: 10px; font-weight: 800; color: #64748b; text-transform: uppercase; letter-spacing: 0.05em; display: block; margin-bottom: 2px; }
    #mathPanel { position: fixed; top: 160px; right: 20px; width: 300px; background: rgba(15, 23, 42, 0.95); color: #22d3ee; padding: 18px; border-radius: 24px; font-family: monospace; font-size: 10px; z-index: 50; border: 1px solid #0ea5e9; backdrop-filter: blur(8px); }
    #mathPanel h4 { color: #fff; font-weight: 900; margin-bottom: 10px; border-bottom: 1px solid #334155; padding-bottom: 5px; text-transform: uppercase; }
    .modal { display: none; position: fixed; inset: 0; background: rgba(15, 23, 42, 0.6); z-index: 100; backdrop-filter: blur(4px); align-items: center; justify-content: center; }
    .modal.active { display: flex; }
    #loader { display: none; position: fixed; inset: 0; background: rgba(15, 23, 42, 0.8); z-index: 999; flex-direction: column; align-items: center; justify-content: center; color: white; backdrop-filter: blur(4px); }
    .spinner { width: 40px; height: 40px; border: 4px solid rgba(255,255,255,0.1); border-top-color: #0ea5e9; border-radius: 50%; animation: spin 1s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body class="bg-slate-100">

  <div id="loader"><div class="spinner mb-4"></div><p class="font-bold text-sm">กำลังประมวลผล...</p></div>
  <div id="toast" class="hidden fixed top-4 left-1/2 -translate-x-1/2 bg-emerald-600 text-white px-6 py-2 rounded-full shadow-2xl font-bold text-sm z-[1000] animate-bounce">สำเร็จ!</div>

  <div id="mathPanel" class="shadow-2xl">
     <h4><i data-lucide="calculator" class="w-4 h-4 inline mr-1"></i> Engineering Math</h4>
     <div id="mathOutput" class="space-y-2"></div>
  </div>

  <header class="bg-slate-900 text-white h-14 px-6 flex justify-between items-center shrink-0 z-30">
    <div class="flex items-center gap-3">
      <div class="bg-sky-500 p-1.5 rounded text-white"><i data-lucide="shield-check"></i></div>
      <h1 class="text-lg font-black tracking-tighter text-sky-400 uppercase">Apron Simulation <span class="text-white text-xs ml-1">v1.1</span></h1>
    </div>
    <div class="flex gap-4">
      <button onclick="loadData()" class="bg-slate-700 p-2 rounded hover:bg-slate-600 transition"><i data-lucide="refresh-cw" class="w-4 h-4 text-white"></i></button>
    </div>
  </header>

  <!-- Aircraft Selection Toolbar -->
  <div class="bg-white border-b h-20 flex items-center px-6 gap-3 overflow-x-auto shrink-0 z-20 shadow-sm no-scrollbar">
     <div class="flex flex-col shrink-0 border-r pr-4 mr-2">
        <span class="text-[9px] font-black text-slate-400 uppercase tracking-widest">Aircraft Types</span>
        <span class="text-[10px] font-bold text-slate-600 italic">เลือกเพื่อวางบนผัง</span>
     </div>
     <div id="acToolbar" class="flex gap-2"></div>
  </div>

  <div class="flex flex-1 overflow-hidden">
    <aside class="w-80 bg-white border-r flex flex-col shadow-2xl z-10 shrink-0">
      <div class="flex border-b text-[10px] font-black uppercase text-slate-400">
        <button onclick="switchTab('inspector')" id="tab-inspector" class="tab-btn flex-1 p-4 active">รายละเอียด</button>
        <button onclick="switchTab('data')" id="tab-data" class="tab-btn flex-1 p-4">จัดการข้อมูล</button>
      </div>

      <div class="p-5 flex-1 overflow-y-auto bg-slate-50/20">
        <div id="view-inspector" class="space-y-6">
          <div class="p-4 bg-sky-50 rounded-2xl border border-sky-100">
             <div class="flex justify-between items-center mb-2">
                <span class="text-[9px] font-black text-slate-400 uppercase tracking-widest">Map Zoom</span>
                <span id="zoomDisplay" class="text-xs font-bold text-sky-600">100%</span>
             </div>
             <input type="range" id="zoomSlider" min="50" max="200" value="100" class="w-full h-1 bg-sky-200 rounded-lg appearance-none cursor-pointer accent-sky-600" oninput="handleZoom(this.value)">
          </div>

          <div id="activePlanePanel" class="hidden space-y-4">
             <div id="insHeader" class="p-5 text-white rounded-3xl shadow-xl border-b-4">
                <h3 id="insModel" class="text-2xl font-black tracking-tighter text-white">Model</h3>
                <p id="insStatusText" class="text-xs font-bold uppercase tracking-widest">Safe</p>
             </div>
             <label class="flex items-center justify-between p-3 bg-white rounded-xl border-2 border-slate-100 cursor-pointer">
                <span class="text-[10px] font-black uppercase">จำลองวงเลี้ยว (Swing-out)</span>
                <input type="checkbox" id="swingToggle" onchange="toggleSwingOut()" class="w-5 h-5 accent-sky-500">
             </label>
             <div class="grid grid-cols-2 gap-2">
                <button onclick="rotateSelected(-1)" class="p-4 bg-white border rounded-2xl hover:bg-sky-50 transition shadow-sm font-bold text-slate-600"><i data-lucide="rotate-ccw" class="w-5 h-5 mx-auto"></i></button>
                <button onclick="rotateSelected(1)" class="p-4 bg-white border rounded-2xl hover:bg-sky-50 transition shadow-sm font-bold text-slate-600"><i data-lucide="rotate-cw" class="w-5 h-5 mx-auto"></i></button>
                <button onclick="deleteSelected()" class="col-span-2 p-3 bg-red-50 text-red-500 rounded-xl font-bold hover:bg-red-500 hover:text-white transition flex items-center justify-center gap-2"><i data-lucide="trash-2" class="w-4 h-4"></i> ลบที่เลือก</button>
             </div>
          </div>
          <div id="noSelectionMsg" class="py-20 text-center text-slate-300 italic text-sm">คลิกเลือกเครื่องบินเพื่อดูข้อมูล</div>
        </div>

        <div id="view-data" class="hidden space-y-6">
           <div class="space-y-3">
              <div class="flex justify-between items-center"><h3 class="font-black text-[10px] text-slate-400 uppercase tracking-widest">Stands</h3><button onclick="openStandModal()" class="text-sky-600 font-bold text-[10px] bg-sky-50 px-2 py-1 rounded">+ เพิ่มหลุม</button></div>
              <div id="standsTable" class="space-y-2"></div>
           </div>
           <div class="space-y-3 border-t pt-4">
              <div class="flex justify-between items-center"><h3 class="font-black text-[10px] text-slate-400 uppercase tracking-widest">Aircraft</h3><button onclick="openAircraftModal()" class="text-sky-600 font-bold text-[10px] bg-sky-50 px-2 py-1 rounded">+ เพิ่มรุ่น</button></div>
              <div id="aircraftTable" class="space-y-2"></div>
           </div>
        </div>
      </div>
    </aside>

    <main id="canvasContainer">
      <canvas id="mainCanvas"></canvas>
    </main>
  </div>

  <!-- Modal Stand Form -->
  <div id="modalStand" class="modal">
    <div class="bg-white rounded-3xl w-[450px] p-6 shadow-2xl space-y-4 text-slate-700 overflow-y-auto max-h-[90vh]">
       <h3 class="font-black border-b pb-2 uppercase tracking-tighter">Stand Configuration</h3>
       <div><label>Stand ID</label><input id="st-id" class="w-full p-2 border rounded-lg"></div>
       <div class="grid grid-cols-2 gap-4">
          <div><label>กว้าง Width (ม.)</label><input id="st-w" type="number" value="45" class="w-full p-2 border rounded-lg"></div>
          <div><label>ยาว Length (ม.)</label><input id="st-l" type="number" value="80" class="w-full p-2 border rounded-lg"></div>
       </div>
       <div class="grid grid-cols-2 gap-4 bg-yellow-50 p-3 rounded-xl">
          <div><label>T-MARK 1 (เมตร)</label><input id="st-t1" type="number" value="15" class="w-full p-2 border border-yellow-400 rounded-lg"></div>
          <div><label>รหัสรุ่น T1 (Label)</label><input id="st-t1-label" placeholder="A320/B737" class="w-full p-2 border border-yellow-400 rounded-lg"></div>
          <div><label>T-MARK 2 (เมตร)</label><input id="st-t2" type="number" value="20" class="w-full p-2 border border-yellow-400 rounded-lg"></div>
          <div><label>รหัสรุ่น T2 (Label)</label><input id="st-t2-label" placeholder="ATR72" class="w-full p-2 border border-yellow-400 rounded-lg"></div>
       </div>
       <div class="grid grid-cols-2 gap-4">
          <div><label>Border L (ม.)</label><input id="st-border-l" type="number" value="20" class="w-full p-2 border rounded-lg"></div>
          <div><label>Border R (ม.)</label><input id="st-border-r" type="number" value="20" class="w-full p-2 border rounded-lg"></div>
       </div>
       <div class="grid grid-cols-2 gap-4">
          <div><label>Heading</label><input id="st-heading" type="number" value="180" class="w-full p-2 border rounded-lg"></div>
          <div><label>Max Code</label><select id="st-code" class="w-full p-2 border rounded-lg"><option value="C">Code C</option><option value="E">Code E</option><option value="F">Code F</option></select></div>
       </div>
       <button onclick="uiSaveStand()" class="w-full bg-sky-600 text-white p-4 rounded-2xl font-bold shadow-lg">บันทึกข้อมูลหลุมจอด</button>
       <button onclick="closeModal('modalStand')" class="w-full text-slate-400 text-xs mt-2 underline">ยกเลิก</button>
    </div>
  </div>

  <!-- Modal Aircraft Form -->
  <div id="modalAircraft" class="modal">
    <div class="bg-white rounded-3xl w-[400px] p-6 shadow-2xl space-y-4">
       <h3 class="font-black border-b pb-2">Aircraft Model</h3>
       <div><label>ชื่อรุ่น (Model)</label><input id="ac-m" placeholder="A320-200" class="w-full p-2 border rounded-lg"></div>
       <div class="grid grid-cols-2 gap-4">
          <div><label>Wing Span (ม.)</label><input id="ac-s" type="number" class="w-full p-2 border rounded-lg"></div>
          <div><label>Length (ม.)</label><input id="ac-l" type="number" class="w-full p-2 border rounded-lg"></div>
       </div>
       <div class="grid grid-cols-2 gap-4">
          <div><label>Nose to Main Gear (ม.)</label><input id="ac-nmg" type="number" class="w-full p-2 border rounded-lg"></div>
          <div><label>Max Steering (องศา)</label><input id="ac-sa" type="number" value="45" class="w-full p-2 border rounded-lg"></div>
       </div>
       <div><label>ICAO Code</label><select id="ac-code" class="w-full p-2 border rounded-lg"><option value="C">Code C</option><option value="E">Code E</option><option value="F">Code F</option></select></div>
       <button onclick="uiSaveAircraft()" class="w-full bg-slate-900 text-white p-4 rounded-2xl font-bold">บันทึกประเภทเครื่อง</button>
       <button onclick="closeModal('modalAircraft')" class="w-full text-slate-400 text-xs mt-2 underline">ยกเลิก</button>
    </div>
  </div>

<script>
  /**
   * FRONTEND LOGIC v1.1 - Smart Snap & Labeling
   */
  const WEB_APP_URL = 'https://script.google.com/macros/s/AKfycbxqCIfejWJerGZfjRfZs-Bn0Bq37jIxzAUdX_-fpK5i3hDiEK-6rBNNSE4KFDuITRT7/exec'; 

  let aircraftTypes = [], stands = [], safetySettings = {};
  let placedAircraft = [], selectedIdx = -1, ghostAircraft = null;
  let baseScale = 5, zoomPercent = 100, scale = 5, originX = 0, originY = 0;

  const canvas = document.getElementById('mainCanvas');
  const ctx = canvas.getContext('2d');

  async function apiCall(action, data = {}) {
    showLoader(true);
    try {
        const response = await fetch(WEB_APP_URL, { method: 'POST', body: JSON.stringify({ action, data }) });
        const res = await response.json();
        showLoader(false);
        if(res.success) showToast("สำเร็จ");
        return res.data;
    } catch(e) { showLoader(false); return null; }
  }

  function showLoader(show) { document.getElementById('loader').style.display = show ? 'flex' : 'none'; }
  function showToast(msg) { const t = document.getElementById('toast'); t.innerText = msg; t.classList.remove('hidden'); setTimeout(() => t.classList.add('hidden'), 3000); }
  function closeModal(id) { document.getElementById(id).classList.remove('active'); }
  function switchTab(t) { ['inspector','data'].forEach(v => { document.getElementById('tab-'+v).className = `flex-1 p-4 tab-btn ${v===t?'active':''}`; document.getElementById('view-'+v).classList.toggle('hidden', v!==t); }); }

  window.onload = async () => { lucide.createIcons(); await loadData(); animate(); };

  async function loadData() {
    const data = await apiCall('getInitialData');
    if(!data) return;
    aircraftTypes = data.aircraftTypes || [];
    stands = data.stands || [];
    safetySettings = {};
    (data.safetySettings || []).forEach(s => safetySettings[s.Code] = s.MinClearance);
    renderUI();
    calculateApronLayout();
  }

  function renderUI() {
    document.getElementById('acToolbar').innerHTML = aircraftTypes.map((t, i) => `
        <button onclick="pickGhost(${i})" class="flex flex-col items-center p-2 bg-white border-2 rounded-xl hover:border-sky-500 w-24 shrink-0 shadow-sm">
            <b class="text-[10px]">${t.Model}</b>
            <span class="text-[8px] text-sky-500 font-black">Code ${t.ICAO}</span>
        </button>`).join('');
    
    document.getElementById('standsTable').innerHTML = stands.map((s, i) => `
        <div class="flex justify-between items-center p-2.5 bg-white border rounded-xl text-[10px] font-bold shadow-sm">
            <span>Stand ${s.StandID}</span>
            <div class="flex gap-1">
                <button onclick="editStand(${i})" class="text-sky-600 bg-sky-50 px-2 py-1 rounded">แก้ไข</button>
                <button onclick="uiDeleteStand('${s.StandID}')" class="text-red-500 bg-red-50 px-2 py-1 rounded">ลบ</button>
            </div>
        </div>`).join('');
  }

  function calculateApronLayout() {
    let totalWidth = stands.reduce((sum, s) => sum + (Number(s.Width)||0), 0);
    canvas.width = (totalWidth + 400) * scale;
    canvas.height = 1000 * (zoomPercent/100);
    originX = canvas.width - (100 * scale); originY = canvas.height / 2;
    
    let currentX = 0;
    stands.filter(s => !s.ParentID).sort((a,b) => String(a.StandID).localeCompare(String(b.StandID), undefined, {numeric:true})).forEach(s => {
        s.mX = currentX - (s.Width/2); s.mY = 0;
        currentX -= s.Width;
        stands.filter(c => c.ParentID === s.StandID).forEach(c => { c.mX = s.mX + (Number(c.OffsetX)||0); c.mY = 0; });
    });
  }

  // --- SMART SNAP LOGIC ---
  function findBestSnap(ac, worldPos) {
    let bx = worldPos.mx, by = worldPos.my, bh = 180;
    
    stands.forEach(s => {
        // เช็คว่าเมาส์อยู่ใกล้จุดกึ่งกลางหลุมในระยะ 10 เมตรหรือไม่
        if (Math.abs(worldPos.mx - s.mX) < 10) {
            bx = s.mX; bh = Number(s.Heading) || 180;
            const noseOffset = ac.Length / 2; 
            const headLineY = s.mY + (s.Length / 2);

            // Logic: ตรวจสอบความสอดคล้องของชื่อรุ่นเครื่องบินกับ Label ของ T-Mark
            let targetT = null;
            const modelName = ac.Model.toUpperCase();
            
            // ตรวจสอบ T1: ถ้าชื่อรุ่นตรงกับ Label หรือถ้าเครื่องบินเป็น Private Jet (ไม่มีรหัสเฉพาะ) ให้ยอมให้ Snap
            if (s.TMark1Label && modelName.includes(s.TMark1Label.toUpperCase())) {
                targetT = s.TMark1;
            } else if (s.TMark2Label && modelName.includes(s.TMark2Label.toUpperCase())) {
                targetT = s.TMark2;
            } else {
                // กรณีไม่เจอชื่อรุ่นที่ตรงกัน (เช่น เครื่องบินส่วนตัว / Private Jet)
                // ให้เลือกจุดที่ใกล้ที่สุดจากเมาส์ (Nearest T-Mark)
                const d1 = Math.abs(worldPos.my - (headLineY - s.TMark1 - noseOffset));
                const d2 = Math.abs(worldPos.my - (headLineY - s.TMark2 - noseOffset));
                targetT = (d1 < d2) ? s.TMark1 : s.TMark2;
            }

            if (targetT) by = headLineY - targetT - noseOffset;
        }
    });
    return { x: bx, y: by, h: bh };
  }

  function checkSafety() {
    let mathLog = "";
    placedAircraft.forEach((ac, idx) => {
        let isSafe = true, error = "";
        let stand = stands.find(s => Math.abs(ac.mX - s.mX) < 1);
        
        if (stand) {
            const noseY = ac.mY + (ac.Length / 2);
            const clearance = (stand.mY + stand.Length / 2) - noseY;
            
            if (idx === selectedIdx) {
                mathLog += `<p class="text-sky-300 font-black border-b border-sky-900 pb-1">STAND ${stand.StandID}</p>`;
                mathLog += `<p>Nose Clearance: ${clearance.toFixed(2)} m</p>`;
                if (ac.swing) {
                    const r = ac.NoseToMainGear / Math.tan((ac.SteeringAngle || 45) * Math.PI / 180);
                    const sweptR = Math.hypot(r + ac.WingSpan/2, ac.Length - ac.NoseToMainGear);
                    mathLog += `<p class="text-yellow-400">Swept Radius: ${sweptR.toFixed(2)} m</p>`;
                }
            }

            if (clearance < 0.1) { isSafe = false; error = "จมูกล้นขอบหลุม"; }
            if (ac.ICAO.charCodeAt(0) > stand.MaxCode.charCodeAt(0)) { isSafe = false; error = "เครื่องใหญ่เกิน Code หลุม"; }
        }

        // Check Wing Separation
        placedAircraft.forEach((other, oIdx) => {
            if (idx === oIdx) return;
            const dist = Math.abs(ac.mX - other.mX);
            const clear = dist - (ac.WingSpan/2 + other.WingSpan/2);
            const minReq = safetySettings[ac.ICAO] || 4.5;
            if (clear < minReq) { isSafe = false; error = "ระยะห่างปลายปีกอันตราย"; }
        });

        ac.isSafe = isSafe; ac.errorMsg = error;
    });
    document.getElementById('mathOutput').innerHTML = mathLog || '<p class="text-slate-500">เลือกเครื่องบินเพื่อคำนวณ...</p>';
  }

  function animate() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    checkSafety();

    // วาดหลุมจอด
    stands.forEach(s => {
        const p = mToP(s.mX, s.mY), w = s.Width * scale, l = s.Length * scale;
        ctx.save(); ctx.translate(p.x, p.y);
        ctx.strokeStyle = "#94a3b8"; ctx.setLineDash([5, 5]); ctx.strokeRect(-w/2, -l/2, w, l);
        
        // วาด T-Marks
        ctx.setLineDash([]); ctx.lineWidth = 2; ctx.strokeStyle = "#facc15"; ctx.fillStyle = "#475569"; ctx.font = "bold 10px Inter";
        [{d: s.TMark1, label: s.TMark1Label}, {d: s.TMark2, label: s.TMark2Label}].forEach(tm => {
            if(!tm.d) return;
            const tmY = (l/2) - (tm.d * scale);
            ctx.beginPath(); ctx.moveTo(-5*scale, tmY); ctx.lineTo(5*scale, tmY); ctx.stroke();
            if(tm.label) ctx.fillText(tm.label, 6*scale, tmY + 3);
        });

        // Label Stand
        ctx.fillStyle = "#0f172a"; ctx.textAlign="center"; ctx.font="black 14px Inter";
        ctx.fillText(`Stand ${s.StandID} (${s.MaxCode})`, 0, -l/2 - 10);
        ctx.restore();
    });

    // วาดเครื่องบิน
    placedAircraft.forEach((ac, i) => drawAircraft(ac, i === selectedIdx));
    if (ghostAircraft) { ctx.globalAlpha = 0.5; drawAircraft(ghostAircraft, true); ctx.globalAlpha = 1.0; }
    requestAnimationFrame(animate);
  }

  function drawAircraft(ac, isSelected) {
    const p = mToP(ac.mX, ac.mY), w = ac.WingSpan * scale, l = ac.Length * scale, mb = ac.NoseToMainGear * scale;
    ctx.save(); ctx.translate(p.x, p.y); ctx.rotate(ac.heading * Math.PI / 180);
    
    // วาดรัศมีวงเลี้ยวถ้าเปิด Swing-out
    if (ac.swing) {
        ctx.setLineDash([4, 4]); ctx.lineWidth = 1; ctx.strokeStyle = isSelected ? "#0ea5e9" : "#94a3b8";
        const r = ac.NoseToMainGear / Math.tan((ac.SteeringAngle || 45) * Math.PI / 180);
        const sweptR = Math.hypot(r + ac.WingSpan/2, ac.Length - ac.NoseToMainGear) * scale;
        ctx.beginPath(); ctx.arc(-r*scale, mb, sweptR, 1.5*Math.PI, 2*Math.PI); ctx.stroke();
        ctx.beginPath(); ctx.arc(r*scale, mb, sweptR, Math.PI, 1.5*Math.PI); ctx.stroke();
    }

    // Body
    ctx.fillStyle = isSelected ? '#0ea5e9' : (ac.isSafe ? ac.Color : '#ef4444');
    ctx.fillRect(-w/20, -mb, w/10, l); // Fuselage
    ctx.fillRect(-w/2, -mb + l*0.2, w, l/10); // Wings
    ctx.fillRect(-w/4, -mb + l*0.85, w/2, l/20); // Tail
    
    // Label
    ctx.rotate(-ac.heading * Math.PI / 180);
    ctx.fillStyle = "white"; ctx.font="bold 10px Inter"; ctx.textAlign="center";
    ctx.fillText(ac.Model, 0, 0);
    if (!ac.isSafe) { ctx.fillStyle = "#ef4444"; ctx.fillText("⚠️ " + ac.errorMsg, 0, -20); }
    ctx.restore();

    // วาด Dimension Line ระยะจมูก (เหมือนในรูป)
    let stand = stands.find(s => Math.abs(ac.mX - s.mX) < 1);
    if (stand && isSelected) {
        const noseVisualY = p.y + (ac.Length/2 * scale);
        const headLineVisualY = originY + (stand.mY + stand.Length/2) * scale;
        ctx.beginPath(); ctx.setLineDash([2,2]); ctx.strokeStyle = "#0ea5e9";
        ctx.moveTo(p.x, noseVisualY); ctx.lineTo(p.x, headLineVisualY); ctx.stroke();
        ctx.fillStyle = "#0ea5e9"; ctx.fillText(((stand.mY+stand.Length/2)-(ac.mY+ac.Length/2)).toFixed(2)+"m", p.x+5, (noseVisualY+headLineVisualY)/2);
    }
  }

  // --- UI ACTIONS ---
  async function uiSaveStand() {
    const data = {
        StandID: document.getElementById('st-id').value,
        Width: Number(document.getElementById('st-w').value),
        Length: Number(document.getElementById('st-l').value),
        TMark1: Number(document.getElementById('st-t1').value),
        TMark1Label: document.getElementById('st-t1-label').value,
        TMark2: Number(document.getElementById('st-t2').value),
        TMark2Label: document.getElementById('st-t2-label').value,
        Heading: Number(document.getElementById('st-heading').value),
        MaxCode: document.getElementById('st-code').value,
        LeftBorder: Number(document.getElementById('st-border-l').value),
        RightBorder: Number(document.getElementById('st-border-r').value),
        Status: 'active'
    };
    await apiCall('saveStand', data);
    closeModal('modalStand');
    await loadData();
  }

  async function uiSaveAircraft() {
    const data = {
        Model: document.getElementById('ac-m').value,
        WingSpan: Number(document.getElementById('ac-s').value),
        Length: Number(document.getElementById('ac-l').value),
        NoseToMainGear: Number(document.getElementById('ac-nmg').value),
        SteeringAngle: Number(document.getElementById('ac-sa').value),
        ICAO: document.getElementById('ac-code').value,
        Color: '#0ea5e9'
    };
    await apiCall('saveAircraftType', data);
    closeModal('modalAircraft');
    await loadData();
  }

  function editStand(i) {
    const s = stands[i];
    document.getElementById('st-id').value = s.StandID;
    document.getElementById('st-w').value = s.Width;
    document.getElementById('st-l').value = s.Length;
    document.getElementById('st-t1').value = s.TMark1;
    document.getElementById('st-t1-label').value = s.TMark1Label || "";
    document.getElementById('st-t2').value = s.TMark2;
    document.getElementById('st-t2-label').value = s.TMark2Label || "";
    openStandModal();
  }

  async function uiDeleteStand(id) { if(confirm('ลบหลุม '+id+'?')) { await apiCall('deleteStand', {id}); await loadData(); } }
  
  function pickGhost(i) { ghostAircraft = { ...aircraftTypes[i], heading: 180, mX: 0, mY: 0, swing: false }; }
  function toggleSwingOut() { if(selectedIdx !== -1) placedAircraft[selectedIdx].swing = document.getElementById('swingToggle').checked; }
  function rotateSelected(d) { if(selectedIdx !== -1) placedAircraft[selectedIdx].heading += d; }
  function deleteSelected() { if(selectedIdx !== -1) { placedAircraft.splice(selectedIdx, 1); selectedIdx = -1; document.getElementById('activePlanePanel').classList.add('hidden'); } }
  function handleZoom(v) { zoomPercent=v; document.getElementById('zoomDisplay').innerText=v+"%"; scale=(baseScale*zoomPercent)/100; calculateApronLayout(); }
  
  const mToP = (mx, my) => ({ x: originX + mx * scale, y: originY + my * scale });
  const pToM = (px, py) => ({ mx: (px - originX) / scale, my: (py - originY) / scale });

  canvas.onmousedown = (e) => {
    const r = canvas.getBoundingClientRect(); const pos = pToM(e.clientX-r.left, e.clientY-r.top);
    if (ghostAircraft) { 
        const s = findBestSnap(ghostAircraft, pos); 
        placedAircraft.push({ ...ghostAircraft, mX: s.x, mY: s.y, heading: s.h }); 
        ghostAircraft = null; return; 
    }
    selectedIdx = placedAircraft.findIndex(ac => Math.hypot(ac.mX - pos.mx, ac.mY - pos.my) < 10);
    if (selectedIdx !== -1) {
        document.getElementById('activePlanePanel').classList.remove('hidden');
        document.getElementById('noSelectionMsg').classList.add('hidden');
        document.getElementById('insModel').innerText = placedAircraft[selectedIdx].Model;
    } else {
        document.getElementById('activePlanePanel').classList.add('hidden');
        document.getElementById('noSelectionMsg').classList.remove('hidden');
    }
  };

  canvas.onmousemove = (e) => {
    const r = canvas.getBoundingClientRect(); const pos = pToM(e.clientX-r.left, e.clientY-r.top);
    if (ghostAircraft) { 
        const s = findBestSnap(ghostAircraft, pos); ghostAircraft.mX = s.x; ghostAircraft.mY = s.y; ghostAircraft.heading = s.h; 
    } else if (selectedIdx !== -1 && e.buttons === 1) { 
        const s = findBestSnap(placedAircraft[selectedIdx], pos); 
        placedAircraft[selectedIdx].mX = s.x; placedAircraft[selectedIdx].mY = s.y; 
    }
  };

  function openStandModal() { document.getElementById('modalStand').classList.add('active'); }
  function openAircraftModal() { document.getElementById('modalAircraft').classList.add('active'); }
</script>
